<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: an automated service-catalog completeness audit catching missing ownership and escalation metadata</title>
  <desc>
    Three catalog-info.yaml entries are created: checkout-api and inventory-service are complete with an owner and a PagerDuty escalation annotation, while legacy-reporting deliberately omits both. audit-catalog.sh reports MISSING OWNER and MISSING ESCALATION ROUTE for legacy-reporting, '2 issue(s) found', and exits 2. As a negative test, confirming echo $? returns 2 (not 0) shows a CI gate would correctly fail the build; separately, truncating inventory-service's YAML to corrupt it and re-running confirms the script errors clearly rather than silently treating the broken entry as compliant.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: A Service Catalog Completeness Audit That Fails Closed</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Two complete entries pass silently; an unowned legacy service is flagged and the script exits non-zero</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="190.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">checkout-api / inventory-service</text>
  <text x="190.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">owner + escalation present</text>
  <text x="190.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">audit: no findings</text>
  <rect x="380" y="140" width="240" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="500.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">legacy-reporting</text>
  <text x="500.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">no owner, no escalation route</text>
  <text x="500.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">audit: 2 issues found, exit 2</text>
  <line x1="320" y1="200" x2="380" y2="200" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">corrupted YAML (truncated)</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">errors clearly, not silently OK</text>
  <line x1="620" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">echo $? returns 2, not 0 — a CI pipeline gate on this script correctly fails the build when</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">ownership metadata is incomplete, rather than merging a service with no accountable owner.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="108" y="464" font-size="11" fill="#166534">Complete catalog entry</text>
  <line x1="336" y1="460" x2="376" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="384" y="464" font-size="11" fill="#b91c1c">Incomplete / corrupted entry</text>
</svg>
