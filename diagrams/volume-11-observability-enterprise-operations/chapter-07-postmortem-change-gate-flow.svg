<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: a postmortem-completeness audit and a change-approval gate, each validated against a compliant and a violating record</title>
  <desc>
    INC-1001 (SEV1, with a linked postmortem) and INC-1002 (SEV3, postmortem not required) both pass the coverage audit with 0 issues. CHG-2001 (2 of 2 approvals) passes the change gate; CHG-2002 (1 of 2 approvals) is BLOCKED with a nonzero exit. As a negative test, INC-1001's postmortem file is moved aside to simulate a SEV1 incident closed without one; re-running the audit now reports 'MISSING POSTMORTEM: INC-1001 (SEV1)' and exits non-zero, demonstrating the gate would fail a CI check rather than silently allowing the incident to close unreviewed. Restoring the file returns the audit to passing.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Postmortem Coverage and Change-Approval Gates That Fail Closed</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A SEV1 incident missing its postmortem is caught by the audit; an under-approved change is blocked from proceeding</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">INC-1001 (SEV1)</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">postmortem linked</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">audit: 0 issues</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CHG-2001</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">2/2 approvals</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">gate: approved, proceeding</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CHG-2002</text>
  <text x="810.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">1/2 approvals</text>
  <text x="810.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">gate: BLOCKED, exit ≠ 0</text>
  <rect x="60" y="330" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="372.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="390.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">INC-1001's postmortem file moved aside, audit re-run</text>
  <text x="490.0" y="408.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">&quot;MISSING POSTMORTEM: INC-1001 (SEV1)&quot;, exit non-zero — CI would fail the build on this condition</text>
  <text x="490.0" y="426.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">restoring the file returns the audit to passing</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="108" y="504" font-size="11" fill="#166534">Compliant record</text>
  <line x1="282" y1="500" x2="322" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="330" y="504" font-size="11" fill="#b91c1c">Blocked / caught by audit</text>
</svg>
