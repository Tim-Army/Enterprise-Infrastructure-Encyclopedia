<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: a Prometheus multi-window burn-rate SLO alert validated against both a burning and a healthy error rate</title>
  <desc>
    lab-app injects a 2% error rate and a 5% slow-tail. slo:sli_error:ratio_rate5m reports approximately 0.02, and because this exceeds the 14.4 x 0.1% = 1.44% page threshold, LabAppAvailabilitySLOBurn is firing. As a negative test, the error probability is lowered to 0.05% (well under the 0.1% SLO) and the app rebuilt and restarted; after five minutes, slo:sli_error:ratio_rate5m reports approximately 0.0005, well under the 0.0144 burn-rate threshold, and LabAppAvailabilitySLOBurn returns to inactive — confirming the alert distinguishes a genuine fast-burn condition from normal, budget-compliant operation rather than firing on any nonzero error rate.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: A Burn-Rate Alert That Distinguishes Fast-Burn From Budget-Compliant</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A 2% error rate fires the SLO alert; the same alert returns to inactive once errors drop under the threshold</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lab-app: 2% error injection</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">slo:sli_error:ratio_rate5m ≈ 0.02</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">2% &gt; 1.44% page threshold</text>
  <rect x="380" y="140" width="240" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="500.0" y="195.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">LabAppAvailabilitySLOBurn</text>
  <text x="500.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">state: firing</text>
  <line x1="320" y1="200" x2="380" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">error rate lowered to 0.05%</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">ratio ≈ 0.0005 &lt; 0.0144</text>
  <line x1="620" y1="200" x2="700" y2="200" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">LabAppAvailabilitySLOBurn returns to inactive — the alert fires on the burn-rate threshold specifically,</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">not on any nonzero error rate, correctly distinguishing genuine fast-burn from healthy operation.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="108" y="464" font-size="11" fill="#b91c1c">Burning error budget</text>
  <line x1="318" y1="460" x2="358" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="366" y="464" font-size="11" fill="#166534">Healthy, below threshold</text>
</svg>
