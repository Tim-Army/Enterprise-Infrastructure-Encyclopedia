<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: Alertmanager grouping three related alerts into one notification, then a node-scoped inhibition rule tested against two nodes</title>
  <desc>
    Three PodUnavailable alerts for different pods on node-7 are fired together; the webhook sink receives a single notification payload containing all three, grouped by [alertname, service] as configured. As a negative test, a NodeDown alert for node-7 is fired, then a new PodUnavailable alert for node-7; the count of PodUnavailable notifications after NodeDown fired is 0 — inhibited because the matching NodeDown alert shares the node label. Repeating with PodUnavailable on node-8 (no active NodeDown there) confirms that notification IS delivered, showing the inhibition correctly scopes to the matching node label rather than suppressing all PodUnavailable alerts globally.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: Alertmanager Grouping and Node-Scoped Inhibition</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Three pod alerts on one node collapse into a single notification; a NodeDown alert suppresses new pod alerts for that node only</text>
  <rect x="60" y="140" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">3x PodUnavailable, node-7</text>
  <text x="190.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">different pods, same node</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Alertmanager grouping</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">group_by [alertname, service]</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ 1 notification, 3 alerts</text>
  <line x1="320" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="810.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">webhook sink</text>
  <text x="810.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">received.jsonl: 1 payload</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="420" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="270.0" y="363.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test: node-7</text>
  <text x="270.0" y="381.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">NodeDown(node-7) fires, then</text>
  <text x="270.0" y="399.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">PodUnavailable(node-7) fires</text>
  <text x="270.0" y="417.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">0 PodUnavailable notifications</text>
  <text x="270.0" y="435.2" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">(inhibited by matching node label)</text>
  <rect x="500" y="330" width="420" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="710.0" y="372.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Control: node-8</text>
  <text x="710.0" y="390.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">PodUnavailable(node-8) fires</text>
  <text x="710.0" y="408.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">no active NodeDown on node-8</text>
  <text x="710.0" y="426.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">notification IS delivered</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Grouped source alerts</text>
  <line x1="327" y1="500" x2="367" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="375" y="504" font-size="11" fill="#166534">Delivered notification</text>
  <line x1="603" y1="500" x2="643" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="651" y="504" font-size="11" fill="#b91c1c">Inhibited (scoped correctly)</text>
</svg>
