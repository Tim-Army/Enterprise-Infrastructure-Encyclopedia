<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: a tail-sampling policy retaining every error and slow trace while probabilistically discarding routine traffic</title>
  <desc>
    100 synthetic traces are sent: 90 fast/successful, 5 slow (over 800ms), and 5 errors. The Collector's tail_sampling processor retains all traces matching keep-errors or keep-slow policies, and samples only 10% of everything else via baseline-sample. Jaeger shows approximately 19-20 retained traces: all 5 slow, all 5 error, and roughly 9 of the 90 fast/successful traces. As a negative test, counting the retained fast/successful traces specifically confirms the count is well under 90 (roughly 5-15) rather than close to 90 — a count near 90 would mean the baseline-sample policy was unreachable due to an inverted earlier policy, defeating the cost control tail sampling exists to provide.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: Tail Sampling That Actually Discards Routine Traffic</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">All errors and slow traces are retained; only about 10% of the 90 fast/successful traces survive sampling</text>
  <rect x="60" y="140" width="260" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="200.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">100 synthetic traces</text>
  <text x="190.0" y="218.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">90 fast/OK, 5 slow, 5 error</text>
  <rect x="400" y="130" width="260" height="150" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="530.0" y="182.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">tail_sampling processor</text>
  <text x="530.0" y="200.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">keep-errors: status_code</text>
  <text x="530.0" y="218.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">keep-slow: latency &gt; 800ms</text>
  <text x="530.0" y="236.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">baseline-sample: 10% of rest</text>
  <line x1="320" y1="205" x2="400" y2="205" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="720" y="130" width="200" height="150" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="820.0" y="191.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Jaeger</text>
  <text x="820.0" y="209.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">~19-20 retained:</text>
  <text x="820.0" y="227.4" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">5 slow + 5 error + ~9 sampled</text>
  <line x1="660" y1="205" x2="720" y2="205" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="340" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="382.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="400.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">count fast/successful traces retained specifically → well under 90 (roughly 5-15)</text>
  <text x="490.0" y="418.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">a count near 90 would mean baseline-sample is unreachable — every trace retained regardless of</text>
  <text x="490.0" y="436.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">sampling percentage, defeating tail sampling's cost-control purpose</text>
  <line x1="60" y1="510" x2="100" y2="510" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="514" font-size="11" fill="#33415c">Traffic mix sent</text>
  <line x1="282" y1="510" x2="322" y2="510" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="330" y="514" font-size="11" fill="#166534">Correctly sampled result</text>
  <line x1="576" y1="510" x2="616" y2="510" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="624" y="514" font-size="11" fill="#b91c1c">Misconfiguration this test catches</text>
</svg>
