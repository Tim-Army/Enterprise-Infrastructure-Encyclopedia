<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab topology: an OpenTelemetry Collector pipeline exporting to Prometheus and Jaeger, tested against a Jaeger outage</title>
  <desc>
    A synthetic trace sent to the Collector's OTLP HTTP receiver is exported to Jaeger and confirmed via the Jaeger UI search; otelcol_receiver_accepted_spans_total in Prometheus confirms at least one span was accepted end to end. As a negative test, the Jaeger container is stopped and another trace is sent; the Collector still returns HTTP 200 to the sender rather than erroring, and the Collector's own self-telemetry shows the otlp/jaeger exporter's queue size growing nonzero with each additional send — the buffering-under-backpressure behavior. Restarting Jaeger drains the queue back toward zero within the configured retry interval.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: OpenTelemetry Collector Buffering Under Backend Backpressure</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A synthetic trace reaches Jaeger end to end; stopping Jaeger doesn't error the sender, it grows the exporter queue instead</text>
  <rect x="60" y="150" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Synthetic trace (curl)</text>
  <text x="170.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">OTLP HTTP :4318</text>
  <rect x="370" y="130" width="220" height="140" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="177.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">OTel Collector</text>
  <text x="480.0" y="195.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">receivers → batch processor</text>
  <text x="480.0" y="213.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">exporters: prometheus, otlp/jaeger</text>
  <text x="480.0" y="231.6" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">self-telemetry :8888</text>
  <rect x="700" y="130" width="220" height="70" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="160.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Prometheus</text>
  <text x="810.0" y="178.4" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">accepted_spans_total ≥ 1</text>
  <rect x="700" y="230" width="220" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="261.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Jaeger (negative test)</text>
  <text x="810.0" y="279.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">stopped → queue grows</text>
  <text x="810.0" y="297.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">restarted → queue drains</text>
  <line x1="280" y1="200" x2="370" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="590" y1="175" x2="700" y2="165" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <line x1="590" y1="230" x2="700" y2="265" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="400" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="440.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">curl to the OTLP receiver still returns 200 while Jaeger is down — the sender never sees the backend outage;</text>
  <text x="490.0" y="458.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">otelcol_exporter_queue_size for otlp/jaeger is the signal that reveals the backpressure instead.</text>
  <line x1="60" y1="530" x2="100" y2="530" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="534" font-size="11" fill="#33415c">Trace ingestion</text>
  <line x1="273" y1="530" x2="313" y2="530" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="321" y="534" font-size="11" fill="#166534">Healthy export path</text>
  <line x1="522" y1="530" x2="562" y2="530" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="570" y="534" font-size="11" fill="#b91c1c">Backend outage (buffered)</text>
</svg>
