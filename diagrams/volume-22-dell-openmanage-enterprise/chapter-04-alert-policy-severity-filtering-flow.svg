<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: an alert policy forwarding qualifying events to a syslog listener, cross-checked against the job engine's execution history, tested against a stricter severity-scoped policy</title>
  <desc>
    An alert policy scoped to the lab device group, matching Warning-and-above severity, forwards a test event to a syslog listener; stopping the lab host's SNMP agent and forcing a refresh produces a qualifying event that appears both in the syslog listener's output and the OME console's alert log. Querying the job engine for the corresponding refresh job's execution history shows a status consistent with the device becoming unreachable. As a negative test, a second, otherwise identical policy scoped to Critical-only severity is exercised against the same event; because a stopped SNMP agent typically registers below Critical severity, no line appears in the syslog listener for this second policy, confirming severity filtering correctly suppresses a non-matching event.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: Severity Filtering Suppresses a Below-Threshold Event Rather Than Forwarding Everything</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A Warning-and-above alert policy forwards a real event to syslog; an identical Critical-only policy correctly stays silent for the same event</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Alert policy: Warning+</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">SNMP agent stopped → event fires</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">→ syslog line + console alert</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">JobService/Jobs query</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">refresh job execution history</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ status: unreachable</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">Critical-only policy,</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same below-Critical event</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ no syslog line</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the same underlying event is forwarded by the Warning+ policy and suppressed by the Critical-only</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">policy — proving severity scope is enforced per policy, not applied globally to every forward action.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Qualifying event forwarded</text>
  <line x1="372" y1="460" x2="412" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="420" y="464" font-size="11" fill="#166534">Job engine cross-check</text>
  <line x1="648" y1="460" x2="688" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="696" y="464" font-size="11" fill="#b91c1c">Suppressed by severity scope</text>
</svg>
