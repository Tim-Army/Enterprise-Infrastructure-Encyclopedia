<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab flow: a scoped Viewer-tier local account created via the REST API, authenticated successfully, then tested against an administrative action it should not be permitted to perform</title>
  <desc>
    A lab-only CA-signed certificate is generated to practice the certificate-replacement workflow, and a Viewer-tier local account is created via the account-creation script, scoped to an empty test device group. Authenticating that account directly against the session endpoint returns an HTTP 201 with a valid X-Auth-Token, confirming the restricted account can log in normally. As a negative test, that same Viewer-tier token is used to attempt creating a second local account, an administrative action outside its role; the API returns HTTP 403 Forbidden, confirming the role boundary is enforced by the server rather than merely hidden in the console UI. Three deliberately failed logins afterward also correctly lock the account.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: A Viewer-Tier Token Is Rejected With 403 When It Tries to Create an Account</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A least-privilege scoped account authenticates normally but is denied the one administrative action its role should not permit</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">ome_create_scoped_user.py</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">labviewer, Viewer role,</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">scoped to lab-scope-test group</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">POST /SessionService/Sessions</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">as labviewer</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ 201, X-Auth-Token issued</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">labviewer token attempts</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">POST /AccountService/Accounts</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ 403 Forbidden</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">three deliberately failed labviewer logins afterward correctly lock the account in the user</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">administration screen, confirming the lockout policy is active alongside the role boundary.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Scoped account creation</text>
  <line x1="345" y1="460" x2="385" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="464" font-size="11" fill="#166534">Permitted authentication</text>
  <line x1="639" y1="460" x2="679" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="687" y="464" font-size="11" fill="#b91c1c">Denied administrative action</text>
</svg>
