<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: an envelope-encryption round trip verified byte-for-byte, then an authenticated-encryption tamper rejection</title>
  <desc>
    envelope_encrypt.py encrypts record.txt into record.enc, a JSON envelope carrying data_nonce, ciphertext, wrapped_dek, and kek_nonce. Decrypting produces output identical to the original (diff shows no output). As a negative test, the ciphertext field is tampered by flipping its last character; attempting to decrypt the tampered envelope raises cryptography.exceptions.InvalidTag and exits nonzero — AES-GCM's authentication tag detects the post-encryption modification and refuses to produce output, rather than silently returning corrupted plaintext. No output file is written at all, confirming the failure occurs before any potentially corrupted plaintext reaches disk.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: Envelope Encryption Round-Trip and an AES-GCM Tamper Rejection</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Decryption matches the original exactly; a single flipped ciphertext byte raises InvalidTag before any output is written</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">record.txt</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">envelope_encrypt.py encrypt</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ record.enc (DEK wrapped by KEK)</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">decrypt (untampered)</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">diff: no output</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">MATCH: round-trip successful</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">ciphertext byte flipped</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">decrypt → InvalidTag, exit ≠ 0</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">no output file is written at all — the authentication tag check fails before any potentially corrupted</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">plaintext could reach disk, the same tamper-evidence property Chapter 7's custody hash relies on.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Encrypted envelope</text>
  <line x1="300" y1="460" x2="340" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="348" y="464" font-size="11" fill="#166534">Verified round trip</text>
  <line x1="549" y1="460" x2="589" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="597" y="464" font-size="11" fill="#b91c1c">Tamper rejected (AES-GCM tag)</text>
</svg>
