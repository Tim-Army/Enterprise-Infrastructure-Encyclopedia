<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: a log-correlation rule detecting a credential-stuffing success pattern, tuned against benign and boundary datasets</title>
  <desc>
    detect_credential_stuffing.py flags a user with 8 or more authentication failures followed by a success within a 15-minute window. Against the sample dataset, bob@corp.example (8 failures then a success, all within under a minute) triggers an ALERT; alice@corp.example's single clean sign-in does not. As a negative test, a benign dataset with the same user's failures spread across hours (a plausible forgotten-password pattern) produces no alert, and trimming the malicious dataset to exactly 7 failures (one below the threshold) also produces no alert — confirming the rule's tuning correctly distinguishes automated credential stuffing from benign retry behavior without over-firing at the threshold boundary.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: Credential-Stuffing Detection Tuned Against a Benign Retry Pattern</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Eight tightly clustered failures then a success trigger an alert; the same failures spread over hours do not</text>
  <rect x="60" y="140" width="240" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">bob@corp.example</text>
  <text x="180.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">8 failures + success, &lt;1 min</text>
  <text x="180.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">ALERT: credential stuffing</text>
  <rect x="380" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">alice@corp.example</text>
  <text x="500.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">single clean sign-in</text>
  <text x="500.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">no alert</text>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Tests</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">failures spread over hours</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">or only 7 (below threshold)</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ no alert in either case</text>
  <line x1="300" y1="200" x2="380" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="620" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="360" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="400.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the 15-minute window and 8-failure threshold together distinguish tightly clustered automated attempts</text>
  <text x="490.0" y="418.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">from widely spaced, plausible human retry behavior — confirmed at the exact tuning boundary.</text>
  <line x1="60" y1="490" x2="100" y2="490" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="494" font-size="11" fill="#33415c">Detected pattern</text>
  <line x1="282" y1="490" x2="322" y2="490" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="330" y="494" font-size="11" fill="#166534">Benign, no alert</text>
  <line x1="504" y1="490" x2="544" y2="490" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="552" y="494" font-size="11" fill="#b91c1c">Tuned to avoid false positives</text>
</svg>
