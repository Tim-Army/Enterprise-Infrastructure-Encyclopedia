<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: a continuous control-validation scorecard covering segmentation, JIT access, and backup restore, gating on exit code</title>
  <desc>
    control_validation.py checks three simulated controls — default-deny segmentation, no standing privileged access (all grants time-boxed), and a verified backup restore — all printing [PASS], with a summary of 3 passed, 0 failed and exit 0. As a negative test, a standing (non-expiring) backup-admin grant is added, simulating an emergency-access exception that was never converted back to time-boxed JIT access; re-running now shows CTL-002-01 as [FAIL], with the summary dropping to 2 passed, 1 failed and exit 1 — exactly the nonzero exit a CI pipeline would use to block promotion. Removing the standing grant restores the scorecard to 3 passed, 0 failed.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: A Continuous Control-Validation Scorecard That Gates CI/CD Promotion</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Three simulated controls pass cleanly; a reintroduced standing-access regression flips one check and the exit code</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">control_validation.py</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">segmentation, JIT access,</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">backup restore — all [PASS]</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Baseline scorecard</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">3 passed, 0 failed</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">exit 0</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">standing backup-admin grant</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">CTL-002-01 [FAIL]</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">2 passed, 1 failed — exit 1</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="350" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="390.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">a CI pipeline consuming this scorecard correctly blocks promotion on the nonzero exit code;</text>
  <text x="490.0" y="408.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">removing the standing grant restores 3 passed, 0 failed and exit 0.</text>
  <line x1="60" y1="480" x2="100" y2="480" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="484" font-size="11" fill="#33415c">Simulated controls</text>
  <line x1="300" y1="480" x2="340" y2="480" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="348" y="484" font-size="11" fill="#166534">Healthy scorecard</text>
  <line x1="531" y1="480" x2="571" y2="480" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="579" y="484" font-size="11" fill="#b91c1c">Regression (CI-blocking)</text>
</svg>
