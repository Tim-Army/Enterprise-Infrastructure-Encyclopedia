<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: a chain-of-custody evidence log recording a SHA-256 baseline hash and detecting subsequent tampering</title>
  <desc>
    evidence_custody.py logs the initial collection of host-snapshot.txt as evidence EV-2026-0031, recording a SHA-256 digest into custody_log.csv. Verifying against the unmodified artifact prints 'Integrity verified'. As a negative test, one line is appended to the artifact after collection; re-running verify now exits with 'INTEGRITY FAILURE: EV-2026-0031 hash mismatch', showing the expected and actual hashes differ, and a nonzero exit code — demonstrating the custody log detects post-collection tampering rather than silently accepting a modified artifact. Restoring the artifact to its original state confirms verification succeeds again, deterministically.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Chain-of-Custody Hashing That Detects Post-Collection Tampering</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The unmodified artifact verifies cleanly; a single appended line produces a hash mismatch and a nonzero exit</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">host-snapshot.txt</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">log EV-2026-0031</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">SHA-256 baseline recorded</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">verify (unmodified)</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Integrity verified</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">hash matches baseline</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">line appended post-collection</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">INTEGRITY FAILURE, exit ≠ 0</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">restoring the artifact to its original bytes and re-verifying succeeds again — the hash comparison is</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">exact and reproducible, not a one-time check.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Collection + baseline</text>
  <line x1="327" y1="460" x2="367" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="375" y="464" font-size="11" fill="#166534">Verified, untampered</text>
  <line x1="585" y1="460" x2="625" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="633" y="464" font-size="11" fill="#b91c1c">Detected tampering</text>
</svg>
