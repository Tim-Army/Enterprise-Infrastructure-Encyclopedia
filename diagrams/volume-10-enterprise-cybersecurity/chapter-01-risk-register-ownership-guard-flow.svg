<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: computing ranked residual risk scores from a register, guarded by an ownership validation check</title>
  <desc>
    compute_risk.py ranks three sample risks by residual score: RISK-0144 (no mapped controls) shows a residual score equal to its inherent score, while RISK-0142 (two mapped controls) shows a materially reduced residual score. As a negative test, a validate() guard is patched in ahead of main() to require every risk have an assigned owner; re-running against the unmodified register exits with 'VALIDATION FAILED: RISK-0144 has no owner' and a nonzero exit code, blocking the ranked report from printing at all until the governance gap is fixed. Assigning an owner and re-running restores the full ranked output.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: Risk-Register Scoring with a Data-Quality Guard</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Residual scores rank correctly by control effectiveness; an unowned risk blocks the report from ever printing</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">risk_register.csv</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">3 risks, likelihood × impact</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">RISK-0144: no owner, no controls</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">compute_risk.py</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">ranked residual scores</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">RISK-0144 = inherent (no controls)</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">validate() guard added</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">VALIDATION FAILED, exit 1</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="340" width="860" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="385.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">RISK-0144 has no owner — the ranked report never prints until an owner is assigned and the script re-run</text>
  <text x="490.0" y="403.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">confirming the governance rule that every risk must be assigned is mechanically enforced, not advisory.</text>
  <line x1="60" y1="480" x2="100" y2="480" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="484" font-size="11" fill="#33415c">Register input</text>
  <line x1="264" y1="480" x2="304" y2="480" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="312" y="484" font-size="11" fill="#166534">Ranked, valid output</text>
  <line x1="522" y1="480" x2="562" y2="480" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="570" y="484" font-size="11" fill="#b91c1c">Blocked by ownership guard</text>
</svg>
