<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: CVSS/EPSS/KEV-aware vulnerability prioritization, guarded by a KEV SLA-overdue check</title>
  <desc>
    prioritize_vulns.py ranks three sample findings: CVE-2025-11001 (CVSS 7.5, but KEV-listed, EPSS 0.91, critical asset) ranks first with a 3-day SLA despite having the lowest raw CVSS score, while CVE-2025-10877 (CVSS 9.8, EPSS 0.02, not KEV-listed) ranks last with a 30-day SLA — demonstrating that risk-based prioritization can invert a raw-severity ordering. As a negative test, a check_overdue() guard is patched in ahead of main(); because CVE-2025-11001 was discovered 8 days before the check date against a 3-day KEV SLA, the script exits with 'OVERDUE: ... exceeding the 3-day KEV SLA' before any ranked output prints. Updating the discovery date restores the full ranked report.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: Risk-Based Vulnerability Prioritization That Inverts Raw CVSS Ranking</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A KEV-listed 7.5 outranks an unexploited 9.8; an overdue KEV finding blocks the ranked report from printing</text>
  <rect x="60" y="140" width="260" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="191.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">findings.csv (3 CVEs)</text>
  <text x="190.0" y="209.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">CVE-2025-11001: CVSS 7.5, KEV, EPSS .91</text>
  <text x="190.0" y="227.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">CVE-2025-10877: CVSS 9.8, no KEV, EPSS .02</text>
  <rect x="400" y="140" width="240" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="191.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">prioritize_vulns.py</text>
  <text x="520.0" y="209.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">#1: CVE-2025-11001, sla=3d</text>
  <text x="520.0" y="227.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">#3: CVE-2025-10877, sla=30d</text>
  <line x1="320" y1="205" x2="400" y2="205" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="182.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="200.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">check_overdue() guard added</text>
  <text x="810.0" y="218.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">CVE-2025-11001: 8d &gt; 3d SLA</text>
  <text x="810.0" y="236.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">OVERDUE, exit 1</text>
  <line x1="640" y1="205" x2="700" y2="205" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="350" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="390.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the guard raises before any ranked output prints, so an overdue critical finding cannot be silently</text>
  <text x="490.0" y="408.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">buried in a general report; updating the discovery date and re-running restores the full report.</text>
  <line x1="60" y1="480" x2="100" y2="480" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="484" font-size="11" fill="#33415c">Sample findings</text>
  <line x1="273" y1="480" x2="313" y2="480" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="321" y="484" font-size="11" fill="#166534">Risk-ranked output</text>
  <line x1="513" y1="480" x2="553" y2="480" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="561" y="484" font-size="11" fill="#b91c1c">SLA-overdue guard (blocks)</text>
</svg>
