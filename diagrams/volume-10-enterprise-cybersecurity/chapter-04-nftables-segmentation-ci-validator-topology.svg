<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab topology: an nftables default-drop segmentation policy validated by permitted and denied connectivity, plus a CI policy check</title>
  <desc>
    lab-segmentation.nft implements a default-drop inbound chain allowing only established/related traffic, loopback, TCP 22, and TCP 443, logging every other drop with prefix SEG-DENY. From a second host, a request to the permitted port 443 succeeds. As a negative test, a request to an unlisted port (8080) times out or is refused, and dmesg shows the SEG-DENY log entry, confirming both enforcement and the audit trail. Separately, validate_segmentation.py passes cleanly against a compliant policy.yaml but fails with 'no explicit default-deny egress rule' and a nonzero exit against a broken-policy.yaml missing that rule — the same fail-closed CI gate pattern used for the OSCAP remediation review.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: nftables Host Segmentation and a CI Policy Validator</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Only SSH and HTTPS pass; every other port is dropped and logged, and a missing default-deny rule fails CI</text>
  <rect x="60" y="140" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="185.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Second host</text>
  <text x="170.0" y="203.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">curl :443 and :8080</text>
  <rect x="370" y="110" width="240" height="160" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="167.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">lab VM — nftables</text>
  <text x="490.0" y="185.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">policy drop (default)</text>
  <text x="490.0" y="203.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">accept: 22/tcp, 443/tcp</text>
  <text x="490.0" y="221.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">drop + log SEG-DENY: else</text>
  <line x1="280" y1="175" x2="370" y2="175" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="331.0" y="175.0" font-size="10.5" fill="#166534">443: 200 OK</text>
  <line x1="280" y1="210" x2="370" y2="245" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="331.0" y="227.5" font-size="10.5" fill="#b91c1c">8080: blocked + SEG-DENY logged</text>
  <rect x="700" y="140" width="220" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="810.0" y="185.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">dmesg | grep SEG-DENY</text>
  <text x="810.0" y="203.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">logged drop confirms audit trail</text>
  <line x1="610" y1="220" x2="700" y2="190" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="80" y="350" width="800" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="382.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CI Policy Validator (negative test)</text>
  <text x="480.0" y="400.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">policy.yaml (default-deny egress present) → validate_segmentation.py: PASS, exit 0</text>
  <text x="480.0" y="418.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">broken-policy.yaml (default-deny egress removed) → &quot;POLICY ERROR: no explicit default-deny</text>
  <text x="480.0" y="436.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">egress rule&quot;, exit 1 — caught before it would reach production</text>
  <line x1="80" y1="610" x2="120" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="614" font-size="11" fill="#33415c">Test client</text>
  <line x1="257" y1="610" x2="297" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="305" y="614" font-size="11" fill="#166534">Permitted path</text>
  <line x1="461" y1="610" x2="501" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="509" y="614" font-size="11" fill="#b91c1c">Denied path / CI catch</text>
</svg>
