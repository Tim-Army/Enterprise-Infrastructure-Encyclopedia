<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: an on-demand/reserved/spot purchasing-mix calculation validated against observed demand</title>
  <desc>
    From observed_minimum_instances=6, observed_peak_instances=30, and proposed_reserved_floor=6, a Terraform check block asserts the reserved floor never exceeds observed minimum demand. The default plan passes with no check failure, and the purchasing_mix output shows reserved=6, on_demand=8, spot=16, total_peak=30. As a negative test, re-planning with proposed_reserved_floor=12 (double the observed minimum) fails the check, reporting that the proposal commits to paying for committed capacity that is never used — an automated guardrail against over-committing reserved capacity before any real financial commitment is made.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: Purchasing-Mix Calculator with a Reserved-Floor Guardrail</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A reserved floor of 6 (at the observed minimum) passes; a floor of 12 commits to unused capacity</text>
  <rect x="60" y="140" width="260" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="182.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Observed demand</text>
  <text x="190.0" y="200.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">minimum: 6 instances</text>
  <text x="190.0" y="218.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">peak: 30 instances</text>
  <text x="190.0" y="236.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">proposed reserved floor: 6</text>
  <rect x="380" y="140" width="240" height="130" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="500.0" y="191.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">check &quot;reserved_floor_not_oversized&quot;</text>
  <text x="500.0" y="209.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">floor ≤ observed minimum?</text>
  <text x="500.0" y="227.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">terraform plan</text>
  <line x1="320" y1="205" x2="380" y2="205" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="680" y="140" width="240" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="800.0" y="191.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">purchasing_mix output</text>
  <text x="800.0" y="209.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">reserved=6, on_demand=8</text>
  <text x="800.0" y="227.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">spot=16 (no check failure)</text>
  <line x1="620" y1="205" x2="680" y2="205" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="340" width="860" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="377.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="395.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">re-plan with proposed_reserved_floor=12 — double the observed minimum of 6</text>
  <text x="490.0" y="413.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">check fails: &quot;this commits to paying for capacity that is never used.&quot;</text>
  <text x="490.0" y="431.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">catches an over-committed reserved purchase before any real financial commitment</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Observed input</text>
  <line x1="264" y1="500" x2="304" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="312" y="504" font-size="11" fill="#166534">Validated purchasing mix</text>
  <line x1="558" y1="500" x2="598" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="606" y="504" font-size="11" fill="#b91c1c">Over-committed floor (caught)</text>
</svg>
