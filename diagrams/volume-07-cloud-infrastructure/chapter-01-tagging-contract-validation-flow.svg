<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: a Terraform variable validation contract enforced before a simulated resource is created</title>
  <desc>
    A fully local Terraform root module (local and random providers only, no cloud account) defines a validated environment variable (must be dev/test/stage/prod) and owner_tag. Applying with environment=dev and owner_tag=platform-team succeeds, creating a local_file standing in for a real cloud resource, stamped with the validated tags. As a negative test, applying with environment=production (not in the allowed set) is refused before any resource — simulated or real — is touched, with Terraform reporting the exact custom validation error message.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: Provider-Neutral Tagging Contract Enforced at the Module Boundary</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A local Terraform module validates environment/owner_tag before simulating any resource creation</text>
  <rect x="60" y="130" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Input variables</text>
  <text x="190.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">environment=dev</text>
  <text x="190.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">owner_tag=platform-team</text>
  <rect x="380" y="130" width="260" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="510.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Validation contract</text>
  <text x="510.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">variables.tf: validation blocks</text>
  <text x="510.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">environment ∈ {dev,test,stage,prod}</text>
  <line x1="320" y1="185" x2="380" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">local_file resource</text>
  <text x="810.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Apply complete: 2 added</text>
  <text x="810.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">tags stamped into JSON</text>
  <line x1="640" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="840" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="380.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">apply with environment=production (not in the allowed set)</text>
  <text x="480.0" y="398.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">refused before any resource is touched: &quot;environment must be one of: dev, test, stage, prod.&quot;</text>
  <text x="480.0" y="416.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">policy enforcement at the module boundary, not after resource creation</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Input</text>
  <line x1="183" y1="500" x2="223" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="231" y="504" font-size="11" fill="#166534">Validated + applied</text>
  <line x1="432" y1="500" x2="472" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="480" y="504" font-size="11" fill="#b91c1c">Rejected at the boundary</text>
</svg>
