<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: TCP handshake options, RTT, and throughput analyzed on a real transfer, then contrasted against a transfer with deliberately induced packet loss</title>
  <desc>
    A 10+ MB file transfer's SYN and SYN-ACK show Window Scale and SACK Permitted options in the handshake; TCP Stream Graphs plot RTT and throughput for the transfer, and a tcp.analysis.retransmission filter records a baseline count (zero is a valid, clean-network result). As a negative test, tc netem introduces 2% artificial loss on the capture interface and the transfer repeats; the same retransmission filter now shows a nonzero count in the new capture, contrasted directly against the loss-free baseline — confirming Wireshark's expert-flag analysis correctly detects retransmissions caused by genuinely induced loss, not just reporting a fixed value regardless of network conditions.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: Expert-Flag Retransmission Analysis Confirmed Against Induced Loss</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A clean baseline transfer shows the handshake options and RTT/throughput graphs; injecting 2% loss makes retransmissions appear where they didn't before</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Baseline transfer (10+ MB)</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">SYN/SYN-ACK: Window Scale + SACK</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">retransmissions: baseline count</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">RTT + Throughput graphs</text>
  <text x="520.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">plotted for the transfer stream</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">tc netem: 2% loss injected</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">transfer repeated</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ nonzero retransmissions</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the retransmission count rises specifically because loss was induced — contrasted against the</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">loss-free baseline, confirming the expert-flag analysis responds to actual network conditions.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Clean baseline transfer</text>
  <line x1="345" y1="460" x2="385" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="464" font-size="11" fill="#166534">Performance graphs</text>
  <line x1="585" y1="460" x2="625" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="633" y="464" font-size="11" fill="#b91c1c">Induced loss (detected)</text>
</svg>
