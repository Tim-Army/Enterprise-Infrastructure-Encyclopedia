<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab flow: a ring-buffer capture with a BPF exclusion filter, validated for both correct exclusion and correctly narrow scope</title>
  <desc>
    A dumpcap ring-buffer capture bounded to five 2 MB files, filtered to exclude port 22, rotates correctly (never more than five files present) while traffic is generated to force rotation. Filtering the resulting files for tcp.port==22 returns nothing, confirming SSH management traffic was discarded by the BPF capture filter before it ever reached disk — even though the SSH session running these commands was active throughout. As a negative test, the same file is filtered for DNS traffic instead; DNS packets do appear, confirming the exclusion was specific to port 22 rather than an accidentally broad filter that discarded everything.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: A Capture Filter Proven Specific, Not Accidentally Broad</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Port 22 traffic never reaches disk even during an active SSH session; DNS traffic from the same window proves the exclusion wasn't overreaching</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">dumpcap ring buffer</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">5 files x 2MB, filter: not port 22</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">rotation confirmed (≤5 files)</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">tcp.port==22 check</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ no output</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(SSH excluded at capture time)</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">dns filter check on the</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same file → DNS DOES appear</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">DNS traffic appearing in the same capture confirms the exclusion filter targeted port 22 specifically —</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">not an overly broad rule that happened to also discard everything else.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Bounded ring-buffer capture</text>
  <line x1="381" y1="460" x2="421" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="429" y="464" font-size="11" fill="#166534">Confirmed exclusion</text>
  <line x1="630" y1="460" x2="670" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="678" y="464" font-size="11" fill="#b91c1c">Confirmed narrow scope</text>
</svg>
