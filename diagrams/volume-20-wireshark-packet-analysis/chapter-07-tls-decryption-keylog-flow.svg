<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: an HTTPS session decrypted in Wireshark via SSLKEYLOGFILE, tested against a cleared key log preference</title>
  <desc>
    With SSLKEYLOGFILE set, an HTTPS request from an instrumented client populates a key log file with at least one CLIENT_HANDSHAKE_TRAFFIC_SECRET or CLIENT_RANDOM line. Pointing Wireshark's TLS pre-master-secret log preference at that file and filtering for http reveals decrypted HTTP request/response frames, with a populated http.time value for the response. As a negative test, the TLS key log preference is cleared and the capture reloaded; the same http filter now matches nothing — the identical Application Data records dissect only as encrypted TLS — confirming decryption genuinely depended on the configured key log rather than some other mechanism or cached state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: HTTPS Decryption Genuinely Depends on the Configured Key Log</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">HTTP frames and response timing appear once the TLS key log is configured; clearing that one setting turns them back into opaque Application Data</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">SSLKEYLOGFILE set</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">HTTPS request generates</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">key log entries</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Key log configured in Wireshark</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">http filter → decrypted frames</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">http.time populated</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">key log preference cleared</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ http filter: no matches</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">(encrypted Application Data only)</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">removing only the key log preference — nothing else — collapses decryption entirely, confirming</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">it was the specific mechanism responsible, not an artifact of some other Wireshark setting.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Key log generation</text>
  <line x1="300" y1="460" x2="340" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="348" y="464" font-size="11" fill="#166534">Decrypted HTTP visibility</text>
  <line x1="603" y1="460" x2="643" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="651" y="464" font-size="11" fill="#b91c1c">Key log removed (re-encrypted view)</text>
</svg>
