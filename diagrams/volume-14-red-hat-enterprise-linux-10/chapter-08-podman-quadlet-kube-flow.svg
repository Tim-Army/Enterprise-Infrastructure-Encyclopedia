<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: a custom container image run rootless as a Quadlet service, grouped into a pod, and recreated from exported Kubernetes YAML</title>
  <desc>
    A custom UBI-based image runs as a rootless, Quadlet-managed systemd --user service publishing port 8091; curl confirms the service responds. A two-container pod (app plus sidecar) shares one network namespace, and the sidecar reaches the app over localhost. podman generate kube exports the pod as Kubernetes-compatible YAML; the pod is removed entirely and podman play kube recreates both containers running again purely from that file. As a negative test, running the same image rootless with -p 80:80 fails with a permission error binding the privileged port — the documented, deliberate limitation of rootless Podman without additional configuration.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: A Rootless Quadlet Pod Rebuilt Entirely From Its Own Exported YAML</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The sidecar reaches the app over the shared pod network; rootless Podman still cannot bind port 80 without extra configuration</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Quadlet: lab-app.container</text>
  <text x="180.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">rootless, systemd --user</text>
  <text x="180.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">curl :8091 → responds</text>
  <rect x="380" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lab-pod (app + sidecar)</text>
  <text x="500.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">shared network namespace</text>
  <text x="500.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">sidecar curls app via localhost</text>
  <line x1="300" y1="185" x2="380" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">generate kube → play kube</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">pod removed, then rebuilt</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">entirely from exported YAML</text>
  <line x1="620" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="860" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="366.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="384.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">rootless podman run -p 80:80 → permission error binding the privileged port</text>
  <text x="490.0" y="402.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">the documented, deliberate limitation of running without host root, not a misconfiguration</text>
  <line x1="60" y1="470" x2="100" y2="470" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="474" font-size="11" fill="#33415c">Rootless service</text>
  <line x1="282" y1="470" x2="322" y2="470" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="330" y="474" font-size="11" fill="#166534">Pod / kube portability</text>
</svg>
