<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab topology: a scoped operator account with delegated sudo and source-restricted SSH, tested against a brute-force lockout</title>
  <desc>
    operator1, a member of the webteam group, authenticates via SSH key with no password prompt, and sudo -l confirms exactly two permitted systemctl commands, not full root. A static IP on a second interface has SSH restricted by a firewalld rich rule to the 192.0.2.0/24 client subnet, with the plain ssh service removed from that zone's service list. As a negative test, five repeated wrong-password login attempts are sent against operator1; faillock records the failures and, once the configured threshold is exceeded, temporarily locks the account. Resetting the lockout with faillock --reset restores normal access.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: Scoped Sudo, Restricted SSH, and a Verified Account Lockout</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">operator1 authenticates by key with a two-command sudo grant; repeated bad passwords actually trip faillock</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">operator1 (webteam group)</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">SSH key auth, no password prompt</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">sudo -l: 2 commands only</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">firewalld rich rule</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">SSH scoped to 192.0.2.0/24</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">plain ssh service removed</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">5x wrong password attempts</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">faillock: account locked</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">faillock --user operator1 shows recorded failures and the temporary lock; --reset restores normal</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">access — confirming the lockout policy is enforced by faillock, not merely documented.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Scoped identity</text>
  <line x1="273" y1="460" x2="313" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="321" y="464" font-size="11" fill="#166534">Network-restricted access</text>
  <line x1="576" y1="460" x2="616" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="624" y="464" font-size="11" fill="#b91c1c">Verified lockout</text>
</svg>
