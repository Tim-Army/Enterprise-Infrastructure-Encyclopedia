<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab topology: an LVM-backed XFS filesystem exported over NFS, extended live and tested against a client-restriction negative test</title>
  <desc>
    /dev/sdb becomes vg_lab/lv_share, formatted XFS and mounted at /srv/nfs/lab-share; lvextend plus xfs_growfs takes it from 4G to approximately 6G with no unmount required. A swap logical volume joins the same volume group. The filesystem exports to 10.10.10.0/24 over NFS, and a client on that subnet mounts it and writes a test file successfully. As a negative test, the export is narrowed to a different subnet (192.0.2.0/24) that the same client is not on; re-mounting from that client now fails with a permission or access error, confirming the export's client restriction is enforced by the NFS server, not merely documented in /etc/exports.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: An LVM-Backed NFS Export Whose Client Restriction Is Actually Enforced</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The volume grows live from 4G to 6G with no unmount, and narrowing the export to a different subnet refuses the same client's mount</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">vg_lab/lv_share (XFS)</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">4G → live-extended to 6G</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">+ lv_swap in same VG</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">NFS export: 10.10.10.0/24</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">client on that subnet mounts</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">writes test.txt successfully</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">export narrowed to 192.0.2.0/24</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same client's mount refused</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the mount attempt fails with a permission/access error — confirming the exported subnet restriction</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">is enforced by nfs-server itself, not merely a line in a configuration file.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">LVM growth</text>
  <line x1="228" y1="460" x2="268" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="276" y="464" font-size="11" fill="#166534">Permitted NFS client</text>
  <line x1="486" y1="460" x2="526" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="534" y="464" font-size="11" fill="#b91c1c">Denied NFS client</text>
</svg>
