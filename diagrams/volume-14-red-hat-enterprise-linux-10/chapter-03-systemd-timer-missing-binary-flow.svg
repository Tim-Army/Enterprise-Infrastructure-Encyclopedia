<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: a custom systemd service and timer observed through the journal, contrasted with a unit whose ExecStart path does not exist</title>
  <desc>
    heartbeat.timer fires heartbeat.service every minute; after waiting past the first interval, the journal shows at least one heartbeat line and systemctl status reports the oneshot unit as inactive (dead) with exit code 0 between runs. As a negative test, broken-demo.service points ExecStart at a script that does not exist; starting it reports failed with a status such as 203/EXEC, and the journal shows systemd could not execute the configured path at all — a distinct failure signature from an application starting and then crashing on its own.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: A Missing-Binary systemd Failure Surfaced Distinctly From an App Crash</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">heartbeat.timer runs cleanly every minute; a unit pointed at a nonexistent script fails with a distinct 203/EXEC status</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">heartbeat.timer</text>
  <text x="190.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">fires heartbeat.service every 1min</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">journalctl -u heartbeat.service</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">heartbeat lines present</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">status: inactive (dead), exit 0</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">broken-demo.service</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">ExecStart → nonexistent script</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">status: failed (203/EXEC)</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">203/EXEC means systemd could not even execute the configured binary — a distinct signature from an</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">application that started and then crashed, and one worth recognizing immediately in the journal.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Working timer + service</text>
  <line x1="345" y1="460" x2="385" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="464" font-size="11" fill="#166534">Verified via journal</text>
  <line x1="603" y1="460" x2="643" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="651" y="464" font-size="11" fill="#b91c1c">Missing-binary failure</text>
</svg>
