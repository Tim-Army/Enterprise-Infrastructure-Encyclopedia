<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: local repository configuration and Cockpit access, proven to depend on socket activation rather than the firewall rule alone</title>
  <desc>
    Local repositories point at the mounted RHEL 10 ISO's BaseOS and AppStream content sets; dnf repolist confirms both resolve with a nonzero package count. Cockpit and cockpit-storaged install from those repos, cockpit.socket is enabled, and the firewall opens the cockpit service; a browser reaches the Overview page at port 9090 showing hostname, uptime, and resource graphs. As a negative test, cockpit.socket is stopped while the firewall rule stays in place; a curl request to the same port now fails to connect, confirming that socket activation — not just the open firewall port — is what actually provides access.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: Cockpit Access Depends on Socket Activation, Not the Firewall Rule Alone</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Opening port 9090 is not enough by itself — stopping cockpit.socket makes the console unreachable even with the port still open</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Local ISO repositories</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">BaseOS + AppStream</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dnf repolist: nonzero packages</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">cockpit.socket + firewall</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">both enabled → :9090 reachable</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Overview page loads in browser</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">cockpit.socket stopped</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">firewall port still open</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">curl :9090 → connection failed</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the firewall rule alone never provided the service — socket activation is the actual control that</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">makes Cockpit reachable, and stopping it removes access even with the port still open.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Repository source</text>
  <line x1="291" y1="460" x2="331" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="339" y="464" font-size="11" fill="#166534">Working access path</text>
  <line x1="540" y1="460" x2="580" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="588" y="464" font-size="11" fill="#b91c1c">Socket stopped (negative test)</text>
</svg>
