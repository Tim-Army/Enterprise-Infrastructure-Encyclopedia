<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: a relocated web content directory triggering and then resolving an SELinux denial, plus a LUKS volume tested for plaintext leakage</title>
  <desc>
    Serving content from /data/web fails, because the directory does not carry the httpd_sys_content_t context; ausearch and sealert confirm httpd_t was denied access to the mislabeled path. semanage fcontext plus restorecon apply the correct persistent label, and the same curl request now succeeds. An ACL separately grants one non-owner user write access without touching the SELinux policy. A LUKS-encrypted loopback volume mounts and accepts a written file normally. As a negative test, the volume is unmounted and the LUKS mapping closed; searching the raw backing file for the plaintext string finds nothing, confirming the data is not recoverable from the backing file without the LUKS key.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: An SELinux Denial Fixed Persistently, and LUKS Data Confirmed Unrecoverable Without the Key</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">httpd is blocked until the content type is relabeled; the raw LUKS backing file yields no plaintext once the mapping is closed</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="180.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">/data/web (wrong context)</text>
  <text x="180.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">httpd request fails / 403</text>
  <text x="180.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">AVC denial in audit log</text>
  <rect x="380" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">semanage + restorecon</text>
  <text x="500.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">httpd_sys_content_t applied</text>
  <text x="500.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">curl now succeeds</text>
  <line x1="300" y1="185" x2="380" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="810.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">ACL grant</text>
  <text x="810.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">contentwriter: rwx via ACL</text>
  <text x="810.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">independent of SELinux policy</text>
  <rect x="60" y="320" width="400" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="260.0" y="371.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">LUKS volume (loopback)</text>
  <text x="260.0" y="389.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">cryptsetup luksFormat/luksOpen</text>
  <text x="260.0" y="407.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">mounted, file written normally</text>
  <rect x="500" y="320" width="400" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="700.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="700.0" y="380.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">unmounted, luksClose'd</text>
  <text x="700.0" y="398.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">strings on raw backing file:</text>
  <text x="700.0" y="416.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">plaintext not found (as expected)</text>
  <line x1="460" y1="385" x2="500" y2="385" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="108" y="504" font-size="11" fill="#b91c1c">Denial / negative test</text>
  <line x1="336" y1="500" x2="376" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="384" y="504" font-size="11" fill="#166534">Fixed context</text>
  <line x1="531" y1="500" x2="571" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="579" y="504" font-size="11" fill="#33415c">Independent grant / volume</text>
</svg>
