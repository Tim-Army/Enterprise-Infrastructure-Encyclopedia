<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab topology: a Kubernetes NetworkPolicy default-deny baseline enforced by Calico, then a scoped allow rule</title>
  <desc>
    client and server pods in the netpol-lab namespace initially reach each other freely (HTTP 200), with no NetworkPolicy in place. A default-deny-all policy (empty podSelector, Ingress and Egress) is applied; the same request now times out and fails, confirming Calico is actually enforcing the policy rather than it being merely configured. A scoped allow-client-to-server policy permitting only that pair on port 8080 is then added; connectivity is restored for exactly that path, while any other pod added later to the namespace remains denied by default.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: NetworkPolicy Default-Deny, Then a Scoped Allow</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Calico enforces a namespace-wide deny; only an explicit client-to-server rule restores connectivity</text>
  <rect x="80" y="150" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="195.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">client pod</text>
  <text x="190.0" y="213.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">curlimages/curl</text>
  <rect x="660" y="150" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="770.0" y="195.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">server pod</text>
  <text x="770.0" y="213.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">agnhost netexec :8080</text>
  <rect x="340" y="260" width="280" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="300.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">default-deny-all</text>
  <text x="480.0" y="318.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">podSelector: {} — Ingress+Egress</text>
  <line x1="300" y1="200" x2="340" y2="290" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="326.0" y="245.0" font-size="10.5" fill="#b91c1c">before policy: 200 OK / after: blocked</text>
  <line x1="660" y1="200" x2="620" y2="290" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="300" y="400" width="360" height="90" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="440.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">allow-client-to-server</text>
  <text x="480.0" y="458.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">scoped: client → server:8080 only</text>
  <line x1="480" y1="350" x2="480" y2="400" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="520" width="840" height="60" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="554.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">Result: client → server:8080 restored to 200 OK; every other path in the namespace remains denied by default</text>
  <line x1="60" y1="470" x2="100" y2="470" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="474" font-size="11" fill="#33415c">Pod</text>
  <line x1="165" y1="470" x2="205" y2="470" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="213" y="474" font-size="11" fill="#b91c1c">Default-deny (negative test)</text>
  <line x1="495" y1="470" x2="535" y2="470" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="543" y="474" font-size="11" fill="#166534">Scoped allow rule</text>
</svg>
