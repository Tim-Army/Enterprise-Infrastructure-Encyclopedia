<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab topology: a kind Kubernetes cluster's control-plane static pods, an etcd snapshot, and a worker-node failure test</title>
  <desc>
    A three-node kind cluster (one control plane, two workers) runs etcd, kube-apiserver, kube-scheduler, and kube-controller-manager as static pods on the control-plane node. etcd cluster health is confirmed and a snapshot is taken and verified as structurally valid. A trivial hello deployment provides observable state. As a negative test, one worker's container is stopped; the node transitions to NotReady after the default node-monitor-grace-period (roughly 40 seconds), and any pods scheduled there are marked for eviction and rescheduled onto the remaining worker. Restarting the stopped worker returns it to Ready within about a minute as kubelet re-registers.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: Three-Node kind Cluster, etcd Snapshot, and a Simulated Worker Loss</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A stopped worker transitions to NotReady after the grace period; its pods reschedule, then it self-heals on restart</text>
  <rect x="370" y="110" width="220" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="152.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">control-plane node</text>
  <text x="480.0" y="170.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">etcd, kube-apiserver</text>
  <text x="480.0" y="188.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">kube-scheduler, controller-mgr</text>
  <text x="480.0" y="206.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">etcd snapshot: verified</text>
  <rect x="80" y="300" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="200.0" y="341.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">worker (healthy)</text>
  <text x="200.0" y="359.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">hello deployment pod</text>
  <text x="200.0" y="377.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">status: Ready</text>
  <rect x="640" y="300" width="260" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="770.0" y="341.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">worker (negative test)</text>
  <text x="770.0" y="359.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">docker stop → NotReady (~40s)</text>
  <text x="770.0" y="377.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">pods evicted, rescheduled</text>
  <line x1="430" y1="240" x2="200" y2="300" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="560" y1="240" x2="770" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="320" y1="355" x2="640" y2="355" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="486.0" y="355.0" font-size="10.5" fill="#b91c1c">pods rescheduled onto surviving worker</text>
  <rect x="80" y="470" width="820" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="519.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">docker start restores the worker; kubelet re-registers and the node returns to Ready within roughly a minute</text>
  <line x1="80" y1="600" x2="120" y2="600" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="604" font-size="11" fill="#33415c">Control plane</text>
  <line x1="275" y1="600" x2="315" y2="600" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="323" y="604" font-size="11" fill="#166534">Healthy worker</text>
  <line x1="479" y1="600" x2="519" y2="600" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="527" y="604" font-size="11" fill="#b91c1c">Failed worker (negative test)</text>
</svg>
