<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab topology: a StatefulSet's stable per-ordinal storage identity, tested through pod, controller, and PVC deletion</title>
  <desc>
    data-svc-0 and data-svc-1 each write their own hostname identity to their own PVC (data-data-svc-0, data-data-svc-1), both Bound. Deleting data-svc-1's pod directly causes the StatefulSet controller to recreate it reattached to the same PVC — the identity file still reads data-svc-1, not empty. As a negative test, the StatefulSet itself is deleted with --cascade=orphan; both PVCs and their bound PVs survive the controller's own deletion, preserved by persistentVolumeClaimRetentionPolicy. Only deleting a PVC directly afterward actually destroys or releases its bound PV, demonstrating that reclaim policy governs PVC deletion specifically, not StatefulSet deletion.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: StatefulSet Per-Ordinal PVCs and Reclaim Behavior</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A recreated pod reattaches its own volume; deleting the PVC directly is what actually destroys the data</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">data-svc-0</text>
  <text x="180.0" y="199.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">PVC: data-data-svc-0 (Bound)</text>
  <text x="180.0" y="217.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">identity: data-svc-0</text>
  <rect x="360" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="181.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">data-svc-1</text>
  <text x="480.0" y="199.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">PVC: data-data-svc-1 (Bound)</text>
  <text x="480.0" y="217.6" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">pod deleted → same PVC reattached</text>
  <line x1="600" y1="195" x2="700" y2="195" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="656.0" y="195.0" font-size="10.5" fill="#166534">StatefulSet deleted --cascade=orphan</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Orphaned PVCs/PVs</text>
  <text x="810.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">both survive controller deletion</text>
  <rect x="360" y="340" width="300" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="510.0" y="377.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="510.0" y="395.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">kubectl delete pvc data-data-svc-1</text>
  <text x="510.0" y="413.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">bound PV removed or Released</text>
  <text x="510.0" y="431.2" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">(the actual destructive step)</text>
  <line x1="810" y1="250" x2="510" y2="340" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="540" x2="100" y2="540" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="544" font-size="11" fill="#33415c">Stable per-ordinal identity</text>
  <line x1="381" y1="540" x2="421" y2="540" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="429" y="544" font-size="11" fill="#166534">Reclaim-policy-protected</text>
  <line x1="675" y1="540" x2="715" y2="540" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="723" y="544" font-size="11" fill="#b91c1c">Direct PVC deletion (destructive)</text>
</svg>
