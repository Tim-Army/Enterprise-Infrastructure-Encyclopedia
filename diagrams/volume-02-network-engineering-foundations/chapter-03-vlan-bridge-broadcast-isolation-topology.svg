<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab topology: a VLAN-aware Linux bridge separating VLAN 20 and VLAN 30 broadcast domains</title>
  <desc>
    ns-host-a (10.20.0.2/24) and ns-host-b (10.20.0.3/24) are access ports on VLAN 20 of a VLAN-filtered bridge br0 in ns-switch, and can reach each other. ns-host-c (10.20.0.4/24) is an access port on VLAN 30 of the same physical bridge and cannot reach VLAN 20, demonstrating broadcast-domain isolation. As a negative test, a second, looped link from ns-host-a back to the bridge causes a broadcast storm with STP disabled; enabling the bridge's STP (stp_state 1) puts the redundant link into a blocking state while the primary link stays forwarding, breaking the loop.
  </desc>
  <defs>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: VLAN-Filtered Bridge and Broadcast-Domain Isolation</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Two VLAN 20 hosts and one VLAN 30 host on a shared 802.1Q bridge, plus an STP loop test</text>
  <rect x="60" y="150" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">ns-host-a</text>
  <text x="160.0" y="204.6" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">10.20.0.2/24</text>
  <text x="160.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VLAN 20 access</text>
  <rect x="60" y="300" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="336.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">ns-host-b</text>
  <text x="160.0" y="354.6" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">10.20.0.3/24</text>
  <text x="160.0" y="372.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VLAN 20 access</text>
  <rect x="380" y="190" width="220" height="170" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="252.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">ns-switch / br0</text>
  <text x="490.0" y="270.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">vlan_filtering=1</text>
  <text x="490.0" y="288.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VLAN 20 + VLAN 30 ports</text>
  <text x="490.0" y="306.9" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">stp_state 1 (negative test)</text>
  <rect x="700" y="150" width="200" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="800.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">ns-host-c</text>
  <text x="800.0" y="204.6" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">10.20.0.4/24</text>
  <text x="800.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">VLAN 30 access</text>
  <line x1="260" y1="190" x2="380" y2="240" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="215.0" font-size="10.5" fill="#33415c">VLAN 20</text>
  <line x1="260" y1="340" x2="380" y2="300" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="320.0" font-size="10.5" fill="#33415c">VLAN 20</text>
  <line x1="600" y1="250" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="656.0" y="225.0" font-size="10.5" fill="#b91c1c">VLAN 30 (isolated)</text>
  <rect x="60" y="420" width="200" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="160.0" y="451.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">veth-a2 (looped link)</text>
  <text x="160.0" y="469.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">VLAN 20, STP disabled</text>
  <text x="160.0" y="487.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">→ broadcast storm</text>
  <line x1="160" y1="250" x2="160" y2="420" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="166.0" y="335.0" font-size="10.5" fill="#b91c1c">redundant cable</text>
  <rect x="380" y="420" width="380" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="570.0" y="452.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">After stp_state 1 (5s convergence)</text>
  <text x="570.0" y="470.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">veth-a-br: state forwarding</text>
  <text x="570.0" y="488.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">veth-a2-br: state blocking</text>
  <text x="570.0" y="506.0" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">loop broken, no storm</text>
  <line x1="260" y1="465" x2="380" y2="475" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <line x1="60" y1="610" x2="100" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="614" font-size="11" fill="#33415c">VLAN 20 (allowed)</text>
  <line x1="291" y1="610" x2="331" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="339" y="614" font-size="11" fill="#b91c1c">VLAN 30 / negative-test path</text>
</svg>
