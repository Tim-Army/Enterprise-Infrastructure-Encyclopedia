<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab topology: diagnosing a DHCP-delivered DNS server address that points at nothing</title>
  <desc>
    ns-router runs dnsmasq serving both DHCP and DNS on 10.95.0.1/24, but the DHCP dns-server option is deliberately misconfigured to 10.95.0.53, an address nothing listens on. ns-client leases 10.95.0.100/24 correctly but receives the broken resolver address. Step 1 defines the problem (dig times out); Step 2/3 confirm Layer 3 to the gateway is healthy and isolate resolv.conf's 10.95.0.53 as the theory; Step 4 tests the theory by querying 10.95.0.1 directly, which succeeds; Steps 5/6 fix the DHCP option to 10.95.0.1 and verify. As a negative test, skipping the theory-test step and instead only bouncing the client interface leaves the fault in place.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: Structured Troubleshooting of a DHCP-Delivered DNS Fault</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A wrong DHCP dns-server option (10.95.0.53) is diagnosed bottom-up and fixed at the actual cause</text>
  <rect x="70" y="170" width="240" height="140" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="217.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">ns-client</text>
  <text x="190.0" y="235.9" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">DHCP → 10.95.0.100/24</text>
  <text x="190.0" y="253.9" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">resolv.conf: 10.95.0.53</text>
  <text x="190.0" y="271.9" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">(wrong — fault)</text>
  <rect x="400" y="160" width="260" height="160" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="530.0" y="208.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">ns-router (dnsmasq)</text>
  <text x="530.0" y="226.7" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">veth-cr: 10.95.0.1/24</text>
  <text x="530.0" y="244.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dhcp-option dns-server:</text>
  <text x="530.0" y="262.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#b91c1c">10.95.0.53 ← injected fault</text>
  <text x="530.0" y="280.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">actual DNS service: 10.95.0.1</text>
  <line x1="310" y1="240" x2="400" y2="240" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="361.0" y="240.0" font-size="10.5" fill="#33415c">10.95.0.0/24</text>
  <rect x="70" y="350" width="300" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="220.0" y="386.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">Steps 1–3: define + theorize</text>
  <text x="220.0" y="404.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">dig app.lab.internal → timeout</text>
  <text x="220.0" y="422.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">ping gateway OK; resolv.conf = .53</text>
  <rect x="400" y="350" width="260" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="530.0" y="386.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">Step 4: test the theory</text>
  <text x="530.0" y="404.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dig @10.95.0.1 app.lab.internal</text>
  <text x="530.0" y="422.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ succeeds: DNS itself is fine</text>
  <rect x="690" y="350" width="220" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="800.0" y="386.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">Steps 5–6: fix + verify</text>
  <text x="800.0" y="404.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#14532d">dns-server → 10.95.0.1</text>
  <text x="800.0" y="422.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#14532d">renew lease; dig succeeds</text>
  <line x1="220" y1="310" x2="220" y2="350" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="370" y1="400" x2="400" y2="400" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <line x1="660" y1="400" x2="690" y2="400" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="70" y="490" width="840" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="526.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="544.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">Skip the theory test: with the original fault still in place, only bounce ns-client's interface</text>
  <text x="490.0" y="562.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">dig app.lab.internal still fails — the interface bounce never touched the DHCP scope's DNS option</text>
  <line x1="70" y1="630" x2="110" y2="630" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="118" y="634" font-size="11" fill="#33415c">DHCP-delivered config</text>
  <line x1="337" y1="630" x2="377" y2="630" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="385" y="634" font-size="11" fill="#b91c1c">Fault / negative-test path</text>
  <line x1="649" y1="630" x2="689" y2="630" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="697" y="634" font-size="11" fill="#166534">Corrected state</text>
</svg>
