<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab sequence: a synthetic 802.11 beacon and association exchange, decoded with tshark</title>
  <desc>
    A synthetic AP (02:00:00:00:00:01, SSID LAB-WLAN, channel 6) and Client (02:00:00:00:00:02) exchange five crafted management frames in order: Beacon, Probe Request, Probe Response, Association Request, and Association Response, matching the association sequence from this chapter's theory section. Separately, free space path loss is calculated at 10, 30, and 60 meters for 2.4 GHz, 5 GHz, and 6 GHz, showing 6 GHz attenuates fastest. As a negative test, at 100 meters the estimated 6 GHz RSSI falls below a -70 dBm reliability threshold, showing a link budget deficit.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: 802.11 Association Sequence and Free Space Path Loss</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Synthetic Beacon/Probe/Association frames between AP and Client, plus a 2.4/5/6 GHz coverage comparison</text>
  <rect x="60" y="110" width="220" height="80" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="145.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Client (STA)</text>
  <text x="170.0" y="163.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">addr 02:00:00:00:00:02</text>
  <rect x="680" y="110" width="220" height="80" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="790.0" y="145.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">AP — LAB-WLAN, ch 6</text>
  <text x="790.0" y="163.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">addr 02:00:00:00:00:01</text>
  <line x1="170" y1="190" x2="170" y2="190" stroke="470" stroke-width="1"/>
  <line x1="790" y1="190" x2="790" y2="190" stroke="470" stroke-width="1"/>
  <line x1="790" y1="215" x2="170" y2="215" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="486.0" y="215.0" font-size="10.5" fill="#166534">1. Beacon (subtype 0x08)</text>
  <line x1="170" y1="265" x2="790" y2="265" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="486.0" y="265.0" font-size="10.5" fill="#33415c">2. Probe Request (0x04)</text>
  <line x1="790" y1="315" x2="170" y2="315" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="486.0" y="315.0" font-size="10.5" fill="#166534">3. Probe Response (0x05)</text>
  <line x1="170" y1="365" x2="790" y2="365" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="486.0" y="365.0" font-size="10.5" fill="#33415c">4. Association Request (0x00)</text>
  <line x1="790" y1="415" x2="170" y2="415" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="486.0" y="415.0" font-size="10.5" fill="#166534">5. Association Response (0x01)</text>
  <rect x="230" y="470" width="500" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="501.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Free space path loss @ 10 / 30 / 60 m</text>
  <text x="480.0" y="519.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">2.4 GHz lowest loss  ·  5 GHz mid  ·  6 GHz highest loss</text>
  <text x="480.0" y="537.2" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">(higher frequency attenuates faster over distance)</text>
  <rect x="230" y="580" width="500" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="613.9" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Negative test: @100 m, 6 GHz RSSI &lt; −70 dBm → link budget deficit</text>
  <line x1="60" y1="610" x2="100" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="614" font-size="11" fill="#33415c">Client-originated frame</text>
  <line x1="345" y1="610" x2="385" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="614" font-size="11" fill="#166534">AP-originated frame</text>
</svg>
