<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab flow: a custom property and classification policy validated for precision, then deliberately over-broadened</title>
  <desc>
    A custom Lab Asset Owner property is created and set on a test endpoint, appearing alongside built-in properties on its host record. A classification rule sets Function based on a condition specific to that device type; applying it updates the endpoint's Function correctly, and an inventory view filtered on that Function value shows the test endpoint while excluding unrelated hosts. As a negative test, the rule's condition is deliberately broadened to match only a single common open port with no other qualifier; reapplying it now incorrectly matches at least one other host on the segment, demonstrating why rule specificity and ordering matter before the rule is reverted to its specific form.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: A Classification Rule Correctly Scoped, Then Deliberately Broadened</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A specific condition classifies exactly the intended endpoint; loosening it to a single common port misclassifies a neighbor</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Custom property + specific rule</text>
  <text x="190.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Lab Asset Owner + device-specific</text>
  <text x="190.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Function condition</text>
  <rect x="400" y="140" width="260" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="530.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Correct classification</text>
  <text x="530.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">only the intended endpoint matches</text>
  <text x="530.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">inventory view filters correctly</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">rule broadened to 1 common port</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">misclassifies a neighbor host</text>
  <line x1="660" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">rule specificity and ordering directly determine classification accuracy — an over-broad condition</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">silently over-matches, which is why the rule is reverted to its specific form immediately after the test.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Property + specific rule</text>
  <line x1="354" y1="460" x2="394" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="402" y="464" font-size="11" fill="#166534">Correctly scoped match</text>
  <line x1="630" y1="460" x2="670" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="678" y="464" font-size="11" fill="#b91c1c">Over-broad rule (negative test)</text>
</svg>
