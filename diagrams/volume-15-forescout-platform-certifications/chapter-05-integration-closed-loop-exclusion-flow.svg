<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: a simulated inbound enrichment property driving a policy-triggered notification, closed by a resolution rule, tested against an exclusion group</title>
  <desc>
    A Lab Vulnerability Severity property stands in for an imported vulnerability-scanner field. Setting it to Critical fires a policy that sets Compliance Status to Non-Compliant: Critical CVE and delivers a simulated ITSM notification. Returning the severity to None fires a paired resolution rule that clears the compliance state and sends a resolved notification, completing the simulated closed loop. As a negative test, the endpoint is placed in the Exclusion - Managed Exceptions group and the severity forced to Critical again; the policy does not escalate the excluded host, confirming integration-triggered policies respect the same exclusion-group safeguard as directly authored control policies.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: A Simulated Closed-Loop Integration That Still Respects the Exclusion Group</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A critical-severity property drives an escalation and a matching resolution — but never against a protected host</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lab Vulnerability Severity</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">None → Critical</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">policy fires: notify + Non-Compliant</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Closed-loop resolution</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">severity → None</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">clears status + resolved notice</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="172.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="190.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">host in exclusion group,</text>
  <text x="810.0" y="208.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">severity forced Critical again</text>
  <text x="810.0" y="226.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ NOT escalated</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">integration-triggered escalations respect the same exclusion-group safeguard as directly authored</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">control policies — the protection isn't bypassed just because the trigger came from an external property.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Simulated inbound trigger</text>
  <line x1="363" y1="460" x2="403" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="411" y="464" font-size="11" fill="#166534">Closed-loop resolution</text>
  <line x1="639" y1="460" x2="679" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="687" y="464" font-size="11" fill="#b91c1c">Exclusion-protected host</text>
</svg>
