<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: a compliance and control policy pair staged through monitor mode to live enforcement, tested against an exclusion group</title>
  <desc>
    Toggling Lab Agent Running to false triggers the compliance policy to set Compliance Status to Non-Compliant after a 10-minute grace period. The paired control policy, first in monitor mode, logs the VLAN reassignment it would have taken without touching the endpoint. Switching to live enforcement and re-triggering the condition actually reassigns the endpoint's VLAN; restoring Lab Agent Running to true returns it to its original VLAN within one re-evaluation cycle. As a negative test, the endpoint is added to an exclusion group and the non-compliant condition is forced again; the control policy does not act despite matching, confirming the exclusion-group safeguard takes precedence — the same mechanism production deployments rely on to protect sensitive hosts.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: Monitor-Mode Preview, Live Enforcement, and an Exclusion Group That Actually Holds</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A compliance grace period drives a control policy from a logged preview to a real VLAN reassignment — until the host is excluded</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lab Agent Running = false</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">compliance policy: grace period</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">→ Non-Compliant: Lab</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="500.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Control policy: monitor mode</text>
  <text x="500.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">logs the VLAN reassignment</text>
  <text x="500.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">it WOULD have taken</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Live enforcement</text>
  <text x="810.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">actual VLAN reassignment</text>
  <text x="810.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">re-admits on compliance</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="320" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="380.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">endpoint added to an exclusion group, then Lab Agent Running forced to false again</text>
  <text x="490.0" y="398.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">control policy does NOT act despite the compliance condition matching — exclusion takes precedence</text>
  <text x="490.0" y="416.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">the same safeguard production deployments rely on to protect sensitive hosts from enforcement</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Compliance transition</text>
  <line x1="327" y1="500" x2="367" y2="500" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="375" y="504" font-size="11" fill="#6b7280">Monitor-mode preview</text>
  <line x1="585" y1="500" x2="625" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="633" y="504" font-size="11" fill="#166534">Live enforcement + re-admission</text>
</svg>
