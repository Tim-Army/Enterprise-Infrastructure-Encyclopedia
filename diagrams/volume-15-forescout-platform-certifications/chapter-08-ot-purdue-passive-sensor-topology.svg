<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab topology: a passive OT sensor placed at a Purdue-model boundary, observing Modbus traffic and tested against an interrupted SPAN feed</title>
  <desc>
    A simulated PLC (Purdue Level 1) and an HMI/engineering workstation simulator (Level 2) exchange Modbus TCP traffic — read holding registers and write single coil operations — mirrored by a SPAN session to the sensor's receive-only monitor interface at the Level 1/2 boundary. The sensor correctly identifies the protocol and function codes, and its configuration confirms no active probing capability is enabled. As a negative test, the SPAN destination interface is disconnected; the sensor immediately loses visibility of the simulated PLC traffic entirely, with no compensating active technique attempting to reach the PLC directly — passive OT visibility degrades to silence, not to an active fallback. Re-enabling SPAN restores visibility.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: A Passive OT Sensor at the Purdue Boundary That Degrades to Silence, Never to Active Probing</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The sensor identifies Modbus function codes between simulated Level 1 and Level 2 assets, and loses visibility cleanly when the SPAN feed drops</text>
  <rect x="60" y="140" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="181.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">PLC simulator</text>
  <text x="170.0" y="199.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Purdue Level 1</text>
  <text x="170.0" y="217.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Modbus TCP responses</text>
  <rect x="360" y="140" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="470.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">HMI/eng. workstation sim</text>
  <text x="470.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Purdue Level 2</text>
  <text x="470.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">read/write coil requests</text>
  <line x1="280" y1="195" x2="360" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="195.0" font-size="10.5" fill="#33415c">Modbus TCP (mirrored)</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Sensor (receive-only)</text>
  <text x="810.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">identifies protocol + function</text>
  <text x="810.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">codes, no active probing</text>
  <line x1="320" y1="250" x2="700" y2="195" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="516.0" y="222.5" font-size="10.5" fill="#166534">SPAN feed</text>
  <rect x="60" y="340" width="860" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="372.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="390.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">SPAN destination interface disconnected on the switch</text>
  <text x="490.0" y="408.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">sensor loses visibility of PLC traffic entirely — no active technique compensates by probing the PLC</text>
  <text x="490.0" y="426.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">passive OT visibility correctly degrades to silence, not to an active fallback; SPAN restored → visibility resumes</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Simulated Purdue-level assets</text>
  <line x1="399" y1="500" x2="439" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="447" y="504" font-size="11" fill="#166534">Passive sensor</text>
</svg>
