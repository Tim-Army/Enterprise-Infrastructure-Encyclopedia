<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: a role-scoped read-only user, a dynamic group, and a scheduled report, tested against an out-of-scope write attempt</title>
  <desc>
    A custom role scoped to a single lab group is assigned to a second test user; logging in as that user shows only the scoped population, with hosts outside the scope invisible. A dynamic group defined by Compliance Status = Non-Compliant: Lab updates membership automatically as the underlying property is toggled, and a report scoped to that group exports correctly and can be scheduled. A configuration backup completes and is retrievable. As a negative test, the scoped read-only account attempts to modify a policy or host property outside its granted permissions; the platform denies the action, confirming RBAC scope restriction is enforced at the write layer, not merely cosmetic in the inventory view.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: RBAC Scope Enforced Against Writes, Not Just the Inventory View</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A scoped read-only account sees only its permitted population and is actually blocked from modifying anything outside it</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Scoped read-only role</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">assigned to test user</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">sees only its scoped population</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Dynamic group + report</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">membership auto-updates on</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Compliance Status changes</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="172.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="190.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">scoped account attempts a</text>
  <text x="810.0" y="208.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">write outside its permissions</text>
  <text x="810.0" y="226.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ denied</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the denial confirms RBAC scope restriction is enforced by the platform itself at the write layer,</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">not merely a filter applied to what the inventory view happens to display.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Scoped role</text>
  <line x1="237" y1="460" x2="277" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="285" y="464" font-size="11" fill="#166534">Reactive group + report</text>
  <line x1="522" y1="460" x2="562" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="570" y="464" font-size="11" fill="#b91c1c">Enforced write restriction</text>
</svg>
