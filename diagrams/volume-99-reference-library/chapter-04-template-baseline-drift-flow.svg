<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: a parameterized template rendered into an approved baseline and applied through a documented change record, tested against a manually introduced configuration drift</title>
  <desc>
    A configuration template with placeholder variables renders into a fully resolved baseline-v1.conf, and a complete change record documents the backup step and rollback command before anything is applied. A dry run's output is attached showing only the intended difference, and applying the change followed by re-capturing the running configuration shows no unexpected difference from the declared baseline. As a negative test, one small, undocumented change is introduced directly on the lab system outside the change-record process; re-running the platform's drift detection method correctly detects and reports it. The drift is then reconciled, either by updating the baseline with a new documented change or by reverting the system, with the chosen path and its reasoning recorded.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: Drift Introduced on Purpose Is Detected, Not Assumed Absent</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A template renders to a baseline that matches the running system exactly, until a deliberate undocumented change proves the drift check actually works</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Template → baseline-v1.conf</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">change record: backup + rollback</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dry run: only intended diff</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Applied + re-captured</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">matches declared baseline</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">exactly, no unexpected diff</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">undocumented change</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">introduced manually</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ drift detected + reconciled</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="371.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">reconciliation takes one of two documented paths: update the baseline with a new change record if the</text>
  <text x="490.0" y="389.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">drift was an intentional, undocumented change worth keeping, or revert the system to match the existing</text>
  <text x="490.0" y="407.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">baseline if it was not — either way, the system and its declared baseline agree again.</text>
  <line x1="60" y1="480" x2="100" y2="480" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="484" font-size="11" fill="#33415c">Template + change record</text>
  <line x1="354" y1="480" x2="394" y2="480" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="402" y="484" font-size="11" fill="#166534">Baseline-matching apply</text>
  <line x1="639" y1="480" x2="679" y2="480" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="687" y="484" font-size="11" fill="#b91c1c">Detected + reconciled drift</text>
</svg>
