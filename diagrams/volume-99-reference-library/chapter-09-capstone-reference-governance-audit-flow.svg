<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 capstone lab flow: three reference-library table entries independently re-verified against their live authoritative sources, tested against an attempt to find reproduced certification exam content</title>
  <desc>
    Three references from this chapter's own tables, one standard, one certification, one vendor documentation portal, are recorded as baseline claims, then independently re-verified against their live authoritative sources using the Fact/Value/Source/As-of row shape. Comparing the two sets surfaces either a confirmed match or a specific, documented discrepancy for each item, with a ready-to-apply corrected row drafted for any discrepancy found and cross-checked against the repository's root SOFTWARE_VERSIONS.md and CERTIFICATION_BLUEPRINTS.md files. As a negative test, the exercise attempts to locate a certification exam question or licensed courseware excerpt for one of the cross-referenced certifications; neither this encyclopedia nor the findings record reproduces any such content, confirming compliance with EDITORIAL_STANDARDS.md's reproduction rule. A concrete, justified review-cadence recommendation closes the exercise.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: The Capstone — This Encyclopedia's Own Reference Tables Get Audited Against Reality</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Three cited references are independently re-verified against their live authoritative sources, with a compliance check confirming no licensed exam content was ever reproduced</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="180.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">3 baseline claims recorded</text>
  <text x="180.0" y="198.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(standard, cert, vendor doc)</text>
  <rect x="360" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Re-verified against</text>
  <text x="480.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">live authoritative sources</text>
  <text x="480.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ match or documented discrepancy</text>
  <line x1="300" y1="185" x2="360" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Corrected row drafted</text>
  <text x="810.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">cross-checked against root</text>
  <text x="810.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">reference files</text>
  <line x1="600" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="360" y="300" width="400" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="560.0" y="332.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="560.0" y="350.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">search for reproduced exam/</text>
  <text x="560.0" y="368.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">courseware content</text>
  <text x="560.0" y="386.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ confirmed absent, compliant</text>
  <line x1="480" y1="240" x2="480" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="460" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="500.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">this lab is read-only against external sources — its output is a governance-ready findings record</text>
  <text x="490.0" y="518.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">plus a review-cadence recommendation, not a change applied directly to the encyclopedia.</text>
  <line x1="60" y1="590" x2="100" y2="590" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="594" font-size="11" fill="#33415c">Baseline claims</text>
  <line x1="273" y1="590" x2="313" y2="590" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="321" y="594" font-size="11" fill="#166534">Independently re-verified</text>
  <line x1="576" y1="590" x2="616" y2="590" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="624" y="594" font-size="11" fill="#b91c1c">Confirmed reproduction compliance</text>
</svg>
