<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: a CIS Benchmark hardening check scored, risk-rated, and remediated, alongside a simulated incident walked through all five NIST 800-61 phases, tested against skipping the Containment phase</title>
  <desc>
    Five hardening controls from a correctly identified, version-dated CIS Benchmark are checked against a lab system with linked Pass/Fail evidence; each Fail is assigned a CVSS-style severity band and plotted on the chapter's risk matrix using assessed likelihood. A simulated minor incident, such as an unauthorized local account creation, is walked through all five NIST 800-61 phases, Preparation through Post-Incident Activity, with at least one action and one piece of evidence recorded per phase. As a negative test, the exercise attempts to skip directly to Eradication without completing Containment, and the evidence-preservation step that would be lost by doing so is documented, demonstrating concretely why phase order matters rather than asserting it abstractly. The highest-risk Fail is then remediated and re-validated against the same control, now passing.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Skipping Containment for Eradication Loses Evidence You Cannot Get Back</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A hardening Fail is scored, risk-rated, and remediated while a simulated incident walks all five NIST phases in order</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="180.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CIS Benchmark: 5 controls checked</text>
  <text x="180.0" y="198.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Fails: CVSS severity + risk-matrix</text>
  <rect x="360" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Simulated incident</text>
  <text x="480.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">all 5 NIST 800-61 phases</text>
  <text x="480.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">walked in order</text>
  <line x1="300" y1="185" x2="360" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Highest-risk Fail</text>
  <text x="810.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">remediated + re-validated</text>
  <text x="810.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ now passes</text>
  <line x1="600" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="360" y="300" width="400" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="560.0" y="341.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="560.0" y="359.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">skip Containment → Eradication</text>
  <text x="560.0" y="377.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ documented evidence lost</text>
  <line x1="480" y1="240" x2="480" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="460" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="500.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the lab system is confirmed returned to its Chapter 4 baseline afterward, and the unauthorized account</text>
  <text x="490.0" y="518.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">created for the simulated incident is removed as part of cleanup.</text>
  <line x1="60" y1="590" x2="100" y2="590" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="594" font-size="11" fill="#33415c">Hardening + incident walkthrough</text>
  <line x1="426" y1="590" x2="466" y2="590" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="474" y="594" font-size="11" fill="#166534">Remediated finding</text>
  <line x1="666" y1="590" x2="706" y2="590" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="714" y="594" font-size="11" fill="#b91c1c">Skipped-phase evidence loss</text>
</svg>
