<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: ctrl01's evidence-capture pipeline and a hypervisor snapshot/rollback cycle, verified before the volume's later chapters rely on it</title>
  <desc>
    ctrl01 (10.13.10.30/24, VLAN 110) runs evidence.sh, which wraps every lab command, captures its output to a timestamped log, and appends a SHA-256 checksum to a manifest. Isolation is confirmed: a traceroute toward 1.1.1.1 never shows a 10.13.x.x address once it leaves ctrl01, and a ping to the illustrative 203.0.113.1 fails to route anywhere outside the lab. A hypervisor snapshot named ch01-baseline is taken, a marker file is created, and reverting to the snapshot removes the marker — proving rollback actually works before any later chapter's negative test depends on it. As a negative test, a static route misdirecting the 203.0.113.0/24 range at the real gateway still fails to reach anything, since that range is not announced on the real internet either — confirming the isolation holds even under a misconfiguration attempt.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: The Reference Lab Scaffold — Evidence Pipeline and a Verified Rollback</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Every command is checksummed into a tamper-evident manifest; snapshot rollback is proven before any later chapter depends on it</text>
  <rect x="60" y="140" width="260" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="191.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">ctrl01 — 10.13.10.30/24 (VLAN 110)</text>
  <text x="190.0" y="209.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">evidence.sh wraps every command</text>
  <text x="190.0" y="227.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ timestamped log + sha256 manifest</text>
  <rect x="400" y="140" width="260" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="530.0" y="191.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Snapshot / rollback proof</text>
  <text x="530.0" y="209.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">ch01-baseline snapshot taken</text>
  <text x="530.0" y="227.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">marker created → reverted → ABSENT</text>
  <line x1="320" y1="205" x2="400" y2="205" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="130" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="810.0" y="191.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Isolation check</text>
  <text x="810.0" y="209.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">traceroute → 1.1.1.1: no 10.13.x.x</text>
  <text x="810.0" y="227.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">ping 203.0.113.1: unreachable</text>
  <line x1="660" y1="205" x2="700" y2="205" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <rect x="60" y="340" width="860" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="372.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="390.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">static route added on ctrl01 pointing 203.0.113.0/24 at the real gateway instead of the lab router</text>
  <text x="490.0" y="408.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">ping to 203.0.113.1 still fails — that range isn't announced on the real internet either</text>
  <text x="490.0" y="426.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">confirms the exercise of detecting and removing an incorrect route, not a real isolation breach</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Evidence pipeline</text>
  <line x1="291" y1="500" x2="331" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="339" y="504" font-size="11" fill="#166534">Verified rollback</text>
  <line x1="522" y1="500" x2="562" y2="500" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="570" y="504" font-size="11" fill="#6b7280">Isolation boundary</text>
</svg>
