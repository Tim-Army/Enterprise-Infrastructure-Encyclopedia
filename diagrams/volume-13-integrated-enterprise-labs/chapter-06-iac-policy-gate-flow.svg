<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: Terraform/Ansible/Vault brought under CI with a Conftest policy gate, tested against a policy-violating pull request</title>
  <desc>
    git01 and vault01 centralize the DHCP failover secret and both IPsec pre-shared keys; Terraform imports the existing CLOUD1 VPC and HQ vSphere cluster with a clean plan (0 changes), and the Chapter 2 DHCP configuration converts to an idempotent Ansible playbook (second run: 0 changed tasks). A compliant pull request adding a resource tag runs plan, passes the Conftest policy gate, and applies only after merge and approval. As a negative test, a second pull request introduces a security group rule permitting SSH from 0.0.0.0/0; the Conftest policy gate reports the specific deny message and the pipeline blocks the apply stage from running, confirmed in the pipeline UI itself, not just local output. Reverting the change and re-running the gate confirms a clean pass before the pull request closes.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: A Policy Gate That Blocks an Open-SSH Security Group Before It Ever Applies</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A compliant pull request flows through plan, gate, and apply; a 0.0.0.0/0 SSH rule is denied and the apply stage never runs</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">vault01</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">DHCP failover secret</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">IPsec PSKs (BR1, CLOUD1)</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Compliant PR</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">plan → Conftest PASS</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">apply after merge + approval</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test PR</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">SSH from 0.0.0.0/0 rule</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">Conftest: deny, apply blocked</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the block is confirmed in the pipeline UI/logs, not just local Conftest output; reverting the change and</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">re-running plan + the policy gate confirms a clean pass before the pull request is closed.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Centralized secrets</text>
  <line x1="309" y1="460" x2="349" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="357" y="464" font-size="11" fill="#166534">Passing pipeline</text>
  <line x1="531" y1="460" x2="571" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="579" y="464" font-size="11" fill="#b91c1c">Gate-blocked change</text>
</svg>
