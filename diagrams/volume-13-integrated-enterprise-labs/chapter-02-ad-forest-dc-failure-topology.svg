<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab topology: a two-node corp.meridian.example forest with DHCP failover and a domain-joined Linux client, tested against a DC outage</title>
  <desc>
    dc01 (10.13.10.11, forest root) and dc02 (10.13.10.12, additional DC and global catalog) replicate with zero failures, share a converged time hierarchy, and load-balance a VLAN 120 DHCP scope in Normal state. linux01 (10.13.20.21) joins the domain via realm, and kinit/klist confirm DNS SRV lookup, Kerberos, and LDAP all work from a non-Windows client. As a negative test, dc01 is powered off to simulate an unplanned failure; linux01 destroys and re-requests its Kerberos ticket and still succeeds, because dc02 answers the KDC request, and DHCP failover reports a degraded partner but continues leasing from dc02 alone. Powering dc01 back on brings both replication and DHCP failover back to a fully healthy state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: An Active Directory Forest That Survives a Domain Controller Failure</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Kerberos and DHCP both keep working on dc02 alone when dc01 is powered off, then re-converge on recovery</text>
  <rect x="60" y="140" width="240" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">dc01 — 10.13.10.11</text>
  <text x="180.0" y="204.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">forest root, VLAN 110</text>
  <text x="180.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">negative test: powered off</text>
  <rect x="360" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">dc02 — 10.13.10.12</text>
  <text x="480.0" y="204.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">additional DC + GC, VLAN 110</text>
  <text x="480.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">answers KDC + DHCP alone</text>
  <line x1="300" y1="200" x2="360" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="336.0" y="200.0" font-size="10.5" fill="#33415c">AD replication, 0 failures</text>
  <rect x="680" y="140" width="240" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="800.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">linux01 — 10.13.20.21</text>
  <text x="800.0" y="204.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VLAN 120, realm-joined</text>
  <text x="800.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">kinit succeeds via dc02</text>
  <line x1="480" y1="200" x2="680" y2="200" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="586.0" y="200.0" font-size="10.5" fill="#166534">Kerberos/LDAP/DNS SRV</text>
  <rect x="60" y="320" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="380.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">dc01 powered off — linux01 kdestroy + kinit still succeeds (dc02 answers the KDC request)</text>
  <text x="490.0" y="398.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">DHCP failover reports a degraded partner but continues leasing from dc02 alone</text>
  <text x="490.0" y="416.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">recovery: dc01 rejoins, repadmin and DHCP failover both report Normal and 0 failures again</text>
  <line x1="60" y1="490" x2="100" y2="490" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="494" font-size="11" fill="#33415c">Forest root / client</text>
  <line x1="318" y1="490" x2="358" y2="490" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="366" y="494" font-size="11" fill="#166534">Surviving DC (carries load alone)</text>
</svg>
