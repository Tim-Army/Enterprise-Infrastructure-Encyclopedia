<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: the volume's capstone chaos exercise — HQ outage, DR failover to BR1, measured RTO/RPO, failback, and reverse-dependency decommission</title>
  <desc>
    simulate-hq-outage.sh takes HQ down; from BR1, the WAN peer is unreachable and OSPF drops, and a directory write against the RODC alone fails as the confirmed limitation. The replicated dc02 image at esxi-br101 is recovered and seizes all five FSMO roles; BR1's DHCP relay and replication partner repoint to it, and identity writes succeed again. A minimal Kubernetes control plane is rebuilt at BR1, with elapsed time from outage to working control plane recorded as the measured RTO against the BIA targets. On failback, dc01 is checked for a USN rollback condition before rejoining replication, and a metadata cleanup removes its stale FSMO claims so exactly one authoritative answer remains. The volume then tears down every system built, in strict reverse-dependency order — Kubernetes and CLOUD1 first, vSphere and network next, security/observability and automation after that, and identity demoted last — with disk sanitization and a final verified evidence manifest.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="680" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: HQ Site Failure, BR1 Disaster Recovery, Failback, and Full Decommission</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">FSMO roles seize onto the BR1-replicated dc02 copy while HQ is down, then dc01's stale claims are cleaned up on failback</text>
  <rect x="60" y="130" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="170.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">HQ outage simulated</text>
  <text x="170.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">WAN peer unreachable,</text>
  <text x="170.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">OSPF neighbor down</text>
  <rect x="320" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="440.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">DR failover to BR1</text>
  <text x="440.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dc02 replica recovered,</text>
  <text x="440.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">seizes all 5 FSMO roles</text>
  <line x1="280" y1="185" x2="320" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="600" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="720.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Emergency K8s at BR1</text>
  <text x="720.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">control plane rebuilt</text>
  <text x="720.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">elapsed time = measured RTO</text>
  <line x1="560" y1="185" x2="600" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="290" width="400" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="260.0" y="331.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Failback</text>
  <text x="260.0" y="349.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dc01 checked for USN rollback before rejoining</text>
  <text x="260.0" y="367.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">metadata cleanup removes dc01's stale FSMO claims</text>
  <rect x="500" y="290" width="400" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="700.0" y="331.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Full decommission (reverse order)</text>
  <text x="700.0" y="349.2" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">K8s/CLOUD1 → vSphere → network →</text>
  <text x="700.0" y="367.2" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">security/observability → automation → identity last</text>
  <line x1="460" y1="345" x2="500" y2="345" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <rect x="60" y="460" width="840" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="505.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">disk sanitization matched to medium (NIST SP 800-88) before datastores/volumes are released;</text>
  <text x="480.0" y="523.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">final step verifies every checksum in the evidence manifest from Chapter 1 through this capstone.</text>
  <line x1="60" y1="600" x2="100" y2="600" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="108" y="604" font-size="11" fill="#b91c1c">Failure / decommission</text>
  <line x1="336" y1="600" x2="376" y2="600" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="384" y="604" font-size="11" fill="#166534">Recovery outcome</text>
  <line x1="558" y1="600" x2="598" y2="600" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="606" y="604" font-size="11" fill="#33415c">Cleanup / consistency</text>
</svg>
