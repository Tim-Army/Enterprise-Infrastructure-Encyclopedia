<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab topology: 802.1X and default-deny microsegmentation paired with SIEM detection, exercised through a full incident response cycle</title>
  <desc>
    dc01's NPS/RADIUS role and 802.1X on sw-acc01 authenticate linux01's port; a default-deny ACL between VLAN 120 and VLAN 110 blocks an RDP probe while Kerberos authentication still succeeds. siem01 ingests logs from every system built so far and runs a kerberos-preauth-bruteforce detection rule tuned above the measured baseline failure rate. As a negative test, atk01 is attached to VLAN 120 and runs 15 rapid Kerberos pre-authentication attempts against dc01; siem01 raises an alert naming atk01's address within the rule's evaluation window. Containment shuts atk01's switch port, immediately cutting all connectivity; eradication confirms no lateral movement occurred (clean replication summary, no new domain accounts) before atk01 is removed from the network entirely rather than left merely port-shut.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: A Full Detect-Contain-Eradicate-Recover Cycle Against a Kerberos Brute Force</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">atk01's pre-auth brute force is detected by siem01, contained by shutting its switch port, then the attacker is removed entirely</text>
  <rect x="60" y="130" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="175.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">dc01 (NPS/RADIUS)</text>
  <text x="170.0" y="193.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">+ sw-acc01: 802.1X</text>
  <rect x="320" y="130" width="220" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="430.0" y="166.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">VLAN 120 ⇄ VLAN 110</text>
  <text x="430.0" y="184.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">default-deny ACL: RDP blocked,</text>
  <text x="430.0" y="202.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">Kerberos still succeeds</text>
  <rect x="600" y="130" width="220" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="710.0" y="166.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">siem01</text>
  <text x="710.0" y="184.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">kerberos-preauth-bruteforce</text>
  <text x="710.0" y="202.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">rule, tuned above baseline</text>
  <line x1="280" y1="180" x2="320" y2="180" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="540" y1="180" x2="600" y2="180" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <rect x="60" y="280" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="170.0" y="321.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">atk01 (VLAN 120)</text>
  <text x="170.0" y="339.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">15x Kerberos pre-auth</text>
  <text x="170.0" y="357.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">brute-force attempts</text>
  <line x1="600" y1="230" x2="170" y2="280" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="391.0" y="255.0" font-size="10.5" fill="#b91c1c">detected</text>
  <rect x="360" y="280" width="260" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="321.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Contain</text>
  <text x="490.0" y="339.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">sw-acc01 port shutdown</text>
  <text x="490.0" y="357.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">atk01 loses all connectivity</text>
  <line x1="280" y1="335" x2="360" y2="335" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="680" y="280" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="790.0" y="321.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Eradicate + recover</text>
  <text x="790.0" y="339.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">no lateral movement confirmed</text>
  <text x="790.0" y="357.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">atk01 removed from network</text>
  <line x1="620" y1="335" x2="680" y2="335" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Authentication path</text>
  <line x1="309" y1="460" x2="349" y2="460" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="357" y="464" font-size="11" fill="#6b7280">Segmentation boundary</text>
  <line x1="576" y1="460" x2="616" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="624" y="464" font-size="11" fill="#166534">Detection / recovery</text>
  <line x1="834" y1="460" x2="874" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="882" y="464" font-size="11" fill="#b91c1c">Attack + containment</text>
</svg>
