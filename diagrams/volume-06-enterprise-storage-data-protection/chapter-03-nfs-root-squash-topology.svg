<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab topology: an NFS export's root-squash behavior verified positively and then reversed as a negative test</title>
  <desc>
    nfs-server01 exports /export/lab to nfs-client01 with the default, secure root_squash option. The client mounts the export and creates a file as root; on the server, that file is owned by the anonymous UID/GID (typically 65534, nobody/nogroup), confirming root-squash maps the client's root user to an unprivileged account. As a negative test, the export is changed to no_root_squash and reapplied; after remounting, the same root-created-file operation now produces a file genuinely owned by UID 0 on the server — demonstrating exactly why no_root_squash should be reserved for narrowly justified cases and never used as a default.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: NFS Root-Squash Enforcement, Proven and Then Disabled</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A client's root-created file lands as nobody with root_squash, and as UID 0 once no_root_squash is set</text>
  <rect x="370" y="130" width="220" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="176.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">nfs-server01</text>
  <text x="480.0" y="194.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">/export/lab</text>
  <text x="480.0" y="212.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">(rw,sync,root_squash)</text>
  <rect x="80" y="320" width="260" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="210.0" y="357.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">nfs-client01 (root_squash)</text>
  <text x="210.0" y="375.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">touch as root →</text>
  <text x="210.0" y="393.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">file owned by nobody/nogroup</text>
  <text x="210.0" y="411.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">(65534, not UID 0)</text>
  <rect x="620" y="320" width="260" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="750.0" y="357.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">nfs-client01 (negative test)</text>
  <text x="750.0" y="375.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">export → no_root_squash</text>
  <text x="750.0" y="393.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">touch as root →</text>
  <text x="750.0" y="411.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">file owned by UID 0 (real root)</text>
  <line x1="430" y1="250" x2="250" y2="320" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="346.0" y="285.0" font-size="10.5" fill="#166534">NFSv4 mount</text>
  <line x1="530" y1="250" x2="720" y2="320" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="631.0" y="285.0" font-size="10.5" fill="#b91c1c">NFSv4 remount</text>
  <line x1="80" y1="500" x2="120" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="504" font-size="11" fill="#33415c">NFS export</text>
  <line x1="248" y1="500" x2="288" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="296" y="504" font-size="11" fill="#166534">root_squash (default, secure)</text>
  <line x1="587" y1="500" x2="627" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="635" y="504" font-size="11" fill="#b91c1c">no_root_squash (negative test)</text>
</svg>
