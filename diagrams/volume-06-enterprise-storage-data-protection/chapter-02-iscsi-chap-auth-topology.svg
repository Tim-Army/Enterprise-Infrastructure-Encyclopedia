<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab topology: an iSCSI target and initiator pair authenticated with CHAP, tested against a wrong password</title>
  <desc>
    storage01 exposes a 2 GB fileio-backed LUN through target IQN iqn.2026-07.lab.example:storage01, with an ACL for client01's IQN and CHAP credentials (labuser/LabSecret123) on portal 3260. client01 discovers and logs in, reaching state LOGGED_IN with a new block device matching the 2 GB LUN. As a negative test, client01 logs out, sets an intentionally wrong CHAP password, and attempts to log back in; the login fails with an authentication error and journalctl shows the rejected CHAP negotiation, confirming the ACL and CHAP configuration actively enforce authentication rather than silently permitting access.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: iSCSI Target/Initiator Pair with CHAP Authentication</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">client01 logs into storage01's LUN over CHAP; a wrong password proves the ACL actually enforces authentication</text>
  <rect x="370" y="130" width="220" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="172.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">storage01 (target)</text>
  <text x="480.0" y="190.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">IQN ...:storage01</text>
  <text x="480.0" y="208.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">LUN: 2G fileio, portal 3260</text>
  <text x="480.0" y="226.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">ACL + CHAP: labuser</text>
  <rect x="80" y="320" width="260" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="210.0" y="361.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">client01 (correct CHAP)</text>
  <text x="210.0" y="379.4" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">session: LOGGED_IN</text>
  <text x="210.0" y="397.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">lsblk: new 2G block device</text>
  <rect x="620" y="320" width="260" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="750.0" y="361.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">client01 (negative test)</text>
  <text x="750.0" y="379.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">password set to WrongPassword</text>
  <text x="750.0" y="397.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">login fails: auth error</text>
  <line x1="430" y1="260" x2="250" y2="320" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="346.0" y="290.0" font-size="10.5" fill="#166534">CHAP: labuser/LabSecret123</text>
  <line x1="530" y1="260" x2="720" y2="320" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="631.0" y="290.0" font-size="10.5" fill="#b91c1c">CHAP: labuser/WrongPassword</text>
  <rect x="80" y="470" width="800" height="80" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="514.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">journalctl -u iscsid shows the rejected CHAP negotiation; restoring the correct password logs back in successfully</text>
  <line x1="80" y1="570" x2="120" y2="570" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="574" font-size="11" fill="#33415c">iSCSI target</text>
  <line x1="266" y1="570" x2="306" y2="570" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="314" y="574" font-size="11" fill="#166534">Authenticated session</text>
  <line x1="533" y1="570" x2="573" y2="570" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="581" y="574" font-size="11" fill="#b91c1c">Rejected negotiation</text>
</svg>
