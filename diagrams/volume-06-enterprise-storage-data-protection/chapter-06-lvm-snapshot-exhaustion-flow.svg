<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: an LVM snapshot's copy-on-write behavior proven correct, then deliberately exhausted</title>
  <desc>
    lv_lab (1 GB origin) is formatted, mounted, and written with point-in-time A data. A 100 MB snapshot lv_lab_snap is taken, then the origin is modified to point-in-time B; data_percent on the snapshot rises above 0% as copy-on-write data accumulates. Mounted read-only, the snapshot still shows point-in-time A while the origin shows point-in-time B, proving independent preservation. As a negative test, enough new data (150 MB) is written to the origin to exceed the snapshot's 100 MB reserve; data_percent reaches 100%, the snapshot's lv_attr shows an invalidated state, and mounting it afterward fails or exposes a partial image — demonstrating why proactive snapshot-reserve monitoring is required, not optional.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: LVM Snapshot Point-in-Time Preservation and Reserve Exhaustion</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A 100 MB snapshot preserves the pre-change state until deliberately overrun, then reports invalid</text>
  <rect x="80" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="200.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lv_lab (origin, 1G)</text>
  <text x="200.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">point-in-time A</text>
  <text x="200.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">→ modified to point-in-time B</text>
  <rect x="400" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lv_lab_snap (100M reserve)</text>
  <text x="520.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">data_percent rises with COW</text>
  <text x="520.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">mounted RO: shows point-in-time A</text>
  <line x1="320" y1="185" x2="400" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="366.0" y="185.0" font-size="10.5" fill="#33415c">snapshot + COW tracking</text>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">150 MB written to origin</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">exceeds 100M reserve</text>
  <line x1="640" y1="185" x2="700" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="80" y="330" width="840" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="500.0" y="372.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Result</text>
  <text x="500.0" y="390.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">data_percent on lv_lab_snap reaches 100%; lv_attr shows an invalidated state (I/d flag)</text>
  <text x="500.0" y="408.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">mounting the snapshot now fails or exposes a partial, unusable image</text>
  <text x="500.0" y="426.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">demonstrates why proactive snapshot-reserve monitoring is required, not optional</text>
  <line x1="80" y1="510" x2="120" y2="510" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="514" font-size="11" fill="#33415c">Origin volume</text>
  <line x1="275" y1="510" x2="315" y2="510" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="323" y="514" font-size="11" fill="#166534">Healthy snapshot</text>
  <line x1="497" y1="510" x2="537" y2="510" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="545" y="514" font-size="11" fill="#b91c1c">Exhausted / invalidated snapshot</text>
</svg>
