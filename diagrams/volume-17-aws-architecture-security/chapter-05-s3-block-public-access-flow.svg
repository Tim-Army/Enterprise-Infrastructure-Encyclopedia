<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: an encrypted, versioned S3 bucket with Block Public Access enforced, tested against an explicit public-read policy attempt</title>
  <desc>
    A customer-managed KMS key backs a new bucket with Block Public Access, versioning, and default KMS encryption all enabled; a test object uploads and is confirmed encrypted with the CMK, and a lifecycle rule transitions objects to Standard-IA after 30 days. As a negative test, a bucket policy explicitly granting public s3:GetObject to any principal is submitted; the call fails with AccessDenied, stating the action is blocked by the bucket's Block Public Access configuration — confirming the control prevents accidental public exposure even when a policy document explicitly tries to grant it.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: Block Public Access Rejects a Public-Read Policy Even When the Policy Explicitly Grants It</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An encrypted, versioned bucket with a lifecycle rule stays private — an attached public-read statement is blocked at the account/bucket control layer</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">lab-data-bucket (CMK-encrypted)</text>
  <text x="190.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">versioning + default KMS encryption</text>
  <text x="190.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">Block Public Access: enabled</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lifecycle rule</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ Standard-IA after 30 days</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">confirmed as submitted</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">public-read bucket policy</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">submitted explicitly</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ AccessDenied (BPA blocks it)</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">Block Public Access rejects the policy attachment itself — the exposure never becomes live even</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">though the submitted policy document explicitly grants public read access.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">Protected bucket state</text>
  <line x1="336" y1="450" x2="376" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="384" y="454" font-size="11" fill="#166534">Data lifecycle</text>
  <line x1="540" y1="450" x2="580" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="588" y="454" font-size="11" fill="#b91c1c">Blocked exposure attempt</text>
</svg>
