<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: GuardDuty sample findings routed through EventBridge to SNS, tested against a severity-tightened event pattern</title>
  <desc>
    GuardDuty is enabled and generates sample findings covering every finding type; an EventBridge rule matching all GuardDuty Finding events routes them to an SNS topic, and the subscribed email receives a notification. As a negative test, the EventBridge rule's pattern is tightened to match only severity 9 or above (CRITICAL), and sample findings are regenerated — most of which fall below that severity; no new SNS notification arrives, confirming the tightened pattern correctly filters out findings below the new threshold rather than notifying on everything regardless of the pattern.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: An EventBridge Severity Filter That Correctly Suppresses Low-Severity Findings</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Sample GuardDuty findings notify at first, then a tightened CRITICAL-only pattern correctly produces no notification for the same lower-severity findings</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">GuardDuty detector</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">create-sample-findings</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(all finding types, all severities)</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="190.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">EventBridge: all findings</text>
  <text x="500.0" y="208.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ SNS notification arrives</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">pattern tightened: severity ≥ 9</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ no new notification</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">most regenerated sample findings fall below CRITICAL severity, and the tightened pattern correctly</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">suppresses notification for them — the filter is doing real work, not passing everything through.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">Detection source</text>
  <line x1="282" y1="450" x2="322" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="330" y="454" font-size="11" fill="#166534">Unfiltered routing</text>
  <line x1="522" y1="450" x2="562" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="570" y="454" font-size="11" fill="#b91c1c">Severity-filtered (correctly suppressed)</text>
</svg>
