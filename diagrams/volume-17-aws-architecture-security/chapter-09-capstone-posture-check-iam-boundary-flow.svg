<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: the volume's minimal secure serverless capstone stack exercised end to end, audited by a posture-check script, and tested against an out-of-scope Lambda action</title>
  <desc>
    The capstone Terraform stack (Lambda, DynamoDB, S3, CloudWatch, KMS) applies cleanly; posting to the deployed API endpoint writes a DynamoDB item, confirmed by a nonzero scan count. A posture-check script reports Organizations feature set, S3 Block Public Access status, GuardDuty/Security Hub enrollment, and active alarms, flagging any GAP: line honestly. The workload registers in the Well-Architected Tool with at least one real Cost Optimization finding recorded. As a negative test, the Lambda function is invoked with an unsupported delete_table action; the function either rejects it in application logic or, if it attempted the call, CloudWatch Logs show an AccessDeniedException — confirming the scoped IAM policy from the individual-chapter lab still blocks anything beyond PutItem/GetItem/Scan in this composed stack.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: The Capstone — a Posture-Check Script and an IAM Boundary That Holds Under Composition</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The full serverless stack works end to end and self-reports its own gaps; the scoped Lambda role still blocks an unsupported action</text>
  <rect x="60" y="130" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="176.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Capstone stack (Terraform)</text>
  <text x="190.0" y="194.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Lambda + DynamoDB + S3 + CW + KMS</text>
  <text x="190.0" y="212.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">POST /notes → item written</text>
  <rect x="400" y="130" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="176.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">posture-check.sh</text>
  <text x="520.0" y="194.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Org/S3-BPA/GuardDuty/alarms</text>
  <text x="520.0" y="212.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">GAP: lines reported honestly</text>
  <line x1="320" y1="190" x2="400" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="167.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="185.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">invoke: delete_table action</text>
  <text x="810.0" y="203.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(unsupported / out of scope)</text>
  <text x="810.0" y="221.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ rejected or AccessDenied</text>
  <line x1="640" y1="190" x2="700" y2="190" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="365.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the scoped IAM policy from Chapter 4's individual lab still blocks anything beyond PutItem/GetItem/Scan</text>
  <text x="490.0" y="383.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">in this fully composed stack — least privilege composes correctly, it doesn't erode when the stack grows.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Deployed capstone stack</text>
  <line x1="345" y1="460" x2="385" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="464" font-size="11" fill="#166534">Honest self-audit</text>
  <line x1="576" y1="460" x2="616" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="624" y="464" font-size="11" fill="#b91c1c">IAM boundary under composition</text>
</svg>
