<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: a CloudWatch alarm on a custom metric firing and clearing through SNS, tested for bidirectional (non-latching) behavior</title>
  <desc>
    An alarm on the Lab/App QueueDepth custom metric, evaluated over two periods above a threshold of 100, transitions to ALARM after two consecutive above-threshold data points are published, and an SNS email notification arrives. As a negative test, two data points back under the threshold are published; the alarm returns to OK and a second SNS notification confirms the recovery — proving the alarm evaluates the metric bidirectionally rather than latching in ALARM state once triggered.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: A CloudWatch Alarm Confirmed Bidirectional, Not Latched</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Two above-threshold data points trip the alarm and notify; two below-threshold points clear it and notify again</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">QueueDepth: 150, then 175</text>
  <text x="180.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(2 periods above threshold 100)</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="500.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Alarm: ALARM</text>
  <text x="500.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">SNS notification #1 fires</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">QueueDepth: 10, then 5</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ Alarm: OK, SNS notification #2</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the second notification on recovery is what confirms the alarm is genuinely bidirectional — a</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">one-directional or latched alarm would never send a clearing notification once triggered.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">Above-threshold data</text>
  <line x1="318" y1="450" x2="358" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="366" y="454" font-size="11" fill="#b91c1c">Alarm fires</text>
  <line x1="495" y1="450" x2="535" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="543" y="454" font-size="11" fill="#166534">Alarm clears (recovery confirmed)</text>
</svg>
