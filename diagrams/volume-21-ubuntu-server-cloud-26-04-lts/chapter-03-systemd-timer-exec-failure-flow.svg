<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: a custom systemd service and timer running under a dedicated account, tested against a missing ExecStart target</title>
  <desc>
    lab-report.timer fires lab-report.service under the dedicated svc-labreport account; triggering it manually logs the report text to the journal under that user, with the unit settling to inactive (dead) and its last run marked SUCCESS. As a negative test, ExecStart is pointed at a nonexistent script; starting the service now reports Active: failed, and the journal shows a 203/EXEC (No such file or directory) error — confirming systemd surfaces exec failures directly rather than failing silently. Restoring the correct path runs the service cleanly again.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: systemd Surfaces an Exec Failure Directly Rather Than Failing Silently</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A scoped service account's timer runs and logs cleanly; pointing ExecStart at a missing script produces an explicit, journal-visible failure</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lab-report.timer</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">triggers lab-report.service</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">as svc-labreport</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">journalctl -u lab-report.service</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">report text logged</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">last run: SUCCESS</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">ExecStart → missing script</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">Active: failed, 203/EXEC</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">203/EXEC means systemd could not even execute the configured binary — a distinct, journal-visible</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">signature, not a silent no-op. Restoring the correct path runs the service cleanly again.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Scoped service + timer</text>
  <line x1="336" y1="460" x2="376" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="384" y="464" font-size="11" fill="#166534">Verified via journal</text>
  <line x1="594" y1="460" x2="634" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="642" y="464" font-size="11" fill="#b91c1c">Missing-binary failure</text>
</svg>
