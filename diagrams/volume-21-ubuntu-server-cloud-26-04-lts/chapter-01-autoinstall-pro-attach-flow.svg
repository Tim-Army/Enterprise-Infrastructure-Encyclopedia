<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: an unattended Ubuntu autoinstall validated end to end, then Ubuntu Pro attach tested against a deliberately invalid token</title>
  <desc>
    A NoCloud seed ISO built from autoinstall user-data drives a fully unattended installation that reboots into a working system with cloud-init reporting status: done. Default repository pockets (release, updates, security, backports) are confirmed present, and attaching a real Ubuntu Pro token enables esm-infra and esm-apps. As a negative test, attaching with a deliberately invalid token reports an invalid-token error and makes no changes to the system's repository configuration at all, confirming a failed attach never leaves the host in a partially configured state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: An Invalid Pro Token Fails Cleanly, With No Partial Repository State</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An unattended autoinstall completes from a NoCloud seed and attaches real ESM; a bad token is rejected without touching any configuration</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">NoCloud autoinstall seed</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">unattended install → reboot</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">cloud-init status: done</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Real Pro token attach</text>
  <text x="520.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">esm-infra + esm-apps: enabled</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">invalid token attach</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ error, zero repo changes</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">a failed attach never leaves the host in a partially configured repository state — the operation is</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">atomic: it either fully succeeds or makes no change at all.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">Unattended provisioning</text>
  <line x1="345" y1="450" x2="385" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="454" font-size="11" fill="#166534">Successful ESM attach</text>
  <line x1="612" y1="450" x2="652" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="660" y="454" font-size="11" fill="#b91c1c">Rejected invalid token</text>
</svg>
