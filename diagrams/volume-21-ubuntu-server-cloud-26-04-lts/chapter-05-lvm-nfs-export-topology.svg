<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab topology: an LVM-backed filesystem exported over NFS to one subnet, extended live and tested against a client outside that subnet</title>
  <desc>
    A spare disk becomes an LVM-backed ext4 filesystem mounted at /srv/labdata; lvextend plus resize2fs grows it online with no unmount required. The volume exports over NFS scoped to 10.20.30.0/24, and a client on that subnet mounts it and writes a test file the server confirms. As a negative test, a third host outside the permitted subnet attempts the identical mount; it is refused with 'access denied by server', confirming the subnet restriction in /etc/exports is enforced by the NFS server itself, not merely present as a configuration line.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: An NFS Export Whose Subnet Restriction Actually Refuses a Third Host</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An LVM volume grows online with no unmount; the export's client scope is confirmed by a mount attempt from outside it</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lab_vg/lab_lv (ext4)</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">4G → live-extended to 6G</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">no unmount required</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">NFS export: 10.20.30.0/24</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">in-subnet client mounts,</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">writes confirmed by server</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">third host, outside subnet</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ access denied by server</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the export line in /etc/exports shows the specific 10.20.30.0/24 scope rather than a wildcard —</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the refusal from outside that subnet is the concrete evidence the restriction is enforced.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">LVM growth</text>
  <line x1="228" y1="460" x2="268" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="276" y="464" font-size="11" fill="#166534">Permitted NFS client</text>
  <line x1="486" y1="460" x2="526" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="534" y="464" font-size="11" fill="#b91c1c">Denied NFS client</text>
</svg>
