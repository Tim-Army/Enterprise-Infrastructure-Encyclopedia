<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 11 lab topology: a Tier-0/Tier-1 gateway hierarchy with an overlay segment and a DFW policy verified by Traceflow</title>
  <desc>
    A Tier-0 gateway peers over BGP with a simulated upstream router (neighbor Established); a Tier-1 gateway attaches beneath it, with an overlay segment using DHCP relay. test-app-01 and test-db-01 deploy onto the segment, receive DHCP-relayed addresses, and can ping each other and the gateway. A DFW policy section's default-deny rule initially blocks test-app-01 to test-db-01 on TCP 5432; Traceflow confirms the packet reaches the destination segment but is dropped by the default-deny rule, not a routing failure. A scoped allow rule for exactly that flow is added above the default-deny rule; Traceflow now shows the allow rule as the match, and a third, out-of-group test VM remains blocked, confirming the Applied To scope is not inadvertently permissive.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 11 Hands-On Lab: NSX Tier-0/Tier-1 Gateways with a Traceflow-Verified DFW Allow Rule</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A default-deny DFW rule blocks test-app-01 to test-db-01 until a scoped allow rule is added above it</text>
  <rect x="370" y="110" width="220" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="150.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">Tier-0 Gateway</text>
  <text x="480.0" y="168.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">BGP to upstream: Established</text>
  <line x1="480" y1="200" x2="480" y2="240" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="370" y="240" width="220" height="80" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="275.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Tier-1 Gateway</text>
  <text x="480.0" y="293.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">overlay segment, DHCP relay</text>
  <rect x="120" y="380" width="220" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="230.0" y="425.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">test-app-01</text>
  <text x="230.0" y="443.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">DHCP-relayed address</text>
  <rect x="620" y="380" width="220" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="730.0" y="416.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">test-db-01</text>
  <text x="730.0" y="434.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">TCP 5432: allow rule added</text>
  <text x="730.0" y="452.6" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">(was default-deny — negative test)</text>
  <line x1="390" y1="340" x2="230" y2="380" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="570" y1="340" x2="730" y2="380" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="340" y1="430" x2="620" y2="430" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="486.0" y="430.0" font-size="10.5" fill="#b91c1c">default-deny → Traceflow confirms drop → allow rule added → succeeds</text>
  <rect x="60" y="540" width="840" height="60" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="574.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">Out-of-group 3rd VM attempts the same flow → still blocked by default-deny (Applied To scope confirmed correct)</text>
  <line x1="60" y1="610" x2="100" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="614" font-size="11" fill="#33415c">Gateway hierarchy</text>
  <line x1="291" y1="610" x2="331" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="339" y="614" font-size="11" fill="#166534">Source group</text>
  <line x1="477" y1="610" x2="517" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="525" y="614" font-size="11" fill="#b91c1c">DFW-controlled flow</text>
</svg>
