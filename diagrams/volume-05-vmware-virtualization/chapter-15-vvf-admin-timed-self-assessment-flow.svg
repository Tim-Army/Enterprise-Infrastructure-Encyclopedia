<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 15 lab flow: a timed, combined vSphere/vSAN/HA-DRS build exercise culminating in two diagnostic negative tests</title>
  <desc>
    Four timed build steps reuse earlier chapters' procedures as one continuous exercise: 3 ESXi hosts plus vCenter Server with a Host Profile (target 30 minutes), a VDS with a tagged port group (20 minutes), vSAN with a RAID-1 FTT=1 policy and compliant test VM (25 minutes), and HA admission control plus DRS Fully Automated (20 minutes). Two timed negative tests follow: a host placed in maintenance mode with no data migration while the test VM has replica components on it, diagnosing the resulting reduced-redundancy state (15 minutes), and induced CPU contention diagnosed via esxtop %RDY (15 minutes). Total elapsed time under 2 hours, achieved largely unaided, is a strong readiness signal.
  </desc>
  <defs>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 15 Hands-On Lab: Timed VVF Build-and-Troubleshoot Self-Assessment (VCP-VVF Administrator)</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Four timed builds followed by two timed negative tests, target under 2 hours total</text>
  <rect x="40" y="140" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="140.0" y="176.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">1. Hosts + vCenter</text>
  <text x="140.0" y="194.0" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">+ Host Profile</text>
  <text x="140.0" y="212.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target 30 min</text>
  <rect x="260" y="140" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="360.0" y="176.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">2. VDS + port group</text>
  <text x="360.0" y="194.0" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">tagged, 3 hosts</text>
  <text x="360.0" y="212.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target 20 min</text>
  <rect x="480" y="140" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="580.0" y="176.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">3. vSAN RAID-1 FTT=1</text>
  <text x="580.0" y="194.0" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">compliant test VM</text>
  <text x="580.0" y="212.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target 25 min</text>
  <rect x="700" y="140" width="220" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="810.0" y="176.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">4. HA + DRS</text>
  <text x="810.0" y="194.0" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">admission control</text>
  <text x="810.0" y="212.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target 20 min</text>
  <line x1="240" y1="190" x2="260" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="460" y1="190" x2="480" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="680" y1="190" x2="700" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="160" y="300" width="320" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="320.0" y="332.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative test 1</text>
  <text x="320.0" y="350.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">host in maintenance, no data migration</text>
  <text x="320.0" y="368.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">diagnose reduced-redundancy state</text>
  <text x="320.0" y="386.2" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">target 15 min</text>
  <rect x="500" y="300" width="320" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="660.0" y="332.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative test 2</text>
  <text x="660.0" y="350.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">induced CPU contention</text>
  <text x="660.0" y="368.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">diagnose via esxtop %RDY</text>
  <text x="660.0" y="386.2" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">target 15 min</text>
  <line x1="810" y1="240" x2="320" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="810" y1="240" x2="660" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="480" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Total elapsed time under 2 hours, largely unaided: strong readiness signal</text>
  <line x1="160" y1="510" x2="200" y2="510" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="208" y="514" font-size="11" fill="#33415c">Timed build step</text>
  <line x1="382" y1="510" x2="422" y2="510" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="430" y="514" font-size="11" fill="#b91c1c">Timed diagnosis step</text>
</svg>
