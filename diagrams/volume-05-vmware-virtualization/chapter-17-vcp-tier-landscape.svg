<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 17: the full VMware Certified Professional tier, mapping the five exams covered in Chapters 12 to 16 against the four additional VCP-level exams this chapter adds</title>
  <desc>
    The VMware Certified Professional tier is shown in two groups. The first group, already covered in Chapters 12 to 16, holds the five 2V0-generation exams: VCP-NV Network Virtualization (2V0-41.24), VCP-VCF Support (2V0-15.25), VCP-VCF Administrator (2V0-17.25), VCP-VVF Administrator (2V0-16.25), and VCP-VVF Support (2V0-18.25). The second group, added by this chapter, holds four more professional-level exams: VCP-DCV Data Center Virtualization (2V0-21.23, on the older vSphere 8 generation), VCP-VCF Architect (2V0-13.25), and two specialist-code VCPs, VCP-AVI Avi Load Balancer Administrator (6V0-22.25) and VCP-PCS Private Cloud Security Administrator (6V0-21.25). All nine sit at the same professional tier; none is a prerequisite for another.
  </desc>
