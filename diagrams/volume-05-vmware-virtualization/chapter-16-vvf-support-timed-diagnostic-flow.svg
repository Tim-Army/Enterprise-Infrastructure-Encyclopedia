<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 16 lab flow: three timed layered faults in a VVF-scoped lab, plus a licensing-tier recognition exercise</title>
  <desc>
    A baseline health check confirms compute, storage, and network layers are healthy in a VVF-scoped lab (vSphere + vSAN, no NSX). Three timed faults follow: hostd stopped on one host (compute domain, target 10 minutes, diagnosed via DCUI/esxcli as a management-agent issue distinct from full host failure), an MTU mismatch on a vSAN VMkernel adapter (storage domain, target 15 minutes, diagnosed via esxcli vsan cluster get and vmkping), and a misconfigured port group VLAN ID (network domain, target 10 minutes, diagnosed per Chapter 4's approach). An untimed licensing-recognition exercise identifies a feature unavailable under a more restrictive license tier without changing the actual assignment. All three faults are then restored to baseline.
  </desc>
  <defs>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 16 Hands-On Lab: Timed VVF Support Diagnostic Across Compute, Storage, and Network</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Three timed faults plus an untimed licensing-recognition exercise, each traced to its layer without reference material</text>
  <rect x="60" y="130" width="220" height="80" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="170.0" y="165.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Baseline Health Check</text>
  <text x="170.0" y="183.4" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">compute/storage/network: healthy</text>
  <rect x="60" y="250" width="250" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="185.0" y="282.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Fault 1: Compute</text>
  <text x="185.0" y="300.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">hostd stopped on one host</text>
  <text x="185.0" y="318.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">DCUI/esxcli restart, no reboot</text>
  <text x="185.0" y="336.2" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target: 10 min</text>
  <rect x="355" y="250" width="250" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="282.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Fault 2: Storage</text>
  <text x="480.0" y="300.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">vSAN VMkernel MTU mismatch</text>
  <text x="480.0" y="318.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">vsan cluster get, vmkping</text>
  <text x="480.0" y="336.2" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target: 15 min</text>
  <rect x="650" y="250" width="250" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="775.0" y="282.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Fault 3: Network</text>
  <text x="775.0" y="300.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">port group VLAN ID wrong</text>
  <text x="775.0" y="318.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">diagnosed per Chapter 4</text>
  <text x="775.0" y="336.2" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">target: 10 min</text>
  <line x1="170" y1="210" x2="170" y2="250" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="470" y1="210" x2="470" y2="250" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="770" y1="210" x2="770" y2="250" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="410" width="840" height="70" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="449.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">Untimed: licensing-recognition exercise — identify one feature gated by a more restrictive license tier</text>
  <line x1="60" y1="510" x2="100" y2="510" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="108" y="514" font-size="11" fill="#6b7280">Baseline / untimed exercise</text>
  <line x1="381" y1="510" x2="421" y2="510" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="429" y="514" font-size="11" fill="#b91c1c">Timed layered fault</text>
</svg>
