<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 18: the VMware Certified Advanced Professional tier, showing the eight VCF 9.0 role exams alongside the two carried-over VCAP exams for Data Center Virtualization design and Network Virtualization deploy</title>
  <desc>
    The advanced (3V0) tier is shown in two groups above a shared professional-tier base. The base row notes that a current VCP is the prerequisite for the VCAP tier. The first advanced group is the VCF 9.0 role series, eight exams on a common 3V0 generation: Administrator (3V0-11.26), Architect (3V0-12.26), Support (3V0-13.26), Automation (3V0-21.25), Operations (3V0-22.25), Storage (3V0-23.25), VKS Kubernetes (3V0-24.25), and Networking (3V0-25.25). The second group is the two carried-over VCAP exams on older product generations: VCAP-DCV Design (3V0-21.23) and VCAP-NV Deploy (3V0-41.22). All are advanced-tier; design-oriented VCAPs feed the VCDX design-defense discipline in Chapter 19.
  </desc>
  <defs>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
