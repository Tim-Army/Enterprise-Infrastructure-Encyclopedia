<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: deploying a VCSA, integrating Active Directory, then simulating and recovering from total appliance loss</title>
  <desc>
    vcsa-deploy installs a new VCSA from a JSON template; an LDAPS identity source (lab.example) is added and a scoped RBAC role assigned to an AD test account. A file-based backup is taken to a remote SFTP target. As a negative test, the VCSA VM is powered off and deleted entirely, simulating total appliance loss — ESXi hosts keep running existing workloads, but centralized management, DRS, and vCenter-mediated HA orchestration are unavailable. vcsa-deploy in restore mode rehydrates a new appliance from the SFTP backup, restoring the SSO domain, AD identity source, and RBAC assignment; hosts reconnect and the AD test account authenticates successfully.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: VCSA Deployment, AD Identity, and Backup/Restore of Simulated Loss</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A file-based backup rehydrates SSO, AD identity source, and RBAC after the appliance is deleted entirely</text>
  <rect x="60" y="150" width="240" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="196.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">vcsa-deploy install</text>
  <text x="180.0" y="214.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VCSA + AD identity source</text>
  <text x="180.0" y="232.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(lab.example, LDAPS)</text>
  <rect x="380" y="150" width="220" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="196.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Backup Now (VAMI)</text>
  <text x="490.0" y="214.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">file-based backup</text>
  <text x="490.0" y="232.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ SFTP target</text>
  <line x1="300" y1="210" x2="380" y2="210" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="680" y="150" width="240" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="800.0" y="187.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="800.0" y="205.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">VCSA VM powered off + deleted</text>
  <text x="800.0" y="223.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(simulated total appliance loss)</text>
  <text x="800.0" y="241.2" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">hosts keep running VMs; no mgmt</text>
  <line x1="600" y1="210" x2="680" y2="210" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="400" width="840" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="441.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532d">Restore</text>
  <text x="480.0" y="459.4" text-anchor="middle" font-size="11" font-weight="400" fill="#374151">vcsa-deploy restore, pointed at the SFTP backup and timestamp from step 4</text>
  <text x="480.0" y="477.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">new appliance rehydrates: SSO, AD identity source, RBAC role, and host reconnection all restored</text>
  <line x1="800" y1="270" x2="480" y2="400" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="570" x2="100" y2="570" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="574" font-size="11" fill="#33415c">Deploy / configure</text>
  <line x1="300" y1="570" x2="340" y2="570" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="348" y="574" font-size="11" fill="#166534">Backup / restore</text>
  <line x1="522" y1="570" x2="562" y2="570" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="570" y="574" font-size="11" fill="#b91c1c">Simulated loss</text>
</svg>
