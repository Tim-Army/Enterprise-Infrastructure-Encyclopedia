<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab topology: a distributed switch with an LACP link aggregation group, tested against an uplink failure</title>
  <desc>
    dvs-lab spans esxi-lab-01 and esxi-lab-02, each contributing two uplinks bundled into an Active LACP LAG (lag-lab). A VST-tagged port group (pg-lab-test, VLAN 150) hosts a test VM; NIOC shares favor vMotion traffic during contention, and vmkping at 8972 bytes confirms end-to-end MTU 9000. As a negative test, one physical uplink is disabled while the test VM has active traffic: the LAG shows that uplink as no longer bundled while the surviving uplink keeps carrying traffic with no sustained loss, and the failed uplink automatically rejoins the LAG once restored.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: Distributed Switch with LACP LAG and NIOC, Surviving an Uplink Failure</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Two-host VDS with a bundled LACP LAG; the test VM's traffic continues after one physical uplink fails</text>
  <rect x="370" y="110" width="220" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="150.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">dvs-lab (VDS, MTU 9000)</text>
  <text x="480.0" y="168.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">lag-lab (LACP, Active)</text>
  <rect x="80" y="260" width="260" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="210.0" y="311.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">esxi-lab-01</text>
  <text x="210.0" y="329.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">vmnic1 + vmnic2 → lag-lab</text>
  <text x="210.0" y="347.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">pg-lab-test (VLAN 150)</text>
  <rect x="620" y="260" width="260" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="750.0" y="311.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">esxi-lab-02</text>
  <text x="750.0" y="329.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">vmnic1 disabled (negative test)</text>
  <text x="750.0" y="347.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">vmnic2: still bundled, carries load</text>
  <line x1="430" y1="200" x2="210" y2="260" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="230.0" font-size="10.5" fill="#33415c">2x uplinks (LACP)</text>
  <line x1="530" y1="200" x2="750" y2="260" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="646.0" y="230.0" font-size="10.5" fill="#33415c">2x uplinks (1 failed)</text>
  <rect x="60" y="440" width="840" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="472.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="490.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">one physical uplink on esxi-lab-02 disabled while test VM traffic is active</text>
  <text x="480.0" y="508.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">LAG shows the failed uplink no longer bundled; surviving uplink absorbs traffic, no sustained loss</text>
  <text x="480.0" y="526.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">uplink restored → automatically rejoins the LAG (bundled) without manual intervention</text>
  <line x1="80" y1="610" x2="120" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="614" font-size="11" fill="#33415c">VDS uplink membership</text>
  <line x1="347" y1="610" x2="387" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="395" y="614" font-size="11" fill="#166534">Healthy host</text>
  <line x1="533" y1="610" x2="573" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="581" y="614" font-size="11" fill="#b91c1c">Uplink-failure host</text>
</svg>
