<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab topology: a virtual tap agent tunneling east-west VM traffic to a V Series node, tested against a disabled agent representing a coverage gap</title>
  <desc>
    Two workload VMs on the same virtual switch communicate directly — traffic no physical TAP could ever observe. A virtual tap agent on the first workload VM tunnels its traffic to a V Series node's tunnel-endpoint IP, where a minimal all-pass Flow Map delivers it to a capture tool; the capture confirms the inter-VM session end to end. As a negative test, the virtual tap agent is stopped on the first workload VM while the map and V Series node stay unchanged; no new traffic reaches the capture tool, confirming acquisition coverage — not the mapping or the node — was the point of failure, the same partial-coverage failure mode as a Kubernetes DaemonSet not covering every node. Re-enabling the agent restores visibility immediately.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: East-West Traffic a Physical TAP Could Never See</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A virtual tap agent tunnels inter-VM traffic to a V Series node; disabling the agent proves acquisition coverage — not the map — was the point of failure</text>
  <rect x="60" y="140" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="181.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Workload VM 1</text>
  <text x="170.0" y="199.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">virtual tap agent installed</text>
  <text x="170.0" y="217.6" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">(negative test: agent disabled)</text>
  <rect x="360" y="140" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="470.0" y="190.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Workload VM 2</text>
  <text x="470.0" y="208.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">generates traffic toward VM 1</text>
  <line x1="280" y1="195" x2="360" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="195.0" font-size="10.5" fill="#33415c">east-west (same vSwitch)</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">V Series node</text>
  <text x="810.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">tunnel-endpoint + all-pass map</text>
  <text x="810.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ capture tool shows traffic</text>
  <line x1="160" y1="250" x2="700" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="436.0" y="225.0" font-size="10.5" fill="#33415c">tunneled capture</text>
  <rect x="60" y="340" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="382.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="400.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">virtual tap agent on VM 1 stopped — map and V Series node otherwise unchanged</text>
  <text x="490.0" y="418.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">no new traffic reaches the capture tool despite VM 2 still generating traffic toward VM 1</text>
  <text x="490.0" y="436.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">acquisition coverage, not the map or the node, was the point of failure — a partial-coverage gap</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">East-west traffic source</text>
  <line x1="354" y1="500" x2="394" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="402" y="504" font-size="11" fill="#166534">Tunnel delivery to visibility node</text>
</svg>
