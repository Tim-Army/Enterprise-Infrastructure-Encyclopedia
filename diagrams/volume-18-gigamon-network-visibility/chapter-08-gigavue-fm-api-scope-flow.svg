<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: GigaVUE-FM REST API access scoped by service-account role, tested against a write attempt using a read-only token</title>
  <desc>
    A service account scoped to read-only access on the lab fabric group authenticates to the GigaVUE-FM API and successfully queries node inventory and health status. As a negative test, the same read-only token attempts a write operation — creating a new Flow Map; the API rejects the call with an authorization error, confirming the scoped role enforces least privilege at the API layer itself, not merely in the web UI. A second, write-scoped service account performs the identical map-creation call successfully, and the new map is visible both via the API and in the web UI, with the action correctly attributed to that account in the audit log.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: API Scope Enforcement Matches the UI, Not Just at the Web Layer</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A read-only token queries fabric health successfully and is rejected outright when it attempts to create a Flow Map</text>
  <rect x="60" y="140" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Read-only service account</text>
  <text x="190.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">GET /v1/nodes</text>
  <text x="190.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ inventory + health returned</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same token: POST /v1/maps</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ authorization error</text>
  <line x1="320" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="516.0" y="195.0" font-size="10.5" fill="#b91c1c">write attempt with read-only token</text>
  <rect x="60" y="300" width="860" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="337.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Write-scoped service account</text>
  <text x="490.0" y="355.4" text-anchor="middle" font-size="11" font-weight="400" fill="#374151">identical POST /v1/maps call → succeeds</text>
  <text x="490.0" y="373.4" text-anchor="middle" font-size="11" font-weight="400" fill="#374151">map visible via API (GET /v1/maps) and in the web UI</text>
  <text x="490.0" y="391.4" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">audit log correctly attributes the write to this account's identity</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Read-only API access</text>
  <line x1="318" y1="460" x2="358" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="366" y="464" font-size="11" fill="#166534">Write-scoped API access</text>
  <line x1="603" y1="460" x2="643" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="651" y="464" font-size="11" fill="#b91c1c">Enforced API-layer denial</text>
</svg>
