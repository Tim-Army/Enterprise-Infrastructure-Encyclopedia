<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab topology: an inline bypass deployment with heartbeat-based failover, tested under both fail-open and fail-closed modes, plus manual maintenance mode</title>
  <desc>
    An inline network group and inline tool group with heartbeat monitoring pass continuous traffic between two lab hosts through a healthy inline tool. Failing the tool with fail-mode set to open causes a brief interruption during heartbeat detection, after which traffic resumes flowing in bypass — fail-open protects connectivity. As a negative test, fail-mode is changed to closed and the same tool failure repeated; this time traffic stops entirely and does not resume until the tool is restored, demonstrating the fail-closed security-availability trade-off is a deliberate configuration choice, not a default behavior. Manually invoking maintenance mode bypasses the tool immediately, independent of heartbeat detection entirely.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Fail-Open Keeps Traffic Moving; Fail-Closed Is a Deliberate, Different Choice</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The same tool failure produces continued traffic under fail-open and a hard stop under fail-closed — the trade-off is configured, not assumed</text>
  <rect x="60" y="130" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lab host A</text>
  <text x="170.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">continuous traffic</text>
  <text x="170.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">to lab host B</text>
  <rect x="360" y="130" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="470.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Inline tool (healthy)</text>
  <text x="470.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">heartbeat: healthy</text>
  <text x="470.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">traffic passes through</text>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="810.0" y="180.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lab host B</text>
  <text x="810.0" y="198.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">receives traffic</text>
  <line x1="280" y1="185" x2="360" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="580" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="300" width="400" height="130" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="260.0" y="342.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">fail-mode: open</text>
  <text x="260.0" y="360.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">tool fails → brief interruption</text>
  <text x="260.0" y="378.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ traffic resumes (bypass)</text>
  <text x="260.0" y="396.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">connectivity protected</text>
  <rect x="500" y="300" width="400" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="700.0" y="342.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test — fail-mode: closed</text>
  <text x="700.0" y="360.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same tool failure repeated</text>
  <text x="700.0" y="378.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ traffic STOPS entirely</text>
  <text x="700.0" y="396.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">does not resume until tool restored</text>
  <rect x="60" y="460" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="500.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">maintenance mode, invoked manually, bypasses the tool immediately regardless of fail-mode setting —</text>
  <text x="490.0" y="518.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">a controlled bypass path that never waits for heartbeat detection at all.</text>
  <line x1="60" y1="590" x2="100" y2="590" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="594" font-size="11" fill="#33415c">Traffic endpoints</text>
  <line x1="291" y1="590" x2="331" y2="590" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="339" y="594" font-size="11" fill="#166534">Fail-open (connectivity protected)</text>
  <line x1="675" y1="590" x2="715" y2="590" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="723" y="594" font-size="11" fill="#b91c1c">Fail-closed (deliberate trade-off)</text>
</svg>
