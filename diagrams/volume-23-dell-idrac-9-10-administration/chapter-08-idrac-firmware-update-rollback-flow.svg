<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: an iDRAC firmware update staged, applied, and confirmed through a controller restart and the Lifecycle Log, tested against a nonexistent firmware image URI</title>
  <desc>
    Current firmware inventory records the pre-update iDRAC version, and a staged update task progresses to Completed, with the controller restarting automatically as part of applying iDRAC firmware; once it returns, the reported version matches the update just applied, and the Lifecycle Log shows a corresponding entry with a matching timestamp. As a negative test, an update is staged referencing an image URI that does not exist; the task reports an Exception state, or the initial request itself fails, confirming the update pipeline validates image retrieval rather than silently accepting an unreachable source. A rollback attempt afterward either restores the prior version or correctly reports no rollback image is available — both valid, informative outcomes.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: The Update Pipeline Validates Image Retrieval Before It Ever Applies Anything</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An iDRAC firmware update stages, applies, and logs cleanly through a controller restart, while an unreachable image URI is rejected before it can be staged</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Firmware inventory recorded</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">idrac_stage_update.py: valid image</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">→ TaskState: Completed, version confirmed</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Lifecycle Log entry</text>
  <text x="520.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">matches update timestamp</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">nonexistent image URI</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ Exception state / POST fails</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">both rollback outcomes — restored to a prior version, or no rollback image available — are</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">recorded as valid, informative results rather than treated as failures of the lab itself.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Staged + applied update</text>
  <line x1="345" y1="460" x2="385" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="464" font-size="11" fill="#166534">Logged confirmation</text>
  <line x1="594" y1="460" x2="634" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="642" y="464" font-size="11" fill="#b91c1c">Rejected unreachable source</text>
</svg>
