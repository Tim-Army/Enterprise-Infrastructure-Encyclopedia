<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: a scoped Operator-tier local user and a CA-signed certificate installed on a lab iDRAC, tested against an attempt to change network settings from the restricted account</title>
  <desc>
    A scoped local user is created with login and Virtual Console privilege only, no configuration privilege, and logging in as that user confirms configuration pages are visible but not modifiable. A CSR is generated, signed by a lab CA, and uploaded; after the controller restarts, the original self-signed certificate warning is gone. Secure Boot status reported by RACADM and Redfish agree. As a negative test, the scoped operator account attempts to change the Chapter 3 network gateway setting; the command fails with a permission-denied response, confirming the scoped privilege genuinely excludes configuration access rather than merely hiding it in the GUI.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: A Scoped Operator Account Is Blocked From the One Setting It Was Never Granted</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A CA-signed certificate replaces the factory self-signed one while a Virtual-Console-only account is confirmed unable to touch network configuration</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">lab-operator: login + VConsole only</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">CSR generated, signed by lab CA</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">cert uploaded, controller restarts</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="195.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Secure Boot status</text>
  <text x="520.0" y="213.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">RACADM and Redfish agree</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">lab-operator attempts</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">set iDRAC.IPv4.Gateway</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ permission denied</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">System Lockdown Mode and System Erase are described in this chapter for understanding, not</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">exercised here — both are disruptive or irreversible against shared lab hardware.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Scoped account + certificate</text>
  <line x1="390" y1="460" x2="430" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="438" y="464" font-size="11" fill="#166534">Cross-validated Secure Boot</text>
  <line x1="711" y1="460" x2="751" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="759" y="464" font-size="11" fill="#b91c1c">Denied configuration attempt</text>
</svg>
