<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: first access to a PowerEdge iDRAC validated from both RACADM and Redfish after a mandatory password change, tested against the retired factory-default credential</title>
  <desc>
    Logging in with factory-default credentials forces an immediate password change before reaching the dashboard. RACADM over SSH reports the service tag, firmware version, and license tier, and a Redfish bootstrap-check script authenticates with the new password and prints the same identity data, confirming both management paths agree. As a negative test, the same script is re-run with the old factory-default password; the session raises an HTTP 401 error, confirming the retired credential no longer authenticates once the change has taken effect.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: The Old Factory Password Stops Authenticating the Moment It's Changed</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">First access to a lab iDRAC is validated identically from RACADM and Redfish, then the retired credential is confirmed dead</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Factory login → forced change</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">racadm getsysinfo/getversion</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">license tier confirmed</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">idrac_first_boot_check.py</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">new password</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ model, firmware, tag, power state</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">old factory password</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ HTTP 401</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">RACADM and Redfish report the same identity data through two different management paths — the</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">negative test confirms the credential change is enforced consistently across both.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">First-access bring-up</text>
  <line x1="327" y1="450" x2="367" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="375" y="454" font-size="11" fill="#166534">Redfish validation</text>
  <line x1="567" y1="450" x2="607" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="615" y="454" font-size="11" fill="#b91c1c">Retired credential</text>
</svg>
