<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 capstone lab flow: a full provisioning runbook combining network, identity, storage, firmware, and Virtual Media deployment from every prior chapter, tested against an unreachable OS image URL</title>
  <desc>
    A pre-capstone SCP baseline is exported as a rollback point, then network configuration, certificate-based identity hardening, a clean storage health check, and a recorded firmware inventory baseline are each confirmed in sequence before a test OS is deployed via the Virtual Media pattern; the server boots from the mounted image, confirming network, identity, storage, firmware, and remote media boot all function together as one coherent provisioning sequence. The Lifecycle Log shows every major step in chronological order as a single reviewable timeline. As a negative test, the Virtual Media step is deliberately re-run with an unreachable image URL; the same fail-safe behavior validated in Chapter 5 still holds when invoked as part of this larger combined sequence, failing cleanly rather than booting to an unpredictable state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: The Capstone — Every Chapter's Fail-Safe Behavior Still Holds Inside One Combined Sequence</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Network, identity, storage, and firmware baselines from the whole volume come together into one provisioning runbook, with the Virtual Media fail-safe re-verified at the end</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Pre-capstone SCP baseline</text>
  <text x="180.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">network, identity, storage,</text>
  <text x="180.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">firmware baselines confirmed</text>
  <rect x="360" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="480.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Virtual Media OS deploy</text>
  <text x="480.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">server boots from image</text>
  <text x="480.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Lifecycle Log: full timeline</text>
  <line x1="300" y1="185" x2="360" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Every chapter's baseline</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">functions together as one</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">coherent sequence</text>
  <line x1="600" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="360" y="300" width="400" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="560.0" y="341.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="560.0" y="359.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">re-run Virtual Media, unreachable URL</text>
  <text x="560.0" y="377.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ same fail-safe as Chapter 5 holds</text>
  <line x1="480" y1="240" x2="480" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="460" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="500.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">running each chapter's technique inside a single combined runbook — not just individually — is</text>
  <text x="490.0" y="518.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">what confirms the volume's fail-safe behaviors compose correctly under real operational sequencing.</text>
  <line x1="60" y1="590" x2="100" y2="590" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="594" font-size="11" fill="#33415c">Cross-chapter baseline</text>
  <line x1="336" y1="590" x2="376" y2="590" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="384" y="594" font-size="11" fill="#166534">Combined provisioning sequence</text>
  <line x1="684" y1="590" x2="724" y2="590" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="732" y="594" font-size="11" fill="#b91c1c">Re-verified fail-safe</text>
</svg>
