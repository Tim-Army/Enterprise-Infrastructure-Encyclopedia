<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: a RAID 1 test virtual disk created with a dedicated hot spare on a lab PERC controller, tested against a delete request referencing a nonexistent virtual disk ID</title>
  <desc>
    Physical disks confirmed as spare and Ready are combined into a RAID 1 test virtual disk, which reports Ready/Online, and a third spare disk is assigned as its dedicated hot spare. A storage health check script confirms no drives are flagged before the negative test runs. As a negative test, a delete request deliberately references a virtual disk ID that does not exist; the command returns an error rather than succeeding or silently no-op'ing, confirming the platform validates the target before acting. The actual test virtual disk is then deleted for real, confirmed absent from subsequent disk listings.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Deleting a Virtual Disk by a Nonexistent ID Is Rejected, Not Ignored</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A RAID 1 test virtual disk and dedicated hot spare are built cleanly and torn down deliberately, with an invalid delete target caught first</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">RAID 1 test VD created</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">dedicated hot spare assigned</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">storage health check: clean</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="520.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="520.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">deletevd: Disk.Virtual.99</text>
  <text x="520.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">(nonexistent) → error</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Real deletion</text>
  <text x="810.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">deletevd: Disk.Virtual.0</text>
  <text x="810.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ VD no longer listed</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the invalid-ID delete attempt runs before the real deletion, confirming target validation happens</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">independently of whether a matching disk would otherwise be deletable.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Storage baseline build</text>
  <line x1="336" y1="460" x2="376" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="384" y="464" font-size="11" fill="#b91c1c">Rejected invalid target</text>
  <line x1="621" y1="460" x2="661" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="669" y="464" font-size="11" fill="#166534">Confirmed real deletion</text>
</svg>
