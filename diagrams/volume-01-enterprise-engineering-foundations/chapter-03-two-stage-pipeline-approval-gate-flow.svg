<svg viewBox="0 0 940 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: pull-request validation, merge, and an approval-gated deploy workflow</title>
  <desc>
    Every pull request triggers a read-only Validate workflow automatically. Merging to main triggers a separate Deploy workflow scoped to the production GitHub environment, which pauses in a Waiting state until a configured reviewer approves it, then completes. As a negative test, removing the only eligible reviewer from the production environment and triggering a new deploy run shows the gate fails closed: the run cannot proceed without any eligible approver.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="520" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: Two-Stage Pipeline with an Approval Gate</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A read-only validation job on every pull request, and a manually approved deploy job after merge</text>
  <rect x="40" y="60" width="220" height="60" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150.0" y="85.5" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Pull Request</text>
  <text x="150.0" y="103.5" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">opened against main</text>
  <line x1="260" y1="90" x2="380" y2="90" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="90.0" font-size="10.5" fill="#33415c">on: pull_request</text>
  <rect x="380" y="60" width="220" height="60" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="85.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Validate workflow</text>
  <text x="490.0" y="103.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#14532d">runs automatically, passes</text>
  <line x1="150" y1="120" x2="150" y2="180" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="156.0" y="150.0" font-size="10.5" fill="#33415c">gh pr merge --squash</text>
  <rect x="40" y="180" width="220" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150.0" y="209.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Merge to main</text>
  <line x1="150" y1="230" x2="150" y2="280" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="156.0" y="255.0" font-size="10.5" fill="#33415c">on: push (main)</text>
  <rect x="40" y="280" width="260" height="70" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="170.0" y="301.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Deploy workflow</text>
  <text x="170.0" y="319.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7c2d12">environment: production</text>
  <text x="170.0" y="337.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7c2d12">paused: &quot;Waiting&quot;</text>
  <line x1="300" y1="300" x2="420" y2="250" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="366.0" y="275.0" font-size="10.5" fill="#166534">reviewer approves</text>
  <rect x="420" y="220" width="260" height="60" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="550.0" y="245.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Deployment step executed</text>
  <text x="550.0" y="263.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#14532d">job proceeds and completes</text>
  <line x1="300" y1="340" x2="420" y2="400" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="366.0" y="370.0" font-size="10.5" fill="#b91c1c">no eligible reviewer (negative test)</text>
  <rect x="420" y="400" width="260" height="70" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="550.0" y="430.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Run cannot proceed</text>
  <text x="550.0" y="448.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">gate fails closed, not open</text>
  <line x1="40" y1="480" x2="80" y2="480" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="484" font-size="11" fill="#33415c">Trigger / merge event</text>
  <line x1="307" y1="480" x2="347" y2="480" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="355" y="484" font-size="11" fill="#166534">Approved and passing</text>
  <line x1="565" y1="480" x2="605" y2="480" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="613" y="484" font-size="11" fill="#b91c1c">Blocked (no approver)</text>
</svg>
