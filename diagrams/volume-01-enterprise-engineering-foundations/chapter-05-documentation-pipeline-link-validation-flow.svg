<svg viewBox="0 0 940 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: a markdown source tree, an internal-link checker gate, and a Pandoc HTML build</title>
  <desc>
    A small markdown source tree (intro.md linking to setup.md) is validated by an internal-link checker script before Pandoc builds standalone HTML. With valid links the checker exits 0 and the Pandoc build produces working HTML. As a negative test, the link in intro.md is deliberately broken (setup.md misspelled as setpu.md); the checker catches it and exits non-zero before any HTML is built, then the file is restored and the checker passes again.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="460" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: Documentation Pipeline Link-Validation Gate</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An internal-link checker that must pass before a Pandoc build ever runs</text>
  <rect x="40" y="70" width="220" height="60" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150.0" y="95.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Markdown Source Tree</text>
  <text x="150.0" y="113.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">content/intro.md, setup.md</text>
  <line x1="260" y1="100" x2="380" y2="100" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="326.0" y="100.0" font-size="10.5" fill="#33415c">check-internal-links.sh</text>
  <rect x="380" y="70" width="220" height="60" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="490.0" y="104.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Internal-Link Checker</text>
  <line x1="490" y1="130" x2="490" y2="190" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="496.0" y="160.0" font-size="10.5" fill="#166534">all links valid</text>
  <rect x="380" y="190" width="220" height="50" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="219.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Exit 0</text>
  <line x1="490" y1="240" x2="490" y2="290" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="496.0" y="265.0" font-size="10.5" fill="#166534">pandoc --embed-resources</text>
  <rect x="380" y="290" width="220" height="50" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="319.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">output/html/intro.html</text>
  <rect x="40" y="190" width="220" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="150.0" y="215.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">setup.md -&gt; setpu.md</text>
  <text x="150.0" y="233.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(negative test)</text>
  <line x1="150" y1="250" x2="150" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="156.0" y="275.0" font-size="10.5" fill="#b91c1c">check-internal-links.sh</text>
  <rect x="40" y="300" width="220" height="70" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="150.0" y="329.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">BROKEN LINK in content/intro.md</text>
  <text x="150.0" y="347.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">exits non-zero, build never runs</text>
  <line x1="40" y1="420" x2="80" y2="420" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="424" font-size="11" fill="#33415c">Source</text>
  <line x1="172" y1="420" x2="212" y2="420" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="220" y="424" font-size="11" fill="#166534">Valid links, build proceeds</text>
  <line x1="493" y1="420" x2="533" y2="420" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="541" y="424" font-size="11" fill="#b91c1c">Broken link, build blocked</text>
</svg>
