<svg viewBox="0 0 940 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: an issue linked to a Project board, closed automatically by a pull request's closing keyword</title>
  <desc>
    An issue is created, added to a GitHub Project (v2) board, and a pull request whose body contains the closing keyword syntax (Closes #N) is opened against it. Merging that pull request auto-closes the issue. As a negative test, a second pull request that only references its issue inside a code comment -- not in the PR body's closing-keyword syntax -- is merged, and the issue remains open, confirming only the documented syntax triggers auto-close.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="480" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: Linked Issue and Pull Request Flow</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A GitHub Project board with an issue that auto-closes only via the documented closing-keyword syntax</text>
  <rect x="40" y="70" width="240" height="60" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="95.5" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Issue + Project (v2) Board</text>
  <text x="160.0" y="113.5" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">gh issue create / project item-add</text>
  <line x1="160" y1="130" x2="160" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="40" y="190" width="240" height="60" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="160.0" y="215.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7c2d12">Pull Request body:</text>
  <text x="160.0" y="233.0" text-anchor="middle" font-size="11" font-weight="400" fill="#7c2d12">&quot;Closes #&lt;issue-number&gt;&quot;</text>
  <line x1="280" y1="220" x2="420" y2="160" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="356.0" y="190.0" font-size="10.5" fill="#166534">gh pr merge</text>
  <rect x="420" y="130" width="260" height="60" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="550.0" y="155.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Issue auto-closes</text>
  <text x="550.0" y="173.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#14532d">state == CLOSED</text>
  <rect x="40" y="300" width="240" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="160.0" y="325.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">Second PR:</text>
  <text x="160.0" y="343.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">issue referenced in a code comment only</text>
  <line x1="280" y1="330" x2="420" y2="380" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="356.0" y="355.0" font-size="10.5" fill="#b91c1c">gh pr merge (negative test)</text>
  <rect x="420" y="350" width="260" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="550.0" y="375.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Issue stays OPEN</text>
  <text x="550.0" y="393.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">informal reference does not close it</text>
  <line x1="40" y1="440" x2="80" y2="440" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="444" font-size="11" fill="#33415c">Setup</text>
  <line x1="163" y1="440" x2="203" y2="440" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="211" y="444" font-size="11" fill="#166534">Documented syntax closes issue</text>
  <line x1="511" y1="440" x2="551" y2="440" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="559" y="444" font-size="11" fill="#b91c1c">Informal reference does not</text>
</svg>
