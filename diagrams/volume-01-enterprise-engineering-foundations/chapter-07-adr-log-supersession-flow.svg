<svg viewBox="0 0 940 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: an ADR log validated for structure, with one decision superseding another</title>
  <desc>
    ADR-0001 records a decision (Accepted) to standardize on a monorepo. ADR-0002 later reverses that decision, and ADR-0001's status is updated to Superseded by ADR-0002. A validator checks every ADR file for four required sections (Status, Context, Decision, Consequences) and a status value matching the controlled pattern. As a negative test, a third ADR missing two required sections and using an invalid status value (In Review) is rejected with all three problems reported together.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b45309"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="480" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: ADR Log with Supersession</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Two linked architecture decisions, validated for required sections and a controlled status vocabulary</text>
  <rect x="40" y="60" width="240" height="70" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="90.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">ADR-0001: Accepted</text>
  <text x="160.0" y="108.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Standardize on a monorepo</text>
  <line x1="280" y1="95" x2="380" y2="95" stroke="#b45309" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrow-data)"/>
  <text x="336.0" y="95.0" font-size="10.5" fill="#b45309">ADR-0002 supersedes it</text>
  <rect x="380" y="60" width="260" height="70" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="510.0" y="90.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">ADR-0002: Accepted</text>
  <text x="510.0" y="108.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7c2d12">Revert to polyrepo</text>
  <line x1="160" y1="130" x2="160" y2="180" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="166.0" y="155.0" font-size="10.5" fill="#33415c">status updated</text>
  <rect x="40" y="180" width="240" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="208.8" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">ADR-0001: Superseded by ADR-0002</text>
  <line x1="160" y1="230" x2="160" y2="280" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="166.0" y="255.0" font-size="10.5" fill="#166534">validate-adr-log.sh</text>
  <rect x="40" y="280" width="240" height="50" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="160.0" y="309.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14532d">Exit 0 -- structure &amp; status valid</text>
  <rect x="420" y="180" width="300" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="570.0" y="205.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">ADR-0003: status 'In Review'</text>
  <text x="570.0" y="223.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(negative test)</text>
  <line x1="570" y1="240" x2="570" y2="290" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="576.0" y="265.0" font-size="10.5" fill="#b91c1c">validate-adr-log.sh</text>
  <rect x="420" y="290" width="300" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="570.0" y="320.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">MISSING SECTION '## Context'</text>
  <text x="570.0" y="338.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">MISSING SECTION '## Consequences'</text>
  <text x="570.0" y="356.7" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">INVALID STATUS 'In Review'</text>
  <line x1="40" y1="440" x2="80" y2="440" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="444" font-size="11" fill="#33415c">Decision record</text>
  <line x1="253" y1="440" x2="293" y2="440" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="301" y="444" font-size="11" fill="#166534">Passing validation</text>
  <line x1="493" y1="440" x2="533" y2="440" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="541" y="444" font-size="11" fill="#b91c1c">Rejected (negative test)</text>
</svg>
