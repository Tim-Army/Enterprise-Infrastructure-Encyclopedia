<svg viewBox="0 0 940 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: a CMDB asset record transitioned through a lifecycle state machine, with an illegal transition rejected</title>
  <desc>
    A CMDB record for srv-app-lab-001 moves through its legal lifecycle states in order: planned, procured, deployed, operating, maintenance, operating again, and finally decommissioned. Every transition is checked by a validator against a table of legal from-to state pairs before the record is modified. As a negative test, an attempt to transition the asset from decommissioned back to operating is rejected as illegal, and because the validator runs before the file is written, the record's state is never corrupted by the rejected attempt.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="460" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: CMDB Lifecycle State Machine</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A git-tracked asset record driven through its legal lifecycle, with illegal transitions rejected</text>
  <rect x="30" y="90" width="150" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="105.0" y="119.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">planned</text>
  <line x1="180" y1="115" x2="210" y2="115" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="210" y="90" width="150" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="285.0" y="119.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">procured</text>
  <line x1="360" y1="115" x2="390" y2="115" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="390" y="90" width="150" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="465.0" y="119.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">deployed</text>
  <line x1="540" y1="115" x2="570" y2="115" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="570" y="90" width="150" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="645.0" y="119.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">operating</text>
  <line x1="720" y1="115" x2="750" y2="115" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="750" y="90" width="150" height="50" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="825.0" y="119.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">maintenance</text>
  <line x1="900" y1="140" x2="900" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="906.0" y="165.0" font-size="10.5" fill="#33415c">apply-transition.sh</text>
  <rect x="750" y="190" width="150" height="50" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="825.0" y="219.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14532d">operating</text>
  <line x1="825" y1="240" x2="825" y2="290" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="750" y="290" width="150" height="50" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="825.0" y="318.9" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">decommissioned</text>
  <text x="480" y="370" text-anchor="middle" font-size="1" font-weight="400" fill="#1f2937"></text>
  <rect x="60" y="350" width="300" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="210.0" y="374.9" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">attempt: decommissioned -&gt; operating</text>
  <text x="210.0" y="392.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(negative test)</text>
  <line x1="360" y1="380" x2="460" y2="380" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="416.0" y="380.0" font-size="10.5" fill="#b91c1c">validate-lifecycle-transition.sh</text>
  <rect x="460" y="350" width="300" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="610.0" y="375.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">ILLEGAL TRANSITION -- rejected</text>
  <text x="610.0" y="393.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">record state unchanged</text>
  <line x1="40" y1="440" x2="80" y2="440" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="444" font-size="11" fill="#33415c">Legal transition</text>
  <line x1="262" y1="440" x2="302" y2="440" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="310" y="444" font-size="11" fill="#166534">Terminal state reached</text>
  <line x1="538" y1="440" x2="578" y2="440" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="586" y="444" font-size="11" fill="#b91c1c">Illegal transition (negative test)</text>
</svg>
