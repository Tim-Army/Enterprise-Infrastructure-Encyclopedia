<svg viewBox="0 0 940 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: a version-controlled domain inventory validated against a required-field and controlled-vocabulary schema</title>
  <desc>
    A JSON inventory of infrastructure domains (networking, identity, and so on) is validated by a script that checks every record has all required fields and that criticality_tier and consumption_model use only the controlled vocabulary values. A valid inventory passes with exit 0. As a negative test, a new record with a missing field and two invalid vocabulary values (on-prem instead of on-premises, critical instead of a defined tier) is added, and the validator reports all four problems in the same run before the file is restored.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="460" fill="#ffffff"/>
  <text x="470.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: Domain Inventory Schema Validation</text>
  <text x="470.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A git-tracked infrastructure domain inventory validated against required fields and controlled vocabularies</text>
  <rect x="40" y="70" width="260" height="70" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="170.0" y="100.5" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">domain-inventory.json</text>
  <text x="170.0" y="118.5" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">networking, identity records</text>
  <line x1="170" y1="140" x2="170" y2="190" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="176.0" y="165.0" font-size="10.5" fill="#33415c">validate-domain-inventory.sh</text>
  <rect x="40" y="190" width="260" height="60" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="170.0" y="215.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Schema Validator</text>
  <text x="170.0" y="233.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7c2d12">required fields + controlled vocab</text>
  <line x1="300" y1="210" x2="420" y2="150" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="366.0" y="180.0" font-size="10.5" fill="#166534">valid record</text>
  <rect x="420" y="120" width="280" height="60" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="560.0" y="154.2" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Exit 0, no errors</text>
  <line x1="300" y1="250" x2="420" y2="310" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="366.0" y="280.0" font-size="10.5" fill="#b91c1c">record missing fields + bad values (negative test)</text>
  <rect x="420" y="280" width="280" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="560.0" y="306.5" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">RECORD 2: missing 'primary_locations'</text>
  <text x="560.0" y="324.5" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">RECORD 2: missing 'encyclopedia_reference'</text>
  <text x="560.0" y="342.5" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">RECORD 2: invalid criticality_tier 'critical'</text>
  <text x="560.0" y="360.5" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">RECORD 2: invalid consumption_model 'on-prem'</text>
  <line x1="40" y1="420" x2="80" y2="420" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="424" font-size="11" fill="#33415c">Source</text>
  <line x1="172" y1="420" x2="212" y2="420" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="220" y="424" font-size="11" fill="#166534">Valid record</text>
  <line x1="358" y1="420" x2="398" y2="420" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="406" y="424" font-size="11" fill="#b91c1c">Rejected record (negative test)</text>
</svg>
