<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab topology: PowerShell Remoting used end to end to provision and harden a Windows Server target</title>
  <desc>
    An administrator workstation running PowerShell 7.4+ uses WinRM to reach winsrv-lab: Test-WSMan confirms connectivity, Install-WindowsFeature adds the File Server role, and Invoke-Command creates an SMB share and registers a scheduled task that writes a heartbeat file every minute. The WinRM listener is then hardened by disabling Basic authentication and unencrypted traffic. As a negative test, an explicit Basic-authentication connection attempt from the workstation is rejected after the hardening step, while a subsequent Kerberos/Negotiate attempt with valid credentials succeeds.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: Remote Windows Server Role Install and WinRM Hardening</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">PowerShell Remoting installs a role, schedules a task, then Basic authentication is disabled and tested</text>
  <rect x="60" y="170" width="260" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="221.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Administrator Workstation</text>
  <text x="190.0" y="239.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">PowerShell 7.4+</text>
  <text x="190.0" y="257.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Test-WSMan / Invoke-Command</text>
  <rect x="420" y="150" width="260" height="170" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="550.0" y="203.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">winsrv-lab</text>
  <text x="550.0" y="221.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">FS-FileServer role + LabShare</text>
  <text x="550.0" y="239.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">LabHeartbeat scheduled task</text>
  <text x="550.0" y="257.9" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">WinRM: Basic auth disabled</text>
  <text x="550.0" y="275.9" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">AllowUnencrypted: false</text>
  <line x1="320" y1="235" x2="420" y2="235" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="376.0" y="235.0" font-size="10.5" fill="#33415c">WinRM (Kerberos/Negotiate)</text>
  <rect x="60" y="400" width="780" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="450.0" y="442.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="450.0" y="460.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">Invoke-Command -Authentication Basic against winsrv-lab, after Basic auth was disabled</text>
  <text x="450.0" y="478.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">connection rejected — hardening control confirmed enforced</text>
  <text x="450.0" y="496.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">subsequent attempt with default Kerberos/Negotiate + valid credential succeeds</text>
  <line x1="550" y1="320" x2="450" y2="400" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="570" x2="100" y2="570" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="574" font-size="11" fill="#33415c">Kerberos/Negotiate (allowed)</text>
  <line x1="390" y1="570" x2="430" y2="570" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="438" y="574" font-size="11" fill="#166534">WinRM target state</text>
  <line x1="630" y1="570" x2="670" y2="570" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="678" y="574" font-size="11" fill="#b91c1c">Basic auth (denied)</text>
</svg>
