<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab flow: a confined service account, a systemd timer, LVM growth, and a scoped sudo rule on one Linux VM</title>
  <desc>
    A system account labsvc owns /var/lib/labsvc/data (mode 750) and runs labsvc-heartbeat.timer, which writes a timestamp every minute via a oneshot service. The volume group backing / is extended with the attached /dev/sdb disk (pvcreate, vgextend, lvextend +2G, then a filesystem grow), increasing available space. A sudoers rule scopes the labops group to only restart or check the status of labsvc-heartbeat.timer. As a negative test, a user outside labops is refused when attempting sudo systemctl restart on the timer; after being added to labops, the same command succeeds.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: Confined Service Account, systemd Timer, LVM Extend, and Scoped sudo</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">labsvc runs a heartbeat timer under a scoped identity; only the labops group may restart it</text>
  <rect x="60" y="130" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">labsvc (system account)</text>
  <text x="190.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">/var/lib/labsvc/data (750)</text>
  <text x="190.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">labsvc-heartbeat.timer (1 min)</text>
  <rect x="380" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="162.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">LVM extend</text>
  <text x="500.0" y="180.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">pvcreate /dev/sdb</text>
  <text x="500.0" y="198.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">vgextend + lvextend +2G</text>
  <text x="500.0" y="216.4" text-anchor="middle" font-size="10" font-weight="400" fill="#14532d">df -hT / shows growth</text>
  <rect x="660" y="130" width="260" height="130" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="790.0" y="172.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Scoped sudo rule</text>
  <text x="790.0" y="190.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">%labops ALL=(root) NOPASSWD:</text>
  <text x="790.0" y="208.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">systemctl restart/status</text>
  <text x="790.0" y="226.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">labsvc-heartbeat.timer only</text>
  <line x1="320" y1="185" x2="380" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="620" y1="185" x2="660" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="60" y="400" width="360" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="240.0" y="433.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="240.0" y="451.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">non-labops user: sudo systemctl restart</text>
  <text x="240.0" y="469.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">labsvc-heartbeat.timer → refused</text>
  <text x="240.0" y="487.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">user added to labops → same command</text>
  <text x="240.0" y="505.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">now succeeds</text>
  <line x1="790" y1="260" x2="240" y2="400" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="570" x2="100" y2="570" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="574" font-size="11" fill="#33415c">Service identity / timer</text>
  <line x1="354" y1="570" x2="394" y2="570" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="402" y="574" font-size="11" fill="#166534">Storage operation</text>
  <line x1="585" y1="570" x2="625" y2="570" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="633" y="574" font-size="11" fill="#b91c1c">Negative-test path</text>
</svg>
