<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab topology: an NFSv4 export restricted to one subnet, enforcing an XFS project quota</title>
  <desc>
    nfs01 exports /data/labexport read-write to the 10.20.30.0/24 subnet only. nfsclient01, inside that subnet, mounts the export over NFSv4 and reads the seeded file successfully. nfs01 applies an XFS project quota (10 MiB hard limit) to the exported directory; writing 15 MiB from nfsclient01 fails partway with 'Disk quota exceeded' once the limit is reached. As a negative test, a third host outside 10.20.30.0/24 attempting the same mount is refused — permission denied or no route — confirming the subnet restriction is enforced by the NFS server itself.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: NFSv4 Export Restricted by Subnet, with an XFS Project Quota</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">nfsclient01 mounts nfs01's export within the permitted subnet; a third host outside it is refused</text>
  <rect x="370" y="130" width="220" height="130" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="172.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">nfs01</text>
  <text x="480.0" y="190.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">/data/labexport (XFS, pquota)</text>
  <text x="480.0" y="208.9" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">export: 10.20.30.0/24 only</text>
  <text x="480.0" y="226.9" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7c2d12">project quota: bhard=10m</text>
  <rect x="80" y="300" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="200.0" y="332.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">nfsclient01</text>
  <text x="200.0" y="350.7" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">inside 10.20.30.0/24</text>
  <text x="200.0" y="368.7" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">mount -t nfs4 nfs01:/data/labexport</text>
  <text x="200.0" y="386.7" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">dd 15M → &quot;Disk quota exceeded&quot;</text>
  <rect x="660" y="300" width="240" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="780.0" y="332.7" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">Third host</text>
  <text x="780.0" y="350.7" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">outside 10.20.30.0/24</text>
  <text x="780.0" y="368.7" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">showmount -e / mount attempt</text>
  <text x="780.0" y="386.7" text-anchor="middle" font-size="10" font-weight="400" fill="#7f1d1d">→ refused (denied / no route)</text>
  <line x1="370" y1="230" x2="250" y2="300" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="316.0" y="265.0" font-size="10.5" fill="#166534">NFSv4 (permitted)</text>
  <line x1="590" y1="230" x2="720" y2="300" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="661.0" y="265.0" font-size="10.5" fill="#b91c1c">NFSv4 (negative test)</text>
  <rect x="80" y="460" width="820" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="509.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">Quota enforcement confirmed on nfs01: sudo xfs_quota -x -c 'report -p' /data shows usage at the hard limit</text>
  <line x1="80" y1="610" x2="120" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="614" font-size="11" fill="#33415c">Server-side policy</text>
  <line x1="320" y1="610" x2="360" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="368" y="614" font-size="11" fill="#166534">Permitted client</text>
  <line x1="542" y1="610" x2="582" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="590" y="614" font-size="11" fill="#b91c1c">Denied client (negative test)</text>
</svg>
