<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: OpenSCAP baseline scanning paired with idempotent Ansible remediation and a regression re-scan</title>
  <desc>
    A baseline oscap xccdf eval against the CIS profile records a nonzero fail count on a fresh VM. harden-ssh.yml sets PermitRootLogin no via lineinfile and reloads sshd; a re-scan shows the root-login rule now passing where it previously failed. As a negative test, PermitRootLogin is manually reverted to yes and sshd reloaded; a targeted re-scan catches the regression, showing the same rule failing again, demonstrating why the automation feedback loop must include re-scanning rather than trusting a one-time remediation. Re-running harden-ssh.yml restores the hardened state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: OpenSCAP Baseline Scan, Ansible Remediation, and Regression Re-Scan</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A CIS baseline scan drives a targeted fix; reintroducing the finding is caught by a re-scan</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Baseline Scan</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">oscap xccdf eval (CIS profile)</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">nonzero fail count recorded</text>
  <rect x="370" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="490.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">harden-ssh.yml</text>
  <text x="490.0" y="199.4" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">PermitRootLogin no</text>
  <text x="490.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">(lineinfile + reload sshd)</text>
  <rect x="680" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="790.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Re-Scan</text>
  <text x="790.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">permit_root_login rule:</text>
  <text x="790.0" y="217.4" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">fail → pass</text>
  <line x1="300" y1="195" x2="370" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="610" y1="195" x2="680" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="60" y="380" width="840" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="422.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="440.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">PermitRootLogin manually reverted to yes, sshd reloaded</text>
  <text x="480.0" y="458.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">targeted re-scan: permit_root_login rule shows fail again — regression caught</text>
  <text x="480.0" y="476.4" text-anchor="middle" font-size="11" font-weight="400" fill="#14532d">re-running harden-ssh.yml restores PermitRootLogin no</text>
  <line x1="790" y1="250" x2="480" y2="380" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="550" x2="100" y2="550" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="554" font-size="11" fill="#33415c">Remediation step</text>
  <line x1="282" y1="550" x2="322" y2="550" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="330" y="554" font-size="11" fill="#166534">Confirmed pass</text>
  <line x1="486" y1="550" x2="526" y2="550" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="534" y="554" font-size="11" fill="#b91c1c">Regression / negative-test path</text>
</svg>
