<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: a dependency graph's single-point-of-failure detection, contrasted with a severed-path negative test</title>
  <desc>
    find_spof.py analyzes a graph (ingress to web-frontend to api-service, which fans out to auth-service and database, with web-frontend also calling auth-service directly) and reports ['web-frontend', 'api-service'] as SPOFs, since both sit on the only path from ingress to the critical services. auth-service is correctly NOT reported, even though both upstream services call it — it is a leaf with no outgoing path back toward the critical services, a shared-dependency risk rather than a topological chokepoint. As a negative test, removing the web-frontend-to-api-service edge leaves api-service with no inbound edge at all; every remaining node is then trivially reported as a 'SPOF', correctly signaling that the redesign severed the only route in — a worse problem than any single SPOF.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: SPOF Detection Distinguishes Chokepoints From Shared Dependencies</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">web-frontend and api-service are topological SPOFs; auth-service is a shared-dependency risk the algorithm correctly does not flag</text>
  <rect x="60" y="140" width="180" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150.0" y="189.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">ingress</text>
  <rect x="300" y="140" width="200" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="400.0" y="180.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">web-frontend</text>
  <text x="400.0" y="198.6" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">SPOF #1</text>
  <rect x="540" y="140" width="200" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="640.0" y="180.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">api-service</text>
  <text x="640.0" y="198.6" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">SPOF #2</text>
  <rect x="780" y="60" width="160" height="80" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="860.0" y="95.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">auth-service</text>
  <text x="860.0" y="113.2" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">shared dep, not a SPOF</text>
  <rect x="780" y="220" width="160" height="80" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="860.0" y="264.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">database</text>
  <line x1="240" y1="185" x2="300" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="500" y1="185" x2="540" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <line x1="700" y1="165" x2="780" y2="110" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="746.0" y="137.5" font-size="10.5" fill="#166534">calls</text>
  <line x1="400" y1="175" x2="780" y2="100" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="596.0" y="137.5" font-size="10.5" fill="#166534">calls</text>
  <line x1="700" y1="205" x2="780" y2="250" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="60" y="340" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="382.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="400.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">web-frontend → api-service edge removed (redesign: front end talks only to auth)</text>
  <text x="490.0" y="418.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">api-service now has NO inbound edge at all — every remaining node trivially becomes a &quot;SPOF&quot;</text>
  <text x="490.0" y="436.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">the real finding: the redesign severed the only route to api-service, worse than any single SPOF</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Path to critical services</text>
  <line x1="363" y1="500" x2="403" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="411" y="504" font-size="11" fill="#b91c1c">Topological SPOF</text>
  <line x1="585" y1="500" x2="625" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="633" y="504" font-size="11" fill="#166534">Shared dependency (not a SPOF)</text>
</svg>
