<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: a decommission-readiness gate blocking a system with an active dependent, contrasted with an ungated naive decommission</title>
  <desc>
    decommission_check.py evaluates a dependency graph where legacy-batch-job still actively calls auth-service-v1, while unrelated production traffic uses auth-service-v2. The gate reports auth-service-v1 as BLOCKED (still depended on by legacy-batch-job) and legacy-batch-job itself as READY (nothing calls it). Retiring legacy-batch-job's status and re-running flips auth-service-v1 to READY, demonstrating the gate re-evaluates once the blocking dependent is itself retired. As a negative test, a naive one-line script that 'decommissions' auth-service-v1 unconditionally, with no dependency check, proceeds with no warning against the exact same active-dependent input the gated script correctly blocked — the concrete mechanism that prevents a premature-decommissioning outage.
  </desc>
  <defs>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: A Dependency-Gated Decommission Check That Blocks an Active Dependent</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">auth-service-v1 stays BLOCKED while its batch-job dependent is active, and READY the moment that dependent retires</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">legacy-batch-job</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">status: active → retired</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">READY (nothing depends on it)</text>
  <rect x="380" y="140" width="260" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="510.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">auth-service-v1</text>
  <text x="510.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">BLOCKED while batch-job active</text>
  <text x="510.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ READY once batch-job retires</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="346.0" y="195.0" font-size="10.5" fill="#33415c">active dependent</text>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">naive 1-line &quot;decommission&quot;</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">no check → proceeds, no warning</text>
  <line x1="640" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="375.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#7f1d1d">the ungated script decommissions auth-service-v1 unconditionally against the SAME input the gated</text>
  <text x="490.0" y="393.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#7f1d1d">script correctly BLOCKED — the gate is a required control, not an optional nicety, against premature-decommissioning outages.</text>
  <line x1="60" y1="470" x2="100" y2="470" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="474" font-size="11" fill="#33415c">Safe to retire</text>
  <line x1="264" y1="470" x2="304" y2="470" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="312" y="474" font-size="11" fill="#b91c1c">Gated / blocked path</text>
</svg>
