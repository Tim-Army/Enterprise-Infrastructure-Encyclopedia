<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 2 lab topology: an HSRP distribution pair connected to an access switch by two LACP EtherChannel trunks</title>
  <desc>
    DIST-01 and DIST-02 form an HSRP pair across VLANs 10 and 20, with active/standby roles reversed per VLAN to spread gateway load: DIST-01 is Active for VLAN 10 and Standby for VLAN 20; DIST-02 is the inverse. Both connect to ACCESS-01 by independent two-member LACP EtherChannel trunks carrying VLANs 10, 20, and 99 with native VLAN 999; DIST-01 is Rapid PVST+ root for all three VLANs. ACCESS-01's spare access port runs BPDU Guard and PortFast. As a negative test, attaching an unauthorized switch that emits BPDUs to that port causes it to transition to err-disabled, logging a SPANTREE-2-BLOCK_BPDUGUARD event.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 2 Hands-On Lab: Distribution HSRP Pair with LACP-Trunked Access Switch</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">DIST-01 active for VLAN 10 / standby for VLAN 20, DIST-02 the inverse, with BPDU Guard on the access edge</text>
  <rect x="80" y="140" width="220" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="177.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">DIST-01</text>
  <text x="190.0" y="195.9" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">VLAN 10: Active (110)</text>
  <text x="190.0" y="213.9" text-anchor="middle" font-size="11" font-weight="400" fill="#374151">VLAN 20: Standby (100)</text>
  <text x="190.0" y="231.9" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">STP root: VLANs 10/20/99</text>
  <rect x="660" y="140" width="220" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="770.0" y="186.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">DIST-02</text>
  <text x="770.0" y="204.9" text-anchor="middle" font-size="11" font-weight="400" fill="#374151">VLAN 10: Standby (100)</text>
  <text x="770.0" y="222.9" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">VLAN 20: Active (110)</text>
  <rect x="370" y="320" width="220" height="130" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="362.9" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">ACCESS-01</text>
  <text x="480.0" y="380.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">2x LACP EtherChannel trunks</text>
  <text x="480.0" y="398.9" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VLANs 10, 20, 99 · native 999</text>
  <text x="480.0" y="416.9" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">Gi1/0/10: PortFast + BPDU Guard</text>
  <line x1="190" y1="260" x2="430" y2="320" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="316.0" y="290.0" font-size="10.5" fill="#33415c">LACP trunk (VLAN 10/20/99)</text>
  <line x1="770" y1="260" x2="550" y2="320" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="666.0" y="290.0" font-size="10.5" fill="#33415c">LACP trunk (VLAN 10/20/99)</text>
  <rect x="370" y="500" width="220" height="100" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="527.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="545.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">unauthorized switch on Gi1/0/10</text>
  <text x="480.0" y="563.0" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">emits BPDUs → err-disabled</text>
  <text x="480.0" y="581.0" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">%SPANTREE-2-BLOCK_BPDUGUARD</text>
  <line x1="480" y1="450" x2="480" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="80" y1="610" x2="120" y2="610" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="128" y="614" font-size="11" fill="#33415c">VLAN 10 active path</text>
  <line x1="329" y1="610" x2="369" y2="610" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="377" y="614" font-size="11" fill="#166534">VLAN 20 active path</text>
  <line x1="578" y1="610" x2="618" y2="610" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="626" y="614" font-size="11" fill="#b91c1c">Negative-test path</text>
</svg>
