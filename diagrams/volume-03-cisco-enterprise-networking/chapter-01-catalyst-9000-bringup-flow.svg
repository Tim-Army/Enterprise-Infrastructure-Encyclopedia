<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: bringing a Catalyst 9000 switch from factory defaults to a hardened, licensed device</title>
  <desc>
    A Catalyst 9000 switch starting in bundle mode is converted to install mode and reloaded, then hardened with a hostname, local credentials, and SSH/console/vty lockdown as CAMPUS-ACCESS-01. VLAN 99 and its SVI (10.10.99.10/24) are created and confirmed up with a successful gateway ping, then Smart Licensing is registered against CSSM. As a negative test, an SSH login with an intentionally wrong password is rejected after three attempts and the failure is confirmed in the device's logging output.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: Catalyst 9000 Bring-Up to a Hardened Install-Mode Device</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Bundle mode → install mode → hardened CLI/SSH → management VLAN → Smart Licensing</text>
  <rect x="40" y="120" width="200" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="140.0" y="160.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Switch (bundle mode)</text>
  <text x="140.0" y="178.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">factory defaults</text>
  <line x1="240" y1="165" x2="320" y2="165" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="286.0" y="165.0" font-size="10.5" fill="#33415c">install_mode + reload</text>
  <rect x="320" y="120" width="220" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="430.0" y="151.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CAMPUS-ACCESS-01</text>
  <text x="430.0" y="169.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">install mode, hardened</text>
  <text x="430.0" y="187.4" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">SSH + console/vty lockdown</text>
  <line x1="430" y1="210" x2="430" y2="260" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="436.0" y="235.0" font-size="10.5" fill="#33415c">VLAN 99 + SVI</text>
  <rect x="320" y="260" width="220" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="430.0" y="291.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Vlan99 (mgmt SVI)</text>
  <text x="430.0" y="309.4" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d4ed8">10.10.99.10/24</text>
  <text x="430.0" y="327.4" text-anchor="middle" font-size="10" font-weight="400" fill="#374151">up/up, gateway ping OK</text>
  <line x1="540" y1="305" x2="660" y2="305" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="606.0" y="305.0" font-size="10.5" fill="#166534">license smart trust idtoken</text>
  <rect x="660" y="260" width="260" height="90" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="790.0" y="291.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Smart Licensing (CSSM)</text>
  <text x="790.0" y="309.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">transport: smart</text>
  <text x="790.0" y="327.4" text-anchor="middle" font-size="10" font-weight="400" fill="#14532d">last report: successful</text>
  <rect x="40" y="400" width="400" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="240.0" y="432.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="240.0" y="450.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">ssh netadmin@10.10.99.10 with an intentionally wrong password</text>
  <text x="240.0" y="468.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">rejected after 3 attempts; session closed</text>
  <text x="240.0" y="486.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">show logging | include Login confirms the failed attempt</text>
  <line x1="40" y1="550" x2="80" y2="550" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="88" y="554" font-size="11" fill="#33415c">Bring-up / hardening step</text>
  <line x1="343" y1="550" x2="383" y2="550" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="391" y="554" font-size="11" fill="#166534">Licensing step</text>
</svg>
