<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: an access-layer trust boundary feeding a WAN-edge LLQ/CBWFQ policy under congestion</title>
  <desc>
    An IP phone on ACCESS-01's trust boundary (trust device cisco-phone) marks voice traffic, which flows through DIST-01 to a WAN-edge device applying the WAN-EDGE-OUT policy-map (VOICE, VIDEO, CALL-SIGNALING, BUSINESS-CRITICAL classes with LLQ/CBWFQ) outbound. Under sustained best-effort congestion plus a DSCP EF-marked test stream, the VOICE class shows near-zero drops while class-default absorbs tail-drops. As a negative test, removing the service-policy from the WAN interface and repeating the test shows the EF stream now drops/jitters proportionally to the congestion, proving the queuing policy — not the marking alone — protected voice.
  </desc>
  <defs>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b45309"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: End-to-End QoS from Access Trust Boundary to WAN-Edge LLQ</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">VOICE traffic protected by WAN-EDGE-OUT's priority queue while class-default absorbs congestion</text>
  <rect x="60" y="160" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160.0" y="196.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">ACCESS-01</text>
  <text x="160.0" y="214.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">trust device cisco-phone</text>
  <text x="160.0" y="232.6" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">DHCP snooping binding</text>
  <rect x="370" y="160" width="200" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="470.0" y="196.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">DIST-01</text>
  <text x="470.0" y="214.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">trusted DSCP carried</text>
  <text x="470.0" y="232.6" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">through to WAN edge</text>
  <rect x="680" y="130" width="240" height="160" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="800.0" y="178.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">WAN Edge — WAN-EDGE-OUT</text>
  <text x="800.0" y="196.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">VOICE (LLQ, priority)</text>
  <text x="800.0" y="214.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VIDEO / CALL-SIGNALING</text>
  <text x="800.0" y="232.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">BUSINESS-CRITICAL / class-default</text>
  <text x="800.0" y="250.4" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">class-default absorbs congestion</text>
  <line x1="260" y1="210" x2="370" y2="210" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="321.0" y="210.0" font-size="10.5" fill="#33415c">voice + best-effort</text>
  <line x1="570" y1="210" x2="680" y2="210" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="631.0" y="210.0" font-size="10.5" fill="#33415c">outbound WAN-EDGE-OUT</text>
  <rect x="60" y="400" width="840" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="432.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="450.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">service-policy output WAN-EDGE-OUT removed from the WAN interface, congestion test repeated</text>
  <text x="480.0" y="468.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">EF-marked stream now experiences drops/jitter proportional to best-effort congestion</text>
  <text x="480.0" y="486.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">confirms queuing — not marking alone — protected VOICE in the baseline test</text>
  <line x1="800" y1="290" x2="480" y2="400" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="60" y1="570" x2="100" y2="570" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="574" font-size="11" fill="#33415c">Management-plane connection</text>
  <line x1="381" y1="570" x2="421" y2="570" stroke="#b45309" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrow-data)"/>
  <text x="429" y="574" font-size="11" fill="#b45309">Data-plane connection</text>
</svg>
