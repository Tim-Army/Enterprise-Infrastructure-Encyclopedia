<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: full end-to-end capstone validation with a configuration backup, tested against a deliberately undocumented misconfiguration and restored via backup</title>
  <desc>
    A full validation checklist across licensing, HA, routing, SD-WAN health, and VPN sessions is recorded as a dated baseline, and a configuration backup exports to TFTP storage; a Config-Change automation stitch confirms an automatic backup fires after a trivial, reversible change. As a negative test, a specific, realistic misconfiguration is introduced without being documented in advance — for example, an overlapping NAT pool range or a shadowing firewall policy reorder — and the resulting symptom is worked through the layered troubleshooting decision tree step by step until the actual root cause is correctly identified, without guessing. The fault is corrected, the affected traffic flow confirmed restored, and the original backup is restored as a final validation that recovery returns the device to the exact baseline state.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: The Capstone — a Deliberately Undocumented Fault, Traced Layer by Layer to Root Cause</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A restored baseline confirms recovery; a hidden misconfiguration is found methodically, not guessed, using the layered decision tree</text>
  <rect x="60" y="130" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Full validation checklist</text>
  <text x="190.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">licensing, HA, routes, SD-WAN,</text>
  <text x="190.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">VPN — recorded as dated baseline</text>
  <rect x="400" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Config backup + auto-backup</text>
  <text x="520.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">TFTP export confirmed</text>
  <text x="520.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Config-Change stitch fires</text>
  <line x1="320" y1="185" x2="400" y2="185" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">undocumented misconfiguration</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">introduced deliberately</text>
  <line x1="640" y1="185" x2="700" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="371.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Layered Troubleshooting</text>
  <text x="490.0" y="389.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">decision tree walked step by step, layer by layer, documenting what was checked and found at each step</text>
  <text x="490.0" y="407.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">root cause correctly identified without guessing — misconfiguration corrected, traffic flow restored</text>
  <rect x="60" y="470" width="860" height="90" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="490.0" y="510.0" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14532d">Final validation: the step-2 backup is restored, and the device returns to the exact baseline state —</text>
  <text x="490.0" y="528.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">recovery is confirmed by re-running the same validation checklist, not merely assumed.</text>
  <line x1="60" y1="600" x2="100" y2="600" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="604" font-size="11" fill="#33415c">Baseline + backup</text>
  <line x1="291" y1="600" x2="331" y2="600" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="339" y="604" font-size="11" fill="#b91c1c">Hidden fault + diagnosis</text>
  <line x1="585" y1="600" x2="625" y2="600" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="633" y="604" font-size="11" fill="#166534">Confirmed restore</text>
</svg>
