<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 4 lab flow: FortiGate first deployment and hardening, tested against a management-access attempt from outside the trusted subnet</title>
  <desc>
    FGT-LAB-01 receives hostname, DNS, NTP, FortiCare licensing, a hardened management interface, a strong password policy, and trusthost1 restricted to the lab management subnet. As a negative test, a workstation on a different subnet than trusthost1 attempts to reach the GUI or SSH; the connection is refused or times out, confirming trusthost enforcement is actively restricting management access rather than merely being configured. FortiToken (or an email-based lab substitute) is then enabled on the admin account, and final validation confirms hostname, licensing, hardened admin configuration, and an enabled password policy all together.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 4 Hands-On Lab: trusthost Enforcement Confirmed From Outside the Permitted Subnet</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Management access works normally from the lab subnet and is refused entirely from anywhere else</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">FGT-LAB-01 hardening</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">hostname, DNS/NTP, licensing</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">trusthost1: lab mgmt subnet only</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="195.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Workstation on trusthost1 subnet</text>
  <text x="520.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">GUI/SSH reachable normally</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="186.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="204.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">workstation on a different subnet</text>
  <text x="810.0" y="222.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ refused / timeout</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">trusthost enforcement blocks management access from any subnet not explicitly permitted, confirmed</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">by an actual connection attempt rather than trusting the configuration alone.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Hardening baseline</text>
  <line x1="300" y1="460" x2="340" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="348" y="464" font-size="11" fill="#166534">Permitted management access</text>
  <line x1="621" y1="460" x2="661" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="669" y="464" font-size="11" fill="#b91c1c">Denied out-of-subnet access</text>
</svg>
