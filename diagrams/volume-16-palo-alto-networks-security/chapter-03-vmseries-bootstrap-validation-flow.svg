<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 3 lab flow: a VM-Series bootstrap package validated end to end, then a deliberately malformed init-cfg.txt tested against bootstrap validation</title>
  <desc>
    A bootstrap ISO built from init-cfg.txt (static IP 10.10.10.15, hostname pa-vmseries-lab01) is attached to a freshly deployed VM-Series instance; show system bootstrap reports SUCCESS and the hostname/management IP match init-cfg.txt exactly, with no manual configuration entered at the console. SSH from the workstation confirms reachability. As a negative test, init-cfg.txt is edited to introduce a malformed netmask value and rebuilt into a second ISO attached to a new instance; the instance either fails bootstrap validation outright or falls back to its factory default management IP, confirming PAN-OS does not silently accept invalid bootstrap values.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 3 Hands-On Lab: A Bootstrap ISO That Configures VM-Series With Zero Manual Console Entry</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A correct init-cfg.txt reaches a licensed, networked state automatically; a malformed netmask value is rejected, not silently accepted</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">bootstrap ISO (valid)</text>
  <text x="190.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">init-cfg.txt: static IP,</text>
  <text x="190.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">hostname, correct netmask</text>
  <rect x="400" y="140" width="260" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="530.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">VM-Series instance</text>
  <text x="530.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Bootstrap: SUCCESS</text>
  <text x="530.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">SSH reachable, zero manual config</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">malformed netmask in</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">init-cfg.txt</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ FAILURE or factory-default IP</text>
  <line x1="660" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">bootstrap validation catches the malformed field rather than silently applying a broken network config —</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the bootstrap log identifies the specific rejected field before the file is corrected and redeployed.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Bootstrap package</text>
  <line x1="291" y1="460" x2="331" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="339" y="464" font-size="11" fill="#166534">Successful zero-touch bootstrap</text>
  <line x1="648" y1="460" x2="688" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="696" y="464" font-size="11" fill="#b91c1c">Malformed field (rejected)</text>
</svg>
