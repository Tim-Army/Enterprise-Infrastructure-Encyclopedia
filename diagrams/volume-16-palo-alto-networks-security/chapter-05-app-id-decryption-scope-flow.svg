<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: an App-ID security policy with an attached inspection profile, validated for scope and paired with a category-excluded decryption rule</title>
  <desc>
    Allow-Outbound-Web-Scoped (web-browsing, ssl, dns only, with the Lab-Inspection profile group attached) matches a simulated SSL session from the trust zone, confirmed by test security-policy-match. As a negative test, the same lookup for a bittorrent application matches no rule but the default deny, confirming the scoped rule does not implicitly permit unrelated applications. A decryption rule pair — decrypt everything except financial-services, with the exclusion ordered first — is validated by browsing to a non-excluded site (decrypted, logged) and a financial-services site (not decrypted, no certificate warning, logged as no-decrypt).
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: An App-ID Rule That Doesn't Implicitly Permit Unrelated Applications</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A scoped web/SSL/DNS rule matches exactly the intended traffic and blocks bittorrent by default; a financial-services site skips decryption</text>
  <rect x="60" y="130" width="260" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="190.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Allow-Outbound-Web-Scoped</text>
  <text x="190.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">web-browsing, ssl, dns +</text>
  <text x="190.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Lab-Inspection profile group</text>
  <rect x="360" y="130" width="240" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">test: application bittorrent</text>
  <text x="480.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ no rule match (default deny)</text>
  <line x1="320" y1="185" x2="360" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="660" y="130" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="790.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Decrypt-Exclude-Financial</text>
  <text x="790.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">(ordered first) → no-decrypt</text>
  <text x="790.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">Decrypt-Outbound-Lab → decrypt</text>
  <rect x="60" y="300" width="400" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="260.0" y="336.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Non-excluded HTTPS site</text>
  <text x="260.0" y="354.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">decrypted, inspected</text>
  <text x="260.0" y="372.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">logged in Monitor &gt; Logs &gt; Decryption</text>
  <rect x="500" y="300" width="400" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="700.0" y="336.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">financial-services category site</text>
  <text x="700.0" y="354.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">NOT decrypted</text>
  <text x="700.0" y="372.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">no cert warning, logged no-decrypt</text>
  <line x1="60" y1="440" x2="100" y2="440" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="108" y="444" font-size="11" fill="#166534">Scoped, correctly matching</text>
  <line x1="372" y1="440" x2="412" y2="440" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="420" y="444" font-size="11" fill="#b91c1c">Correctly non-matching</text>
  <line x1="648" y1="440" x2="688" y2="440" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="696" y="444" font-size="11" fill="#33415c">Decryption rule outcome</text>
</svg>
