<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: a Terraform configuration scanned with Checkov, deliberately failing first, then remediated and gated in CI/CD</title>
  <desc>
    A sample Terraform file with an unrestricted SSH ingress rule and an unencrypted S3 bucket is scanned with Checkov; it reports at least one FAILED check (CKV_AWS_24) for the open ingress rule. This failure is the expected, correct behavior for a known-bad configuration — a scan reporting no findings against this specific file would indicate a broken Checkov installation, not a secure configuration. Narrowing the security group's CIDR block to a lab subnet and re-scanning shows CKV_AWS_24 now PASSED; a documented suppression is added for the remaining S3 finding. Pushed to a CI/CD pipeline, the unremediated branch fails the check and the remediated branch passes.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: A Checkov Scan That Must Fail Before It Can Prove Remediation Works</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">An open-SSH security group fails CKV_AWS_24 on the first scan by design; a clean scan against this file would mean Checkov itself was broken</text>
  <rect x="60" y="130" width="260" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="190.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Sample Terraform (as-is)</text>
  <text x="190.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">SSH ingress: 0.0.0.0/0</text>
  <text x="190.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">checkov: CKV_AWS_24 FAILED</text>
  <rect x="400" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Remediated</text>
  <text x="520.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">CIDR narrowed to 10.10.0.0/16</text>
  <text x="520.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">checkov: CKV_AWS_24 PASSED</text>
  <line x1="320" y1="185" x2="400" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">CI/CD gate</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">unremediated branch: fails</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">remediated branch: passes</text>
  <line x1="640" y1="185" x2="700" y2="185" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="300" width="860" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="345.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">the initial FAILED result is the expected, correct behavior for a deliberately insecure sample —</text>
  <text x="490.0" y="363.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">a scan reporting zero findings against this exact file would mean Checkov itself was broken, not that the code was secure.</text>
  <line x1="60" y1="440" x2="100" y2="440" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="108" y="444" font-size="11" fill="#b91c1c">Deliberately failing (as designed)</text>
  <line x1="444" y1="440" x2="484" y2="440" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="492" y="444" font-size="11" fill="#166534">Remediated, passing</text>
  <line x1="693" y1="440" x2="733" y2="440" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="741" y="444" font-size="11" fill="#6b7280">Pipeline gate outcome</text>
</svg>
