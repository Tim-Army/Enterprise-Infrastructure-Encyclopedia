<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 1 lab flow: first-touch PAN-OS configuration committed successfully, then a deliberately invalid management address tested against commit validation</title>
  <desc>
    pa-lab-fw01's hostname and management IP (10.10.10.5/24) commit successfully, confirmed by SSH reachability from the workstation; a second, role-based administrator account (labeng) is created for daily use instead of admin. As a negative test, the management IP is set to 10.10.10.255 — a broadcast-adjacent address outside any valid host range for the configured netmask — and committed; PAN-OS either rejects the commit outright or the interface becomes unreachable at that address, confirming candidate-configuration validation catches the invalid value rather than silently accepting it. Reverting to the working address restores management access.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 1 Hands-On Lab: PAN-OS Candidate Configuration Validation Rejects an Invalid Management IP</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A hostname, management address, and scoped admin commit cleanly; a broadcast-adjacent address does not</text>
  <rect x="60" y="140" width="260" height="120" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="186.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">pa-lab-fw01</text>
  <text x="190.0" y="204.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">hostname + mgmt IP 10.10.10.5/24</text>
  <text x="190.0" y="222.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">commit: successful</text>
  <rect x="400" y="140" width="240" height="120" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="520.0" y="186.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Role-based admin: labeng</text>
  <text x="520.0" y="204.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">SSH reachable at 10.10.10.5</text>
  <text x="520.0" y="222.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">replaces daily use of admin</text>
  <line x1="320" y1="200" x2="400" y2="200" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="120" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="177.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="195.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">mgmt IP → 10.10.10.255</text>
  <text x="810.0" y="213.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">(broadcast-adjacent, invalid)</text>
  <text x="810.0" y="231.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">commit rejected / unreachable</text>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="370.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">candidate-configuration validation catches the invalid address before or immediately after commit —</text>
  <text x="490.0" y="388.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">reverting to 10.10.10.5 and committing again restores working management access.</text>
  <line x1="60" y1="460" x2="100" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="464" font-size="11" fill="#33415c">Committed baseline config</text>
  <line x1="363" y1="460" x2="403" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="411" y="464" font-size="11" fill="#166534">Working admin access</text>
  <line x1="621" y1="460" x2="661" y2="460" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="669" y="464" font-size="11" fill="#b91c1c">Rejected invalid commit</text>
</svg>
