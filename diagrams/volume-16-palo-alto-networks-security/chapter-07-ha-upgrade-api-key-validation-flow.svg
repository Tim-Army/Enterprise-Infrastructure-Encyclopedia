<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: an HA-aware upgrade sequence, packet-diag capture, and XML/REST API operations, tested against an invalid API key</title>
  <desc>
    Suspending the passive HA member for upgrade preparation leaves the active peer serving traffic uninterrupted, confirmed by show high-availability state; returning the member to functional state completes the sequence. A filtered packet-diag capture confirms matching packets for a specific test flow. An XML API keygen request retrieves system info matching the CLI's output, and a REST API POST creates an address object confirmed at the CLI. As a negative test, the same system info request is repeated with a deliberately invalid API key; the API returns an authentication failure rather than falling back to an unauthenticated default, confirming key validation is actually enforced.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: The API Enforces Key Validation Rather Than Falling Back to a Default</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A suspended HA member keeps traffic flowing on its peer; a deliberately invalid API key is rejected, not silently accepted</text>
  <rect x="60" y="140" width="240" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Passive HA member</text>
  <text x="180.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">suspended for upgrade prep</text>
  <text x="180.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">peer stays active, uninterrupted</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">XML/REST API (valid key)</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">system info retrieved</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">address object created</text>
  <line x1="300" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">same request, invalid key</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">→ authentication failure</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="320" width="860" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="490.0" y="360.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">no unauthenticated fallback exists — an invalid key is rejected outright, the same enforcement</text>
  <text x="490.0" y="378.0" text-anchor="middle" font-size="11.5" font-weight="400" fill="#374151">boundary that protects the CLI, applied consistently to the XML and REST APIs.</text>
  <line x1="60" y1="450" x2="100" y2="450" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="454" font-size="11" fill="#33415c">HA-aware upgrade prep</text>
  <line x1="327" y1="450" x2="367" y2="450" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="375" y="454" font-size="11" fill="#166534">Authenticated API operations</text>
  <line x1="657" y1="450" x2="697" y2="450" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="705" y="454" font-size="11" fill="#b91c1c">Rejected invalid credential</text>
</svg>
