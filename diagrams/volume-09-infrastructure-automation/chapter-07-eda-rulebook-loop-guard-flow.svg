<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 7 lab flow: an Ansible EDA rulebook reacting to a webhook alert, with a guard preventing it from reacting to its own output</title>
  <desc>
    ansible-rulebook listens on a local webhook for HighCPU/firing alerts. A matching event with source=monitoring triggers the rule, running scale_out.yml and appending a log line recording the trigger. As a negative test, an otherwise identical event tagged source=automation (as if produced by the automation's own action) is sent; the rulebook receives it but the rule's condition (event.payload.source != &quot;automation&quot;) does not match, so no playbook runs and no log line is appended — proving the guard actually prevents a feedback loop rather than merely documenting the intent to prevent one.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 7 Hands-On Lab: Event-Driven Ansible with a Self-Produced-Event Loop Guard</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">A monitoring-sourced alert triggers the rulebook; an automation-sourced alert is correctly ignored</text>
  <rect x="60" y="140" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="190.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Webhook event</text>
  <text x="190.0" y="208.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">HighCPU/firing, source=monitoring</text>
  <rect x="380" y="140" width="260" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="510.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">ansible-rulebook</text>
  <text x="510.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">condition matches (source ≠ automation)</text>
  <text x="510.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">→ runs scale_out.yml</text>
  <line x1="320" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="810.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Action taken</text>
  <text x="810.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">log: &quot;Scale-out triggered</text>
  <text x="810.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">by alert on web01&quot;</text>
  <line x1="640" y1="195" x2="700" y2="195" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="860" height="130" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="372.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="390.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">identical event but source=automation (as if self-produced by the automation's own action)</text>
  <text x="490.0" y="408.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">rulebook receives it, but condition source != &quot;automation&quot; does not match — rule does not fire</text>
  <text x="490.0" y="426.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">no playbook run, no new log line — the loop-breaking guard is actually enforced, not just documented</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Incoming event</text>
  <line x1="264" y1="500" x2="304" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="312" y="504" font-size="11" fill="#166534">Matched, actioned</text>
  <line x1="495" y1="500" x2="535" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="543" y="504" font-size="11" fill="#b91c1c">Guarded, ignored</text>
</svg>
