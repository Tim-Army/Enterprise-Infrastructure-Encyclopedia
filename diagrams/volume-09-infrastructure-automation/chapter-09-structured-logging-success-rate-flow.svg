<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 9 lab flow: structured JSON logging around Terraform apply, a computed success-rate metric, and a Vault backup drill</title>
  <desc>
    apply-with-log.sh wraps terraform apply, recording run_id, duration, exit_status, and timestamp as one JSON line per run in apply-runs.jsonl. Three successful runs produce a computed success rate of 3/3. Separately, a Vault dev-mode backup-and-restore drill seeds a marker secret to prove a backup is actually usable, not merely present. As a negative test, a deliberately broken resource (negative length) is added and the wrapper run a fourth time; the run log gains a fourth entry with a non-zero exit_status, and the recomputed success rate correctly drops to 3/4 — proving the instrumentation captures failures as data instead of only recording successful runs.
  </desc>
  <defs>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 9 Hands-On Lab: A Success-Rate Metric That Correctly Captures a Failed Run</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Three clean applies report 3/3; a deliberately broken fourth run drops the rate to 3/4 instead of vanishing</text>
  <rect x="60" y="140" width="260" height="110" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="190.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">apply-with-log.sh x3</text>
  <text x="190.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">apply-runs.jsonl: 3 lines</text>
  <text x="190.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">Success rate: 3/3</text>
  <rect x="380" y="140" width="240" height="110" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="500.0" y="181.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Vault backup drill</text>
  <text x="500.0" y="199.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">kv put marker → kv get</text>
  <text x="500.0" y="217.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">confirms backup is usable</text>
  <line x1="320" y1="195" x2="380" y2="195" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <rect x="700" y="140" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="181.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="199.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">broken resource added</text>
  <text x="810.0" y="217.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">4th run: non-zero exit_status</text>
  <line x1="620" y1="195" x2="700" y2="195" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <rect x="60" y="330" width="860" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="371.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Result</text>
  <text x="490.0" y="389.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">apply-runs.jsonl now has 4 entries; the 4th shows a non-zero exit_status, not a missing entry</text>
  <text x="490.0" y="407.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">recomputed success rate correctly drops to 3/4 — failures are captured as data, not silently dropped</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="108" y="504" font-size="11" fill="#33415c">Successful, logged runs</text>
  <line x1="345" y1="500" x2="385" y2="500" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="393" y="504" font-size="11" fill="#6b7280">Backup drill</text>
  <line x1="531" y1="500" x2="571" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="579" y="504" font-size="11" fill="#b91c1c">Failed run (captured, not lost)</text>
</svg>
