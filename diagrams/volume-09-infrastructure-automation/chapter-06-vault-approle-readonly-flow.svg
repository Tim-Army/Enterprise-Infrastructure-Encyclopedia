<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 6 lab flow: a Vault AppRole-issued, read-only-scoped token used by both a CLI login flow and an Ansible lookup</title>
  <desc>
    Vault dev mode seeds secret/pipeline/db_password. An AppRole role ci-pipeline is bound to a pipeline-read policy granting only read on secret/data/pipeline/*, with a 10-minute token TTL. The issued token reads the secret successfully both via the Vault CLI and via an Ansible community.hashi_vault lookup task (with no_log: true keeping the value out of task output). As a negative test, the same scoped token attempts a write to the same secret path; Vault returns 'permission denied', proving the read-only policy is enforced by Vault itself, not merely by convention.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 6 Hands-On Lab: Vault AppRole Scoped to Read-Only, Enforced Against a Write Attempt</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">The ci-pipeline token reads the secret from both the CLI and an Ansible lookup, but cannot write to it</text>
  <rect x="370" y="110" width="220" height="90" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="480.0" y="150.6" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Vault dev mode</text>
  <text x="480.0" y="168.6" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">secret/pipeline/db_password</text>
  <line x1="480" y1="200" x2="480" y2="240" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="486.0" y="220.0" font-size="10.5" fill="#6b7280">AppRole login</text>
  <rect x="370" y="240" width="220" height="90" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="280.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">ci-pipeline AppRole</text>
  <text x="480.0" y="298.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">policy: pipeline-read (read only)</text>
  <rect x="80" y="380" width="260" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="210.0" y="425.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">CLI: vault kv get</text>
  <text x="210.0" y="443.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">returns value successfully</text>
  <rect x="620" y="380" width="260" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="750.0" y="425.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Ansible hashi_vault lookup</text>
  <text x="750.0" y="443.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">assertion passes, no_log: true</text>
  <line x1="400" y1="330" x2="210" y2="380" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <line x1="560" y1="330" x2="750" y2="380" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="80" y="510" width="800" height="90" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="480.0" y="541.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="480.0" y="559.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">same ci-pipeline token: vault kv put (write) → &quot;permission denied&quot;</text>
  <text x="480.0" y="577.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">Vault itself enforces the read-only policy boundary, not merely convention</text>
  <line x1="80" y1="460" x2="120" y2="460" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="128" y="464" font-size="11" fill="#6b7280">Secret store</text>
  <line x1="266" y1="460" x2="306" y2="460" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="314" y="464" font-size="11" fill="#33415c">Scoped token issuance</text>
  <line x1="533" y1="460" x2="573" y2="460" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="581" y="464" font-size="11" fill="#166534">Permitted reads</text>
</svg>
