<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 8 lab flow: a Terraform module scanned with Checkov, packaged, and cosign-signed, then verified against a tampered archive</title>
  <desc>
    Checkov scans the demo module for misconfigurations, reporting a clean or low-severity summary. The module is packaged into demo-module.tar.gz and signed with cosign sign-blob using a local key pair, producing demo-module.tar.gz.sig. cosign verify-blob against the untouched archive prints 'Verified OK'. As a negative test, one line is appended to the archive after signing; re-running cosign verify-blob against the same signature now fails with a signature mismatch error, proving that even a one-line append invalidates the signature and that consuming this artifact without verification would have gone undetected.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-mgmt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#33415c"/></marker>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 8 Hands-On Lab: Signed Module Archive Verified, Then Invalidated by a One-Line Tamper</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">cosign verify-blob passes against the untouched archive and fails the instant a byte is appended</text>
  <rect x="60" y="140" width="220" height="100" rx="8" fill="#f4f7fb" stroke="#33415c" stroke-width="2"/>
  <text x="170.0" y="176.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Checkov scan</text>
  <text x="170.0" y="194.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">modules/demo</text>
  <text x="170.0" y="212.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">clean / low-severity summary</text>
  <rect x="360" y="140" width="240" height="100" rx="8" fill="#eaf2ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="480.0" y="176.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">Package + sign</text>
  <text x="480.0" y="194.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">demo-module.tar.gz</text>
  <text x="480.0" y="212.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">cosign sign-blob (key pair)</text>
  <line x1="280" y1="190" x2="360" y2="190" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <rect x="680" y="140" width="220" height="100" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="790.0" y="176.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">verify-blob</text>
  <text x="790.0" y="194.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#374151">untouched archive</text>
  <text x="790.0" y="212.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">&quot;Verified OK&quot;</text>
  <line x1="600" y1="190" x2="680" y2="190" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <rect x="60" y="330" width="860" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="490.0" y="380.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">one line appended to demo-module.tar.gz after signing (echo &quot;tampered&quot; &gt;&gt; archive)</text>
  <text x="490.0" y="398.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">verify-blob against the same .sig now fails with a signature-mismatch error</text>
  <text x="490.0" y="416.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">even a one-line append invalidates the signature — undetected tampering without verification</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-neutral)"/>
  <text x="108" y="504" font-size="11" fill="#6b7280">Pre-package scan</text>
  <line x1="282" y1="500" x2="322" y2="500" stroke="#33415c" stroke-width="1.75" marker-end="url(#arrow-mgmt)"/>
  <text x="330" y="504" font-size="11" fill="#33415c">Signed artifact</text>
  <line x1="495" y1="500" x2="535" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="543" y="504" font-size="11" fill="#166534">Verified untampered</text>
</svg>
