<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Chapter 5 lab flow: a Terraform plan evaluated by Conftest before apply, with a deliberate bypass showing why the gate must block</title>
  <desc>
    A minimal Terraform configuration writes an owner tag into a local file. Planning with no owner_tag and evaluating with Conftest fails: 'has an empty owner_tag'. Re-planning with owner_tag=platform-team and re-evaluating passes cleanly. As a negative test, the failing plan from the first step is applied anyway, bypassing the policy gate entirely; the resulting output file shows owner= with no value, exactly what the policy predicted — demonstrating that nothing at the terraform apply layer itself prevents applying a plan that failed policy, which is why the check must be a required, blocking CI step and not an advisory one a human can choose to ignore.
  </desc>
  <defs>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#166534"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480.0" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chapter 5 Hands-On Lab: A Conftest Policy Gate That Must Be Blocking, Not Advisory</text>
  <text x="480.0" y="50" text-anchor="middle" font-size="13" fill="#4b5563">Bypassing a failed policy check and applying anyway produces exactly the noncompliant output the check predicted</text>
  <rect x="60" y="130" width="240" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="180.0" y="171.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111827">plan: no owner_tag</text>
  <text x="180.0" y="189.4" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">conftest test: FAIL</text>
  <text x="180.0" y="207.4" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">&quot;has an empty owner_tag&quot;</text>
  <rect x="380" y="130" width="240" height="110" rx="8" fill="#f0faf2" stroke="#166534" stroke-width="2"/>
  <text x="500.0" y="180.2" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">plan: owner_tag=platform-team</text>
  <text x="500.0" y="198.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14532d">conftest test: PASS</text>
  <rect x="700" y="130" width="220" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="810.0" y="171.2" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Negative Test</text>
  <text x="810.0" y="189.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7f1d1d">terraform apply plan.tfout anyway</text>
  <text x="810.0" y="207.2" text-anchor="middle" font-size="10.5" font-weight="400" fill="#7f1d1d">(bypassing the failed gate)</text>
  <line x1="300" y1="185" x2="380" y2="185" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <line x1="300" y1="240" x2="700" y2="240" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="506.0" y="240.0" font-size="10.5" fill="#b91c1c">apply the FAILED plan directly</text>
  <rect x="60" y="330" width="860" height="110" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="490.0" y="362.4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Result</text>
  <text x="490.0" y="380.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">output-*.txt shows &quot;owner=&quot; with no value — exactly what the policy predicted</text>
  <text x="490.0" y="398.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">nothing at the apply layer itself blocks a plan that failed policy — the gate must be a required,</text>
  <text x="490.0" y="416.4" text-anchor="middle" font-size="11" font-weight="400" fill="#7f1d1d">blocking CI step, not an advisory one a human can choose to ignore</text>
  <line x1="60" y1="500" x2="100" y2="500" stroke="#b91c1c" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-warn)"/>
  <text x="108" y="504" font-size="11" fill="#b91c1c">Failing / bypassed path</text>
  <line x1="345" y1="500" x2="385" y2="500" stroke="#166534" stroke-width="1.75" marker-end="url(#arrow-alt)"/>
  <text x="393" y="504" font-size="11" fill="#166534">Corrected, passing path</text>
</svg>
