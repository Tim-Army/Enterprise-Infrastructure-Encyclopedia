name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: scripts/bash/validate.sh

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build complete-encyclopedia artifacts
        run: scripts/bash/build-book.sh --format all

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            output/html/complete-encyclopedia.html
            output/epub/Enterprise-Infrastructure-Encyclopedia.epub
