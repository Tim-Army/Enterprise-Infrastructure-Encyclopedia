name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: scripts/bash/validate.sh

      - name: Install Pandoc
        env:
          PANDOC_VERSION: '3.10'
          PANDOC_SHA256: 'd502599878eb29af3ae5f0cb5d559134df96534125d452c7a0674a5bad2c5ecf'
        run: |
          set -euo pipefail
          deb="pandoc-${PANDOC_VERSION}-1-amd64.deb"
          curl -fsSL --retry 3 -o "$deb" \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/${deb}"
          echo "${PANDOC_SHA256}  ${deb}" | sha256sum --check --strict
          sudo dpkg --install "$deb"
          rm -f "$deb"
          # Fail loudly if the installed build is not the pinned one, so a
          # silent toolchain change cannot alter published output.
          pandoc --version | head -1
          test "$(pandoc --version | head -1)" = "pandoc ${PANDOC_VERSION}"

      - name: Build complete-encyclopedia EPUB artifact
        run: scripts/bash/build-book.sh --format epub

      - name: Name the EPUB for this release
        # Carry the project name and version in the asset filename, so a
        # downloaded release EPUB is self-identifying like the offline
        # website archives (Enterprise-Infrastructure-Encyclopedia-website-vNNNN.zip).
        run: |
          set -euo pipefail
          cp "output/epub/Enterprise-Infrastructure-Encyclopedia.epub" \
             "output/epub/Enterprise-Infrastructure-Encyclopedia-${GITHUB_REF_NAME}.epub"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          name: Enterprise-Infrastructure-Encyclopedia ${{ github.ref_name }}
          files: |
            output/epub/Enterprise-Infrastructure-Encyclopedia-${{ github.ref_name }}.epub

      - name: Prune old releases (keep 3, milestones excluded)
        # Every build is a patch release, so patch tags (vX.Y.Z, Z>0)
        # accumulate. Keep only the three most recent and delete the rest
        # (release + tag). Milestone releases (vX.Y.0 — deliberate minor and
        # major bumps, e.g. the first release v1.0.0) are excluded from
        # pruning and are not counted toward the three.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          patches="$(gh release list --limit 200 --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[1-9][0-9]*$' | sort -Vr || true)"
          echo "$patches" | tail -n +4 | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "pruning old patch release $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done

          # Milestones are excluded from pruning, so they accumulate without
          # bound. Revisit the retention policy once there are ten of them.
          milestones="$(gh release list --limit 200 --json tagName --jq '.[].tagName' \
            | grep -cE '^v[0-9]+\.[0-9]+\.0$' || true)"
          echo "milestone releases retained: ${milestones:-0}"
          if [ "${milestones:-0}" -ge 10 ]; then
            echo "::notice::${milestones} milestone releases retained — revisit the release-retention policy (see RELEASE_PROCESS.md)."
          fi
