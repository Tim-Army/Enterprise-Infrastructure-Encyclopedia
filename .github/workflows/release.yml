name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: scripts/bash/validate.sh

      - name: Install Pandoc and Typst
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst

      - name: Build complete-encyclopedia artifacts
        run: scripts/bash/build-book.sh --format all

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/docx/*
            output/html/*
            output/pdf/*
            output/epub/*
            output/website-zip/*
